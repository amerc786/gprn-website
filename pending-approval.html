<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Account Under Review - GPRN</title>

    <!-- Fonts -->
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@800;900&display=swap" rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Manrope', sans-serif; background: #F8FAFC; color: #0F172A; margin: 0;
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
        }
        .font-display { font-family: 'Clash Display', sans-serif; }

        /* GPRN logo (same as login) */
        .gprn-logo { display: inline-flex; align-items: center; gap: 8px; text-decoration: none; justify-content: center; }
        .gprn-logo-mark {
            width: 38px; height: 38px; border-radius: 12px; background: #101524;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 1px 2px rgba(16,21,36,0.08);
        }
        .gprn-logo-mark span {
            color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 900; font-size: 24px; line-height: 1;
            letter-spacing: -0.025em; padding-top: 2px;
        }
        .gprn-logo-word {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #101524; font-weight: 900; font-size: 32px;
            line-height: 0.8; letter-spacing: -0.05em;
            display: inline-flex; align-items: baseline; padding-top: 4px;
        }
        .gprn-logo-word::after {
            content: ''; display: inline-block; width: 9px; height: 9px;
            background: #0F8B5A; margin-left: 4px; margin-bottom: 3px; align-self: flex-end;
        }

        .status-card {
            width: 100%; max-width: 520px; background: #ffffff;
            border: 1px solid #E2E8F0; border-radius: 24px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -4px rgba(0,0,0,0.05);
            padding: 40px 36px;
            text-align: center;
        }
        @media (max-width: 480px) { .status-card { padding: 32px 24px; } }

        .status-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 28px auto 20px;
        }
        .status-icon.pending {
            background: rgba(15, 139, 90, 0.1);
            color: #0F8B5A;
        }
        .status-icon.rejected {
            background: rgba(220, 38, 38, 0.1);
            color: #DC2626;
        }
        .status-icon i { font-size: 36px; }
        .status-title {
            font-family: 'Clash Display', sans-serif;
            font-size: 1.75rem;
            font-weight: 600;
            color: #0F172A;
            margin: 0 0 12px;
        }
        .status-lede {
            color: #475569;
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0 0 20px;
        }
        .status-email {
            display: inline-block;
            background: rgba(15, 139, 90, 0.08);
            border: 1px solid rgba(15, 139, 90, 0.25);
            color: #047857;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 24px;
            word-break: break-all;
        }
        .status-info {
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: left;
        }
        .status-info h4 {
            font-size: 0.8rem;
            font-weight: 700;
            color: #0F172A;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 0 0 10px;
        }
        .status-info ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .status-info li {
            display: flex;
            align-items: flex-start;
            gap: 0.65rem;
            color: #334155;
            font-size: 0.9rem;
            line-height: 1.5;
            padding: 0.35rem 0;
        }
        .status-info li i {
            flex-shrink: 0;
            margin-top: 2px;
            color: #0F8B5A;
        }
        .reason-box {
            background: rgba(220, 38, 38, 0.05);
            border: 1px solid rgba(220, 38, 38, 0.25);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: left;
        }
        .reason-box h4 {
            font-size: 0.8rem;
            font-weight: 700;
            color: #B91C1C;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 0 0 8px;
        }
        .reason-box p {
            color: #334155;
            font-size: 0.92rem;
            line-height: 1.5;
            margin: 0;
        }
        .status-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-primary {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 8px; padding: 13px 24px; border-radius: 9999px;
            background: #101524; color: #ffffff; font-weight: 600; font-size: 0.92rem;
            border: none; cursor: pointer; font-family: inherit; text-decoration: none;
            transition: transform .15s, background .15s;
        }
        .btn-primary:hover { background: #1E293B; transform: translateY(-1px); }
        .btn-ghost {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            padding: 13px 24px; border-radius: 9999px; background: transparent;
            color: #475569; font-weight: 600; font-size: 0.92rem;
            border: 1px solid #E2E8F0; cursor: pointer; font-family: inherit;
            text-decoration: none; transition: background .15s;
        }
        .btn-ghost:hover { background: #F1F5F9; }

        @keyframes rise { 0% { opacity: 0; transform: translateY(12px); } 100% { opacity: 1; transform: translateY(0); } }
        .rise { animation: rise .6s cubic-bezier(0.16, 1, 0.3, 1) both; }
    </style>
</head>
<body>
    <div class="status-card rise">
        <a href="index.html" class="gprn-logo">
            <span class="gprn-logo-mark"><span>G</span></span>
            <span class="gprn-logo-word">PRN</span>
        </a>

        <div id="stateContainer"></div>

        <div class="status-actions" id="statusActions">
            <a href="index.html" class="btn-ghost">Back to Home</a>
            <a href="login.html" class="btn-primary">Go to Login</a>
        </div>
    </div>

    <script>
        (function() {
            // Parse query params
            var params = new URLSearchParams(window.location.search);
            var status = params.get('status') || 'pending';
            var email = params.get('email') || '';
            var reason = params.get('reason') || '';

            var container = document.getElementById('stateContainer');
            var actions = document.getElementById('statusActions');

            if (status === 'rejected') {
                var reasonHtml = '';
                if (reason) {
                    reasonHtml = '<div class="reason-box">'
                        + '<h4>Reason provided</h4>'
                        + '<p>' + escapeHtml(reason) + '</p>'
                        + '</div>';
                }
                container.innerHTML = ''
                    + '<div class="status-icon rejected">'
                    + '<i class="ph ph-x-circle"></i>'
                    + '</div>'
                    + '<h1 class="status-title">Your application was not approved</h1>'
                    + '<p class="status-lede">We have reviewed your registration and are unable to activate your account at this time.</p>'
                    + (email ? '<div class="status-email">' + escapeHtml(email) + '</div>' : '')
                    + reasonHtml
                    + '<div class="status-info">'
                    +   '<h4>What now?</h4>'
                    +   '<ul>'
                    +     '<li><i class="ph ph-check"></i>If you believe this is a mistake, please contact support.</li>'
                    +     '<li><i class="ph ph-check"></i>You will not be able to log in with this account.</li>'
                    +   '</ul>'
                    + '</div>';
                // Login is impossible for a rejected account — don't offer it.
                actions.innerHTML = ''
                    + '<a href="mailto:support@gprn.wales" class="btn-ghost"><i class="ph ph-envelope-simple"></i> Contact support</a>'
                    + '<a href="index.html" class="btn-primary">Back to Home</a>';
            } else {
                // Default: pending
                container.innerHTML = ''
                    + '<div class="status-icon pending">'
                    + '<i class="ph ph-clock"></i>'
                    + '</div>'
                    + '<h1 class="status-title">Your account is under review</h1>'
                    + '<p class="status-lede">Thanks for registering with GPRN. Every new account is reviewed manually by our team to keep the platform trusted and safe for locum GPs and practices.</p>'
                    + (email ? '<div class="status-email">' + escapeHtml(email) + '</div>' : '')
                    + '<div class="status-info">'
                    +   '<h4>What happens next</h4>'
                    +   '<ul>'
                    +     '<li><i class="ph ph-check"></i>We\'ll review your registration details.</li>'
                    +     '<li><i class="ph ph-check"></i>You\'ll receive an email confirming the outcome.</li>'
                    +     '<li><i class="ph ph-check"></i>Once approved, you can log in and start using the platform.</li>'
                    +   '</ul>'
                    + '</div>';
            }

            function escapeHtml(str) {
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }
        })();
    </script>
</body>
</html>
