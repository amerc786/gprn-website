<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Account Under Review - GPRN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .status-card {
            max-width: 520px;
            text-align: center;
        }
        .status-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .status-icon.pending {
            background: linear-gradient(135deg, rgba(91, 77, 255, 0.15), rgba(20, 184, 166, 0.15));
            color: #5B4DFF;
        }
        .status-icon.rejected {
            background: rgba(239, 68, 68, 0.15);
            color: #EF4444;
        }
        .status-icon svg {
            width: 36px;
            height: 36px;
        }
        .status-title {
            font-family: 'Space Grotesk', Inter, sans-serif;
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-primary, #F8FAFC);
            margin-bottom: 0.75rem;
            letter-spacing: -0.01em;
        }
        .status-lede {
            color: var(--text-secondary, #CBD5E1);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .status-email {
            display: inline-block;
            background: rgba(91, 77, 255, 0.1);
            border: 1px solid rgba(91, 77, 255, 0.3);
            color: #F8FAFC;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            word-break: break-all;
        }
        .status-info {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .status-info h4 {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-primary, #F8FAFC);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }
        .status-info ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .status-info li {
            display: flex;
            align-items: flex-start;
            gap: 0.65rem;
            color: var(--text-secondary, #CBD5E1);
            font-size: 0.9rem;
            line-height: 1.5;
            padding: 0.35rem 0;
        }
        .status-info li svg {
            flex-shrink: 0;
            margin-top: 2px;
            color: #14B8A6;
        }
        .reason-box {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .reason-box h4 {
            font-size: 0.85rem;
            font-weight: 700;
            color: #FCA5A5;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .reason-box p {
            color: var(--text-secondary, #CBD5E1);
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0;
        }
        .status-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="hero-bg-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>

        <div class="auth-card status-card">
            <div class="auth-logo">
                <a href="index.html" class="logo">
                    <span class="logo-icon">GP</span><span class="logo-text">RN</span>
                </a>
                <p>The Right GP, Right Now</p>
            </div>

            <div id="stateContainer"></div>

            <div class="status-actions">
                <a href="index.html" class="btn btn-ghost">Back to Home</a>
                <a href="login.html" class="btn btn-primary">Go to Login</a>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Parse query params
            var params = new URLSearchParams(window.location.search);
            var status = params.get('status') || 'pending';
            var email = params.get('email') || '';
            var reason = params.get('reason') || '';

            var container = document.getElementById('stateContainer');

            if (status === 'rejected') {
                var reasonHtml = '';
                if (reason) {
                    reasonHtml = '<div class="reason-box">'
                        + '<h4>Reason provided</h4>'
                        + '<p>' + escapeHtml(reason) + '</p>'
                        + '</div>';
                }
                container.innerHTML = ''
                    + '<div class="status-icon rejected">'
                    + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
                    + '</div>'
                    + '<h1 class="status-title">Your application was not approved</h1>'
                    + '<p class="status-lede">We have reviewed your registration and are unable to activate your account at this time.</p>'
                    + (email ? '<div class="status-email">' + escapeHtml(email) + '</div>' : '')
                    + reasonHtml
                    + '<div class="status-info">'
                    +   '<h4>What now?</h4>'
                    +   '<ul>'
                    +     '<li><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>If you believe this is a mistake, please contact support.</li>'
                    +     '<li><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>You will not be able to log in with this account.</li>'
                    +   '</ul>'
                    + '</div>';
            } else {
                // Default: pending
                container.innerHTML = ''
                    + '<div class="status-icon pending">'
                    + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'
                    + '</div>'
                    + '<h1 class="status-title">Your account is under review</h1>'
                    + '<p class="status-lede">Thanks for registering with GPRN. Every new account is reviewed manually by our team to keep the platform trusted and safe for locum GPs and practices.</p>'
                    + (email ? '<div class="status-email">' + escapeHtml(email) + '</div>' : '')
                    + '<div class="status-info">'
                    +   '<h4>What happens next</h4>'
                    +   '<ul>'
                    +     '<li><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>We\'ll review your registration details.</li>'
                    +     '<li><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>You\'ll receive an email confirming the outcome.</li>'
                    +     '<li><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Once approved, you can log in and start using the platform.</li>'
                    +   '</ul>'
                    + '</div>';
            }

            function escapeHtml(str) {
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }
        })();
    </script>
</body>
</html>
