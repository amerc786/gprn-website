<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GPRN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="app-layout">
    <script src="mock-data.js"></script>
    <script src="app.js"></script>
    <script src="components.js"></script>
    <script>
        if (!initPage('locum')) throw new Error('Auth required');

        const session = Auth.getSession();
        const user = Auth.getCurrentUser();
        const data = getMockData();
        const pageContent = initAppLayout('locum', 'dashboard', 'Dashboard');

        // Compute stats
        const now = new Date();
        const myOffers = data.offers.filter(o => o.locumId === session.id);
        const upcomingAccepted = myOffers.filter(o => o.status === 'accepted' && new Date(o.shiftDate) >= now);
        const pendingOffers = myOffers.filter(o => o.status === 'pending');

        // This month's earnings from completed offers
        const currentMonth = now.getMonth();
        const currentYear = now.getFullYear();
        const monthEarnings = myOffers
            .filter(o => o.status === 'completed' && new Date(o.shiftDate).getMonth() === currentMonth && new Date(o.shiftDate).getFullYear() === currentYear)
            .reduce((sum, o) => {
                if (o.sessionType === 'Full Day') return sum + o.rateFullDay;
                if (o.sessionType === 'AM') return sum + o.rateAM;
                return sum + o.ratePM;
            }, 0);

        const reliability = user ? user.bookingReliability : 98;

        // Greeting
        const greeting = `${getGreeting()}, ${session.firstName}`;

        // Upcoming shifts (next 3 accepted future offers)
        const upcomingShifts = upcomingAccepted
            .sort((a, b) => new Date(a.shiftDate) - new Date(b.shiftDate))
            .slice(0, 3);

        // Notifications - filtered for current user
        const notifications = (data.notifications || []).filter(n => n.userId === session.id || !n.userId);

        // Document expiry warnings
        const docWarnings = [];
        if (user && user.documents) {
            const docLabels = { indemnity: 'Indemnity Certificate', performerListStatus: 'Performer List Status', dbs: 'DBS Check', cv: 'CV' };
            Object.entries(user.documents).forEach(([key, doc]) => {
                if (doc.uploaded && doc.expiry) {
                    const status = getDocumentExpiryStatus(doc.expiry);
                    if (status.status === 'expired' || status.status === 'expiring') {
                        docWarnings.push({ name: docLabels[key] || key, status: status });
                    }
                }
            });
        }

        // Earnings mini chart - last 6 months
        const invoices = InvoiceManager.getForLocum(session.id);
        const monthsShort = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const earningsData = [];
        for (let i = 5; i >= 0; i--) {
            const m = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const mMonth = m.getMonth();
            const mYear = m.getFullYear();
            const total = invoices
                .filter(inv => {
                    const d = new Date(inv.shiftDate);
                    return d.getMonth() === mMonth && d.getFullYear() === mYear;
                })
                .reduce((s, inv) => s + inv.total, 0);
            earningsData.push({ label: monthsShort[mMonth], value: total });
        }
        const maxEarning = Math.max(...earningsData.map(e => e.value), 1);

        // Shifts needing confirmation (accepted but not confirmed)
        const needsConfirmation = myOffers.filter(o => o.status === 'accepted' && new Date(o.shiftDate) >= now);

        // Leave feedback reminders (completed offers where user has not reviewed)
        const needsFeedback = myOffers.filter(o => o.status === 'completed' && !FeedbackManager.hasReviewed(session.id, o.id));

        // Unread messages count
        const unreadMsgCount = MessageManager.getUnreadCount(session.id);

        pageContent.innerHTML = `
            <h2 style="font-size: 1.5rem; font-weight: 700; color: var(--dark); margin-bottom: 24px;">${greeting}</h2>

            ${docWarnings.length > 0 ? `
            <div style="margin-bottom: 20px;">
                ${docWarnings.map(w => `
                    <div class="content-card" style="margin-bottom: 8px; border-left: 4px solid ${w.status.status === 'expired' ? 'var(--danger)' : 'var(--warning)'};">
                        <div class="content-card-body" style="padding: 14px 18px; display: flex; align-items: center; gap: 12px;">
                            ${getIcon('file-text')}
                            <div style="flex: 1;">
                                <strong style="font-size: 0.9rem;">${w.name}</strong>
                                <span class="badge ${w.status.badge}" style="margin-left: 8px;">${w.status.label}</span>
                            </div>
                            <a href="my-profile.html" class="btn btn-small btn-ghost">Update</a>
                        </div>
                    </div>
                `).join('')}
            </div>
            ` : ''}

            <div class="dash-stats-row">
                ${renderStatCard('calendar', 'Upcoming Shifts', upcomingAccepted.length, null, 'rgba(79,70,229,0.15)')}
                ${renderStatCard('file-text', 'Pending Offers', pendingOffers.length, null, 'rgba(245,158,11,0.15)')}
                ${renderStatCard('pound', "This Month's Earnings", formatCurrency(monthEarnings), null, 'rgba(16,185,129,0.15)')}
                ${renderStatCard('activity', 'Booking Reliability', reliability + '%', null, 'rgba(14,165,233,0.15)')}
            </div>

            <div class="grid-2">
                <div class="content-card">
                    <div class="content-card-header">
                        <h2>Upcoming Shifts</h2>
                        <a href="my-calendar.html" class="btn btn-ghost btn-small">View Calendar</a>
                    </div>
                    <div class="content-card-body">
                        ${upcomingShifts.length === 0
                            ? renderEmptyState('calendar', 'No upcoming shifts', 'You have no confirmed shifts coming up. Browse available shifts to find your next booking.', 'Browse Shifts', 'available-shifts.html')
                            : upcomingShifts.map(offer => `
                                <div class="shift-card-full" style="margin-bottom: 12px;">
                                    <div class="shift-card-header">
                                        <div>
                                            <h3 class="shift-card-title">${offer.practiceName}</h3>
                                            <p class="shift-card-location">${offer.healthBoard}</p>
                                        </div>
                                        <div class="shift-card-badges">
                                            <span class="badge badge-success">Confirmed</span>
                                            <span class="badge badge-primary">${offer.sessionType}</span>
                                        </div>
                                    </div>
                                    <div class="shift-card-details">
                                        <div class="shift-card-detail">
                                            ${getIcon('calendar')}
                                            <span>${DateUtils.format(offer.shiftDate, 'full')}</span>
                                        </div>
                                        <div class="shift-card-detail">
                                            ${getIcon('clock')}
                                            <span>${offer.startTime} - ${offer.endTime}</span>
                                        </div>
                                    </div>
                                </div>
                            `).join('')
                        }
                    </div>
                </div>

                <div class="content-card">
                    <div class="content-card-header">
                        <h2>Earnings (Last 6 Months)</h2>
                    </div>
                    <div class="content-card-body">
                        <div class="bar-chart">
                            ${earningsData.map(e => `
                                <div class="bar-chart-item">
                                    <div class="bar-chart-value">${e.value > 0 ? formatCurrency(e.value) : '-'}</div>
                                    <div class="bar-chart-bar" style="height: ${e.value > 0 ? Math.max((e.value / maxEarning) * 120, 4) : 4}px;"></div>
                                    <div class="bar-chart-label">${e.label}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            </div>

            ${needsConfirmation.length > 0 ? `
            <div class="content-card" style="margin-top: 8px;">
                <div class="content-card-header">
                    <h2>Shifts Needing Confirmation</h2>
                    <span class="badge badge-warning">${needsConfirmation.length}</span>
                </div>
                <div class="content-card-body">
                    ${needsConfirmation.slice(0, 5).map(offer => `
                        <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--gray-100);">
                            <div>
                                <strong style="font-size: 0.9rem;">${offer.practiceName}</strong>
                                <span style="font-size: 0.85rem; color: var(--dark-600); margin-left: 8px;">${DateUtils.format(offer.shiftDate, 'medium')} &bull; ${offer.sessionType}</span>
                            </div>
                            <button class="btn btn-primary btn-small" onclick="confirmAttendance('${offer.id}', this)">
                                ${getIcon('check')} Confirm
                            </button>
                        </div>
                    `).join('')}
                </div>
            </div>
            ` : ''}

            ${needsFeedback.length > 0 ? `
            <div class="content-card" style="margin-top: 8px;">
                <div class="content-card-header">
                    <h2>Leave Feedback</h2>
                    <span class="badge badge-info">${needsFeedback.length}</span>
                </div>
                <div class="content-card-body">
                    ${needsFeedback.slice(0, 5).map(offer => `
                        <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--gray-100);">
                            <div>
                                <strong style="font-size: 0.9rem;">${offer.practiceName}</strong>
                                <span style="font-size: 0.85rem; color: var(--dark-600); margin-left: 8px;">${DateUtils.format(offer.shiftDate, 'medium')} &bull; ${offer.sessionType}</span>
                            </div>
                            <button class="btn btn-secondary btn-small" onclick="leaveFeedback('${offer.id}', '${offer.practiceId}')">
                                ${getIcon('award')} Rate
                            </button>
                        </div>
                    `).join('')}
                </div>
            </div>
            ` : ''}

            <div class="grid-2" style="margin-top: 8px;">
                <div class="content-card">
                    <div class="content-card-header">
                        <h2>Recent Notifications</h2>
                    </div>
                    <div class="content-card-body">
                        ${notifications.length === 0
                            ? '<p style="color: var(--dark-600); font-size: 0.88rem;">No notifications.</p>'
                            : notifications.slice(0, 6).map(n => `
                                <div class="notif-item">
                                    <div class="notif-dot ${n.read ? 'read' : 'unread'}"></div>
                                    <div>
                                        <div class="notif-title">${n.title}</div>
                                        <div class="notif-message">${n.message}</div>
                                        <div class="notif-time">${DateUtils.relative(n.date)}</div>
                                    </div>
                                </div>
                            `).join('')
                        }
                    </div>
                </div>

                <div class="content-card">
                    <div class="content-card-header">
                        <h2>Quick Actions</h2>
                    </div>
                    <div class="content-card-body">
                        <div class="quick-actions">
                            <a href="available-shifts.html" class="quick-action-btn">
                                ${getIcon('search')}
                                <span>Browse Shifts</span>
                            </a>
                            <a href="my-calendar.html" class="quick-action-btn">
                                ${getIcon('calendar')}
                                <span>View Calendar</span>
                            </a>
                            <a href="messages.html" class="quick-action-btn" style="position: relative;">
                                ${getIcon('mail')}
                                <span>Messages${unreadMsgCount > 0 ? ' (' + unreadMsgCount + ')' : ''}</span>
                            </a>
                            <a href="my-rates.html" class="quick-action-btn">
                                ${getIcon('pound')}
                                <span>Update Rates</span>
                            </a>
                            <a href="my-profile.html" class="quick-action-btn">
                                ${getIcon('user')}
                                <span>View Profile</span>
                            </a>
                            <a href="my-invoices.html" class="quick-action-btn">
                                ${getIcon('pound')}
                                <span>Invoices</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        `;

        function confirmAttendance(offerId, btn) {
            if (Booking.confirmAttendance(offerId)) {
                Toast.show('Attendance confirmed!', 'success');
                btn.disabled = true;
                btn.textContent = 'Confirmed';
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-ghost');
                const row = btn.closest('[style*="border-bottom"]');
                if (row) row.style.opacity = '0.5';
            } else {
                Toast.show('Could not confirm attendance.', 'error');
            }
        }

        function leaveFeedback(offerId, practiceId) {
            Modal.show({
                title: 'Leave Feedback',
                size: 'medium',
                body: `
                    <div style="margin-bottom: 16px;">
                        <label class="form-label">Overall Rating</label>
                        <div id="ratingStars" style="display: flex; gap: 8px; cursor: pointer;">
                            ${[1,2,3,4,5].map(i => `<svg data-star="${i}" width="28" height="28" viewBox="0 0 24 24" fill="#E2E8F0" stroke="#E2E8F0" stroke-width="1" style="cursor:pointer;"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`).join('')}
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Comment (optional)</label>
                        <textarea id="feedbackComment" class="form-textarea" rows="3" placeholder="How was your experience?"></textarea>
                    </div>
                `,
                footer: `<button class="btn btn-primary" id="submitFeedbackBtn">Submit Feedback</button>`,
                onOpen: (overlay) => {
                    let selectedRating = 0;
                    const stars = overlay.querySelectorAll('#ratingStars svg');
                    stars.forEach(star => {
                        star.addEventListener('click', () => {
                            selectedRating = parseInt(star.dataset.star);
                            stars.forEach((s, idx) => {
                                s.setAttribute('fill', idx < selectedRating ? '#F97316' : '#E2E8F0');
                                s.setAttribute('stroke', idx < selectedRating ? '#F97316' : '#E2E8F0');
                            });
                        });
                    });
                    overlay.querySelector('#submitFeedbackBtn').addEventListener('click', () => {
                        if (selectedRating === 0) {
                            Toast.show('Please select a rating.', 'warning');
                            return;
                        }
                        const comment = overlay.querySelector('#feedbackComment').value;
                        FeedbackManager.submit(session.id, practiceId, offerId, { overall: selectedRating }, comment, 'locum');
                        Modal.close(overlay);
                        Toast.show('Feedback submitted. Thank you!', 'success');
                        setTimeout(() => location.reload(), 500);
                    });
                }
            });
        }
    </script>
</body>
</html>
