<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Practice Profile - GPRN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Syne"', 'sans-serif'],
                    },
                    colors: {
                        navy: { DEFAULT: '#0B0F19', 50: '#141C2F' },
                        brand: { green: '#059669', mint: '#ECFDF5', dark: '#022C22' },
                        surface: '#F8F9FA'
                    },
                    boxShadow: {
                        'card': '0 4px 20px rgba(0, 0, 0, 0.03)',
                        'card-hover': '0 10px 40px rgba(0, 0, 0, 0.08)',
                        'subtle': '0 1px 2px rgba(0,0,0,0.02)',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
    <style>
        @media (max-width: 768px) {
            .practice-profile-grid { grid-template-columns: 1fr !important; }
            .practice-header-wrap { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body class="app-layout">
    <script src="mock-data.js"></script>
    <script src="app.js?v=20260406c"></script>
    <script src="supabase-client.js?v=20260406c"></script>
    <script src="supabase-tables.js?v=20260406c"></script>
    <script src="components.js"></script>
    <script>
        if (!initPage('locum')) throw new Error('Auth required');

        const session = Auth.getSession();
        const params = new URLSearchParams(window.location.search);
        const practiceId = params.get('id');
        const data = getMockData();
        const practice = data.practices.find(function(p) { return p.id === practiceId; });

        if (!practice) {
            document.body.innerHTML = '<div style="padding: 60px; text-align: center;"><h2 style="font-family: \'Space Grotesk\', sans-serif; color: var(--dark);">Practice not found</h2><p style="color: var(--dark-600); margin: 12px 0;">This practice profile could not be loaded.</p><a href="locum-dashboard.html" class="btn btn-primary" style="margin-top: 20px;">Back to Dashboard</a></div>';
            throw new Error('Practice not found');
        }

        const pageContent = initAppLayout('locum', 'dashboard', practice.practiceName, [
            { label: 'Dashboard', href: 'locum-dashboard.html' },
            { label: practice.practiceName }
        ]);

        // Compute booking history with this practice
        var allOffers = data.offers || [];
        var myOffers = allOffers.filter(function(o) { return o.locumId === session.id && o.practiceId === practiceId; });
        var completedCount = myOffers.filter(function(o) { return o.status === 'completed'; }).length;
        var upcomingCount = myOffers.filter(function(o) {
            return ['accepted', 'confirmed', 'acknowledged'].includes(o.status) && new Date(o.sessionDate || o.shiftDate) >= new Date();
        }).length;
        var totalBookings = myOffers.filter(function(o) {
            return ['accepted', 'confirmed', 'acknowledged', 'completed'].includes(o.status);
        }).length;

        var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || (navigator.maxTouchPoints > 1 && window.innerWidth < 1024);
        var phone = practice.phone || practice.contactPhone || '';

        // Get feedback/reviews for this practice
        var practiceReviews = FeedbackManager.getForUser(practiceId);
        var practiceRating = FeedbackManager.getAverageRating(practiceId);

        pageContent.innerHTML = ''
            + '<a href="locum-dashboard.html" style="display: inline-flex; align-items: center; gap: 6px; font-size: 0.88rem; font-weight: 500; color: var(--primary); margin-bottom: 24px;">'
            + getIcon('arrow-left') + ' Back to Dashboard'
            + '</a>'

            // Profile Header
            + '<div class="content-card" style="margin-bottom: 24px;">'
            + '<div class="content-card-body" style="padding: 32px;">'
            + '<div style="display: flex; align-items: center; gap: 24px; flex-wrap: wrap;">'
            + '<div class="header-avatar" style="width: 80px; height: 80px; font-size: 1.6rem; flex-shrink: 0; background: var(--primary); color: white;">'
            + getInitials(practice.practiceName)
            + '</div>'
            + '<div style="flex: 1;">'
            + '<h1 style="font-family: \'Space Grotesk\', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--dark); margin-bottom: 4px;">'
            + practice.practiceName
            + '</h1>'
            + '<div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px;">'
            + '<span class="badge badge-info">' + practice.healthBoard + '</span>'
            + '<span class="badge badge-primary">' + (practice.computerSystem || 'N/A') + '</span>'
            + '</div>'
            + (practiceRating ? '<div style="display: flex; align-items: center; gap: 8px;">'
                + renderRatingStars(parseFloat(practiceRating))
                + '<span style="font-weight: 700; font-size: 0.95rem; color: var(--dark);">' + practiceRating + '</span>'
                + '<span style="font-size: 0.82rem; color: var(--gray-400);">(' + practiceReviews.length + ' review' + (practiceReviews.length !== 1 ? 's' : '') + ')</span>'
                + '</div>' : '')
            + '</div>'

            // Mobile contact buttons (only on mobile, only if phone exists)
            + (isMobile && phone ? '<div style="display: flex; gap: 8px; flex-wrap: wrap;">'
                + '<a href="tel:' + phone + '" style="display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: var(--success); color: white; border-radius: 8px; font-size: 0.88rem; font-weight: 700; text-decoration: none;">'
                + getIcon('phone') + ' Call Practice</a>'
                + '<a href="sms:' + phone + '" style="display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: var(--primary); color: white; border-radius: 8px; font-size: 0.88rem; font-weight: 700; text-decoration: none;">'
                + getIcon('chat-circle-text') + ' Text Practice</a>'
                + '</div>' : '')

            + '</div>'
            + '</div>'
            + '</div>'

            // Two column layout
            + '<div class="practice-profile-grid" style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px;">'

            // Left column
            + '<div>'

            // Practice Details
            + '<div class="content-card" style="margin-bottom: 24px;">'
            + '<div class="content-card-header"><h2>Practice Details</h2></div>'
            + '<div class="content-card-body">'
            + '<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">'
            + '<div>'
            + '<span style="font-size: 0.78rem; font-weight: 600; color: var(--dark-600); text-transform: uppercase; letter-spacing: 0.05em;">Address</span>'
            + '<p style="font-size: 0.9rem; color: var(--dark); margin-top: 4px;">' + (practice.address || 'N/A') + '</p>'
            + '</div>'
            + '<div>'
            + '<span style="font-size: 0.78rem; font-weight: 600; color: var(--dark-600); text-transform: uppercase; letter-spacing: 0.05em;">City</span>'
            + '<p style="font-size: 0.9rem; color: var(--dark); margin-top: 4px;">' + (practice.city || 'N/A') + '</p>'
            + '</div>'
            + '<div>'
            + '<span style="font-size: 0.78rem; font-weight: 600; color: var(--dark-600); text-transform: uppercase; letter-spacing: 0.05em;">Postcode</span>'
            + '<p style="font-size: 0.9rem; color: var(--dark); margin-top: 4px;">' + (practice.postcode || 'N/A') + '</p>'
            + '</div>'
            + '<div>'
            + '<span style="font-size: 0.78rem; font-weight: 600; color: var(--dark-600); text-transform: uppercase; letter-spacing: 0.05em;">Health Board</span>'
            + '<p style="font-size: 0.9rem; color: var(--dark); margin-top: 4px;">' + (practice.healthBoard || 'N/A') + '</p>'
            + '</div>'
            + '<div>'
            + '<span style="font-size: 0.78rem; font-weight: 600; color: var(--dark-600); text-transform: uppercase; letter-spacing: 0.05em;">Computer System</span>'
            + '<p style="font-size: 0.9rem; color: var(--dark); margin-top: 4px;">' + (practice.computerSystem || 'N/A') + '</p>'
            + '</div>'
            + '<div>'
            + '<span style="font-size: 0.78rem; font-weight: 600; color: var(--dark-600); text-transform: uppercase; letter-spacing: 0.05em;">Patient List Size</span>'
            + '<p style="font-size: 0.9rem; color: var(--dark); margin-top: 4px;">' + (practice.patientListSize ? practice.patientListSize.toLocaleString() : 'N/A') + '</p>'
            + '</div>'
            + '<div>'
            + '<span style="font-size: 0.78rem; font-weight: 600; color: var(--dark-600); text-transform: uppercase; letter-spacing: 0.05em;">Partners</span>'
            + '<p style="font-size: 0.9rem; color: var(--dark); margin-top: 4px;">' + (practice.partners || 'N/A') + '</p>'
            + '</div>'
            + (phone ? '<div>'
            + '<span style="font-size: 0.78rem; font-weight: 600; color: var(--dark-600); text-transform: uppercase; letter-spacing: 0.05em;">Phone</span>'
            + '<p style="font-size: 0.9rem; color: var(--dark); margin-top: 4px;">' + phone + '</p>'
            + '</div>' : '')
            + '</div>'
            + '</div>'
            + '</div>'

            // Contact Person
            + '<div class="content-card" style="margin-bottom: 24px;">'
            + '<div class="content-card-header"><h2>Practice Contact</h2></div>'
            + '<div class="content-card-body">'
            + '<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">'
            + '<div>'
            + '<span style="font-size: 0.78rem; font-weight: 600; color: var(--dark-600); text-transform: uppercase; letter-spacing: 0.05em;">Contact Name</span>'
            + '<p style="font-size: 0.9rem; color: var(--dark); margin-top: 4px;">' + (practice.contactName || 'N/A') + '</p>'
            + '</div>'
            + '<div>'
            + '<span style="font-size: 0.78rem; font-weight: 600; color: var(--dark-600); text-transform: uppercase; letter-spacing: 0.05em;">Role</span>'
            + '<p style="font-size: 0.9rem; color: var(--dark); margin-top: 4px;">' + (practice.contactRole || 'N/A') + '</p>'
            + '</div>'
            + '<div>'
            + '<span style="font-size: 0.78rem; font-weight: 600; color: var(--dark-600); text-transform: uppercase; letter-spacing: 0.05em;">Email</span>'
            + '<p style="font-size: 0.9rem; color: var(--dark); margin-top: 4px;">' + (practice.contactEmail || 'N/A') + '</p>'
            + '</div>'
            + (practice.contactPhone ? '<div>'
            + '<span style="font-size: 0.78rem; font-weight: 600; color: var(--dark-600); text-transform: uppercase; letter-spacing: 0.05em;">Direct Phone</span>'
            + '<p style="font-size: 0.9rem; color: var(--dark); margin-top: 4px;">' + practice.contactPhone + '</p>'
            + '</div>' : '')
            + '</div>'
            + '</div>'
            + '</div>'

            // Booking History
            + '<div class="content-card" style="margin-bottom: 24px;">'
            + '<div class="content-card-header"><h2>Your Booking History</h2></div>'
            + '<div class="content-card-body">'
            + (myOffers.length === 0
                ? '<p style="font-size: 0.88rem; color: var(--dark-600); text-align: center; padding: 20px 0;">No booking history with this practice yet.</p>'
                : myOffers.filter(function(o) { return ['accepted','confirmed','acknowledged','completed'].includes(o.status); })
                    .sort(function(a, b) { return new Date(b.sessionDate || b.shiftDate) - new Date(a.sessionDate || a.shiftDate); })
                    .slice(0, 10)
                    .map(function(o) {
                        var statusColors = { completed: 'badge-success', accepted: 'badge-info', confirmed: 'badge-success', acknowledged: 'badge-info' };
                        var statusLabels = { completed: 'Completed', accepted: 'Accepted', confirmed: 'Confirmed', acknowledged: 'Acknowledged' };
                        return '<div style="display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--gray-100);">'
                            + '<div>'
                            + '<strong style="font-size: 0.88rem; color: var(--dark);">' + DateUtils.format(o.sessionDate || o.shiftDate, 'full') + '</strong>'
                            + '<p style="font-size: 0.82rem; color: var(--dark-600); margin-top: 2px;">' + (o.sessionType || 'Session') + ' &middot; ' + (o.startTime || '') + ' - ' + (o.endTime || '') + '</p>'
                            + '</div>'
                            + '<div style="display: flex; align-items: center; gap: 8px;">'
                            + (o.proposedRate ? '<span style="font-size: 0.88rem; font-weight: 700; color: var(--dark);">' + formatCurrency(o.proposedRate) + '</span>' : '')
                            + '<span class="badge ' + (statusColors[o.status] || 'badge-neutral') + '">' + (statusLabels[o.status] || o.status) + '</span>'
                            + '</div>'
                            + '</div>';
                    }).join('')
                    + (myOffers.filter(function(o) { return ['accepted','confirmed','acknowledged','completed'].includes(o.status); }).length === 0
                        ? '<p style="font-size: 0.88rem; color: var(--dark-600); text-align: center; padding: 20px 0;">No confirmed bookings with this practice yet.</p>'
                        : '')
            )
            + '</div>'
            + '</div>'

            // Reviews
            + '<div class="content-card">'
            + '<div class="content-card-header"><h2>Ratings & Reviews</h2></div>'
            + '<div class="content-card-body">'
            + (practiceRating ? '<div class="rating-summary" style="margin-bottom: 20px;">'
                + '<span class="rating-number">' + practiceRating + '</span>'
                + renderRatingStars(parseFloat(practiceRating), 20)
                + '<span class="rating-count">' + practiceReviews.length + ' review' + (practiceReviews.length !== 1 ? 's' : '') + '</span>'
                + '</div>' : '')
            + (practiceReviews.length === 0
                ? '<p style="font-size: 0.88rem; color: var(--dark-600);">No reviews yet.</p>'
                : practiceReviews.map(function(r) {
                    var reviewerName = MessageManager.getUserName(r.fromId);
                    var avgScore = (Object.values(r.ratings).reduce(function(a,b){return a+b;}, 0) / Object.values(r.ratings).length).toFixed(1);
                    return '<div style="padding: 16px 0; border-bottom: 1px solid var(--gray-100);">'
                        + '<div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">'
                        + '<div style="display: flex; align-items: center; gap: 8px;">'
                        + '<strong style="font-size: 0.88rem; color: var(--dark);">' + reviewerName + '</strong>'
                        + renderRatingStars(parseFloat(avgScore))
                        + '</div>'
                        + '<span class="review-date">' + DateUtils.format(r.timestamp, 'medium') + '</span>'
                        + '</div>'
                        + (r.comment ? '<p class="review-comment">' + r.comment + '</p>' : '')
                        + '</div>';
                }).join(''))
            + '</div>'
            + '</div>'

            + '</div>' // end left column

            // Right column
            + '<div>'

            // Quick Stats
            + '<div class="content-card" style="margin-bottom: 24px;">'
            + '<div class="content-card-header"><h2>Your Stats Here</h2></div>'
            + '<div class="content-card-body">'
            + '<div style="display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--gray-100);">'
            + getIcon('check-circle')
            + '<div>'
            + '<span style="font-size: 0.82rem; color: var(--dark-600);">Completed Sessions</span>'
            + '<strong style="display: block; font-size: 0.9rem; color: var(--dark);">' + completedCount + '</strong>'
            + '</div>'
            + '</div>'
            + '<div style="display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--gray-100);">'
            + getIcon('calendar')
            + '<div>'
            + '<span style="font-size: 0.82rem; color: var(--dark-600);">Upcoming Bookings</span>'
            + '<strong style="display: block; font-size: 0.9rem; color: var(--dark);">' + upcomingCount + '</strong>'
            + '</div>'
            + '</div>'
            + '<div style="display: flex; align-items: center; gap: 10px; padding: 10px 0;">'
            + getIcon('activity')
            + '<div>'
            + '<span style="font-size: 0.82rem; color: var(--dark-600);">Total Bookings</span>'
            + '<strong style="display: block; font-size: 0.9rem; color: var(--dark);">' + totalBookings + '</strong>'
            + '</div>'
            + '</div>'
            + '</div>'
            + '</div>'

            // Default Rates (if the practice has set them)
            + (practice.defaultSessionRate || practice.defaultHourlyRate ? '<div class="content-card" style="margin-bottom: 24px;">'
                + '<div class="content-card-header"><h2>Typical Rates</h2></div>'
                + '<div class="content-card-body">'
                + (practice.defaultSessionRate ? '<div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--gray-100);">'
                    + '<span style="font-size: 0.88rem; color: var(--dark-600);">Session Rate</span>'
                    + '<strong style="font-size: 0.88rem; color: var(--dark);">' + formatCurrency(practice.defaultSessionRate) + '</strong>'
                    + '</div>' : '')
                + (practice.defaultHourlyRate ? '<div style="display: flex; justify-content: space-between; padding: 8px 0;">'
                    + '<span style="font-size: 0.88rem; color: var(--dark-600);">Hourly Rate</span>'
                    + '<strong style="font-size: 0.88rem; color: var(--dark);">' + formatCurrency(practice.defaultHourlyRate) + '</strong>'
                    + '</div>' : '')
                + '</div>'
                + '</div>' : '')

            // Contact Card (desktop)
            + (!isMobile && phone ? '<div class="content-card">'
                + '<div class="content-card-header"><h2>Contact</h2></div>'
                + '<div class="content-card-body" style="text-align: center; padding: 20px;">'
                + '<p style="font-size: 0.88rem; color: var(--dark-600); margin-bottom: 8px;">Practice Phone</p>'
                + '<span style="font-weight: 700; color: var(--primary); font-size: 1.1rem;">' + phone + '</span>'
                + '</div>'
                + '</div>' : '')

            + '</div>' // end right column
            + '</div>'; // end grid

    </script>
</body>
</html>
