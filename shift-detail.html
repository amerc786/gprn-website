<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Invitation Detail - GPRN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Syne"', 'sans-serif'],
                    },
                    colors: {
                        navy: { DEFAULT: '#0B0F19', 50: '#141C2F' },
                        brand: { green: '#059669', mint: '#ECFDF5', dark: '#022C22' },
                        surface: '#F8F9FA'
                    },
                    boxShadow: {
                        'card': '0 4px 20px rgba(0, 0, 0, 0.03)',
                        'card-hover': '0 10px 40px rgba(0, 0, 0, 0.08)',
                        'subtle': '0 1px 2px rgba(0,0,0,0.02)',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="app-layout">
    <script src="mock-data.js"></script>
    <script src="app.js?v=20260406c"></script>
<script src="supabase-client.js?v=20260406c"></script>
    <script src="supabase-tables.js?v=20260406c"></script>
    <script src="components.js"></script>
    <script>
        if (!initPage('locum')) throw new Error('Auth required');

        const session = Auth.getSession();
        const user = Auth.getCurrentUser();
        const data = getMockData();
        const pageContent = initAppLayout('locum', 'invitations', 'Invitation Detail', [
            { label: 'My Shifts', href: 'available-shifts.html' },
            { label: 'Invitation Detail' }
        ]);

        const offerId = new URLSearchParams(window.location.search).get('id');
        const offer = data.offers.find(o => o.id === offerId && o.locumId === session.id);

        if (!offer) {
            pageContent.innerHTML = renderEmptyState('search', 'Invitation Not Found', 'This invitation could not be found. It may have been withdrawn or expired.', 'Back to Invitations', 'available-shifts.html');
        } else {
            // Auto-mark as viewed
            if (offer.status === 'sent') {
                Booking.viewOffer(offer.id);
                offer.status = 'viewed';
            }

            const practice = data.practices.find(p => p.id === offer.practiceId);
            const rates = user ? user.rates : { am: 0, pm: 0, fullDay: 0, housecall: 0 };
            const offerDate = offer.sessionDate || offer.shiftDate;
            const proposedRate = offer.proposedRate || 0;
            const locumRate = offer.sessionType === 'Full Day' ? rates.fullDay : offer.sessionType === 'PM' ? rates.pm : rates.am;
            const rateMatch = proposedRate >= locumRate;

            // Negotiation history
            const negotiations = offer.negotiations || [];

            // Is this actionable?
            const isActionable = ['viewed', 'negotiating'].includes(offer.status);

            pageContent.innerHTML = `
                <div class="no-print" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <a href="available-shifts.html" style="display: inline-flex; align-items: center; gap: 6px; font-size: 0.88rem; font-weight: 600; color: var(--primary);">
                        ${getIcon('arrow-left')} Back to Invitations
                    </a>
                    <span class="badge ${getStatusBadge(offer.status)}" style="font-size: 0.85rem; padding: 6px 14px;">${getStatusLabel(offer.status)}</span>
                </div>

                <div class="grid-2-1">
                    <!-- Left Column -->
                    <div>
                        <!-- Practice Header -->
                        <div class="content-card">
                            <div class="content-card-body" style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px;">
                                <div>
                                    <h2 style="font-size: 1.3rem; font-weight: 700; color: var(--dark); margin-bottom: 4px;">${offer.practiceName}</h2>
                                    <p style="font-size: 0.9rem; color: var(--dark-600); margin-bottom: 8px;">${practice ? practice.city : ''}</p>
                                    <span class="badge badge-primary">${offer.healthBoard}</span>
                                    <span class="badge badge-info" style="margin-left: 6px;">${offer.sessionType}</span>
                                </div>
                                <div style="text-align: right;">
                                    <div style="font-size: 1rem; font-weight: 700; color: var(--dark);">${DateUtils.format(offerDate, 'full')}</div>
                                    <div style="font-size: 0.88rem; color: var(--dark-600);">${offer.startTime} - ${offer.endTime}</div>
                                    ${offer.sentDate ? `<div style="font-size: 0.8rem; color: var(--dark-600); margin-top: 4px;">Sent: ${DateUtils.relative(offer.sentDate)}</div>` : ''}
                                </div>
                            </div>
                        </div>

                        <!-- Location Card -->
                        ${practice ? `
                        <div class="content-card">
                            <div class="content-card-header">
                                <h2>${getIcon('map-pin')} Location</h2>
                            </div>
                            <div class="content-card-body">
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                                    <div>
                                        <div style="font-size: 0.82rem; color: var(--dark-600); margin-bottom: 4px;">Address</div>
                                        <div style="font-size: 0.9rem; font-weight: 600; color: var(--dark);">${practice.address || 'N/A'}</div>
                                    </div>
                                    <div>
                                        <div style="font-size: 0.82rem; color: var(--dark-600); margin-bottom: 4px;">Postcode</div>
                                        <div style="font-size: 0.9rem; font-weight: 600; color: var(--dark);">${practice.postcode || 'N/A'}</div>
                                    </div>
                                    <div>
                                        <div style="font-size: 0.82rem; color: var(--dark-600); margin-bottom: 4px;">City</div>
                                        <div style="font-size: 0.9rem; font-weight: 600; color: var(--dark);">${practice.city || 'N/A'}</div>
                                    </div>
                                    <div>
                                        <div style="font-size: 0.82rem; color: var(--dark-600); margin-bottom: 4px;">Directions</div>
                                        <div style="font-size: 0.9rem; font-weight: 600; color: var(--dark);"><a href="https://www.google.com/maps/search/${encodeURIComponent((practice.address || '') + ', ' + (practice.city || '') + ', ' + (practice.postcode || ''))}" target="_blank" rel="noopener" style="color:var(--primary);text-decoration:underline;">Get directions</a></div>
                                    </div>
                                </div>
                            </div>
                        </div>` : ''}

                        <!-- Session Details -->
                        <div class="content-card">
                            <div class="content-card-header">
                                <h2>${getIcon('monitor')} Session Details</h2>
                            </div>
                            <div class="content-card-body">
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                                    <div>
                                        <div style="font-size: 0.82rem; color: var(--dark-600); margin-bottom: 4px;">Session Type</div>
                                        <div style="font-size: 0.9rem; font-weight: 600; color: var(--dark);">${offer.sessionType}</div>
                                    </div>
                                    <div>
                                        <div style="font-size: 0.82rem; color: var(--dark-600); margin-bottom: 4px;">Housecalls</div>
                                        <div style="font-size: 0.9rem; font-weight: 600; color: var(--dark);">${offer.housecalls ? 'Yes - may be required' : 'No housecalls'}</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Practice Message -->
                        ${offer.practiceMessage ? `
                        <div class="content-card">
                            <div class="content-card-header">
                                <h2>${getIcon('mail')} Message from Practice</h2>
                            </div>
                            <div class="content-card-body">
                                <p style="font-size: 0.9rem; color: var(--dark-600); line-height: 1.7;">${sanitizeHTML(offer.practiceMessage)}</p>
                            </div>
                        </div>` : ''}

                        <!-- Negotiation History -->
                        ${negotiations.length > 0 ? `
                        <div class="content-card">
                            <div class="content-card-header">
                                <h2>${getIcon('pound')} Negotiation History</h2>
                            </div>
                            <div class="content-card-body">
                                ${negotiations.map(n => `
                                    <div style="padding: 10px 0; border-bottom: 1px solid var(--gray-100);">
                                        <div style="display: flex; justify-content: space-between; align-items: center;">
                                            <strong style="font-size: 0.88rem;">${n.from === 'practice' ? offer.practiceName : 'You'}</strong>
                                            <span style="font-size: 0.88rem; font-weight: 700; color: var(--primary);">${formatCurrency(n.rate)}</span>
                                        </div>
                                        ${n.message ? `<p style="font-size: 0.85rem; color: var(--dark-600); margin-top: 4px;">${sanitizeHTML(n.message)}</p>` : ''}
                                        ${n.accepted ? '<span class="badge badge-success" style="margin-top: 4px;">Agreed</span>' : ''}
                                    </div>
                                `).join('')}
                            </div>
                        </div>` : ''}
                    </div>

                    <!-- Right Column (Sticky) -->
                    <div>
                        <div class="content-card" style="position: sticky; top: 80px;">
                            <div class="content-card-header">
                                <h2>${isActionable ? 'Respond to Invitation' : 'Offer Summary'}</h2>
                            </div>
                            <div class="content-card-body">
                                <!-- Rate Comparison -->
                                <div style="background: var(--gray-50); border-radius: 8px; padding: 16px; margin-bottom: 16px;">
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                                        <span style="font-size: 0.85rem; color: var(--dark-600);">Offered Rate</span>
                                        <span style="font-size: 1.1rem; font-weight: 700; color: ${rateMatch ? 'var(--success)' : 'var(--warning)'};">${formatCurrency(proposedRate)}</span>
                                    </div>
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                        <span style="font-size: 0.85rem; color: var(--dark-600);">Your ${offer.sessionType} Rate</span>
                                        <span style="font-size: 0.85rem; font-weight: 700; color: var(--dark);">${formatCurrency(locumRate)}</span>
                                    </div>
                                    ${!rateMatch ? `
                                    <div style="padding: 8px 12px; background: rgba(245,158,11,0.08); border-radius: 6px; margin-top: 8px; font-size: 0.82rem; color: var(--warning); font-weight: 500;">
                                        Offered rate is below your published rate
                                    </div>` : `
                                    <div style="padding: 8px 12px; background: rgba(16,185,129,0.08); border-radius: 6px; margin-top: 8px; font-size: 0.82rem; color: var(--success); font-weight: 500;">
                                        ${getIcon('check')} Rate meets or exceeds your published rate
                                    </div>`}
                                </div>

                                ${offer.housecalls ? `
                                <div style="padding: 10px 14px; background: rgba(245,158,11,0.08); border-radius: 8px; margin-bottom: 16px; font-size: 0.82rem; color: var(--warning); font-weight: 500;">
                                    ${getIcon('activity')} This session may include housecalls.
                                </div>` : ''}

                                ${offer.expiresAt ? `
                                <div style="font-size: 0.82rem; color: var(--dark-600); margin-bottom: 16px;">
                                    ${getIcon('clock')} Expires: ${DateUtils.format(offer.expiresAt, 'full')}
                                </div>` : ''}

                                ${isActionable ? `
                                <button class="btn btn-primary" style="width: 100%;" onclick="handleAccept('${offer.id}')">
                                    ${getIcon('check')} Accept Invitation
                                </button>
                                <button class="btn btn-secondary" style="width: 100%; margin-top: 10px;" onclick="handleCounter('${offer.id}')">
                                    ${getIcon('pound')} Counter-Offer
                                </button>
                                <button class="btn btn-ghost" style="width: 100%; margin-top: 10px; color: var(--danger);" onclick="handleDecline('${offer.id}')">
                                    Decline
                                </button>
                                ` : `
                                <div style="text-align: center; padding: 12px;">
                                    <span class="badge ${getStatusBadge(offer.status)}" style="font-size: 0.88rem; padding: 8px 16px;">${getStatusLabel(offer.status)}</span>
                                </div>
                                `}

                                <button class="btn btn-ghost" style="width: 100%; margin-top: 10px;" id="msgPracticeBtn">
                                    ${getIcon('mail')} Message Practice
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Action handlers
            window.handleAccept = function(id) {
                const result = Booking.respondToOffer(id, 'accept');
                if (result && !result.error) {
                    Toast.show('Offer accepted! Awaiting practice confirmation.', 'success');
                    setTimeout(function() { window.location.href = 'my-offers.html'; }, 1500);
                } else {
                    Toast.show((result && result.message) || 'Failed to accept offer.', 'error');
                }
            };

            window.handleDecline = function(id) {
                Modal.show({
                    title: 'Decline Invitation',
                    body: '<p style="font-size: 0.9rem; color: var(--dark-600); padding: 8px 0;">Are you sure you want to decline this invitation?</p>',
                    footer: '<button class="btn btn-ghost" data-modal-close>Cancel</button><button class="btn btn-primary" style="background:var(--danger);border-color:var(--danger);" id="confirmDecBtn">Decline</button>',
                    onOpen: function(overlay) {
                        overlay.querySelector('#confirmDecBtn').addEventListener('click', function() {
                            Modal.close(overlay);
                            Booking.respondToOffer(id, 'decline');
                            Toast.show('Invitation declined.', 'info');
                            setTimeout(function() { window.location.href = 'available-shifts.html'; }, 1000);
                        });
                    }
                });
            };

            window.handleCounter = function(id) {
                Modal.show({
                    title: 'Counter-Offer',
                    body: `<div style="padding: 8px 0;">
                        <p style="font-size: 0.88rem; color: var(--dark-600); margin-bottom: 16px;">Practice offered: <strong>${formatCurrency(proposedRate)}</strong></p>
                        <div class="form-group">
                            <label class="form-label">Your counter-rate (£)</label>
                            <input type="number" id="counterRate" class="form-input" placeholder="e.g. 450" step="10" min="0" value="${locumRate}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Message (optional)</label>
                            <textarea id="counterMsg" class="form-textarea" rows="2" placeholder="e.g. I'd be happy to do this for..."></textarea>
                        </div>
                    </div>`,
                    footer: '<button class="btn btn-ghost" data-modal-close>Cancel</button><button class="btn btn-primary" id="sendCtrBtn">Send Counter</button>',
                    onOpen: function(overlay) {
                        overlay.querySelector('#sendCtrBtn').addEventListener('click', function() {
                            var rate = Number(overlay.querySelector('#counterRate').value);
                            var msg = overlay.querySelector('#counterMsg').value.trim();
                            if (!rate || rate <= 0) { Toast.show('Enter a valid rate.', 'error'); return; }
                            Booking.respondToOffer(id, 'counter', rate, msg);
                            Modal.close(overlay);
                            Toast.show('Counter-offer sent!', 'success');
                            setTimeout(function() { location.reload(); }, 1000);
                        });
                    }
                });
            };

            // Message practice
            document.getElementById('msgPracticeBtn').addEventListener('click', function() {
                const defaultSubject = 'Question about session on ' + DateUtils.format(offerDate, 'medium');
                Modal.show({
                    title: 'Send Message to ' + offer.practiceName,
                    size: 'medium',
                    body: `
                        <div class="form-group">
                            <label class="form-label">Subject</label>
                            <input type="text" class="form-input" id="msgSubject" value="${defaultSubject}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Message</label>
                            <textarea class="form-input" id="msgBody" rows="5" placeholder="Type your message here..."></textarea>
                        </div>
                    `,
                    footer: `
                        <button class="btn btn-ghost" data-modal-close>Cancel</button>
                        <button class="btn btn-primary" id="sendMsgBtn">${getIcon('mail')} Send</button>
                    `,
                    onOpen: function(overlay) {
                        overlay.querySelector('#sendMsgBtn').addEventListener('click', function() {
                            const body = overlay.querySelector('#msgBody').value.trim();
                            if (!body) { Toast.show('Please enter a message.', 'warning'); return; }
                            MessageManager.send(session.id, offer.practiceId, overlay.querySelector('#msgSubject').value.trim(), body);
                            Modal.close(overlay);
                            Toast.show('Message sent!', 'success');
                        });
                    }
                });
            });
        }
    </script>
</body>
</html>
