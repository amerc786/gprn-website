<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>My Bookings - GPRN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Syne"', 'sans-serif'],
                    },
                    colors: {
                        navy: { DEFAULT: '#0B0F19', 50: '#141C2F' },
                        brand: { green: '#059669', mint: '#ECFDF5', dark: '#022C22' },
                        surface: '#F8F9FA'
                    },
                    boxShadow: {
                        'card': '0 4px 20px rgba(0, 0, 0, 0.03)',
                        'card-hover': '0 10px 40px rgba(0, 0, 0, 0.08)',
                        'subtle': '0 1px 2px rgba(0,0,0,0.02)',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="app-layout">
    <script src="mock-data.js"></script>
    <script src="app.js"></script>
<script src="supabase-client.js"></script>
    <script src="components.js"></script>
    <script>
        if (!initPage('locum')) throw new Error('Auth required');

        const session = Auth.getSession();
        const pageContent = initAppLayout('locum', 'bookings', 'My Bookings');
        let currentTab = 'active';

        function getBookings() {
            const data = getMockData();
            return (data.offers || []).filter(o => o.locumId === session.id);
        }

        function renderBookingCard(offer) {
            const now = new Date();
            const offerDate = offer.sessionDate || offer.shiftDate;
            const shiftDate = new Date(offerDate);
            const hoursUntilShift = (shiftDate - now) / (1000 * 60 * 60);
            const proposedRate = offer.agreedRate || offer.proposedRate || 0;

            let actionsHtml = '';
            switch (offer.status) {
                case 'accepted':
                    actionsHtml = `
                        <div class="offer-actions" style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
                            <span class="badge badge-success" style="font-size: 0.82rem; padding: 6px 12px;">Accepted — awaiting practice to confirm</span>
                            <button class="btn btn-small btn-ghost" style="color: var(--danger);" onclick="cancelBooking('${offer.id}', ${hoursUntilShift < 48})">Cancel</button>
                        </div>`;
                    break;
                case 'confirmed':
                    actionsHtml = `
                        <div class="offer-actions" style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
                            ${shiftDate < now ? `<button class="btn btn-small btn-primary" onclick="confirmComplete('${offer.id}')">Confirm Complete</button>` : `<span class="badge badge-success" style="font-size: 0.82rem; padding: 6px 12px;">Confirmed — awaiting session date</span>`}
                            <button class="btn btn-small btn-ghost" style="color: var(--danger);" onclick="cancelBooking('${offer.id}', ${hoursUntilShift < 48})">Cancel</button>
                        </div>`;
                    break;
                case 'completed':
                    const hasReviewed = FeedbackManager.hasReviewed(session.id, offer.id);
                    actionsHtml = `
                        <div class="offer-actions">
                            ${hasReviewed
                                ? '<span class="badge badge-info" style="font-size: 0.82rem; padding: 6px 12px;">Practice rated</span>'
                                : `<a href="leave-feedback.html?offerId=${offer.id}" class="btn btn-small btn-primary">Rate Practice</a>`
                            }
                        </div>`;
                    break;
                case 'cancelled':
                    actionsHtml = `
                        <div class="offer-actions">
                            <span class="badge badge-danger" style="font-size: 0.82rem; padding: 6px 12px;">Cancelled${offer.lateCancellation ? ' (late — reliability affected)' : ''}</span>
                        </div>`;
                    break;
                case 'no_show':
                    actionsHtml = `
                        <div class="offer-actions">
                            <span class="badge badge-danger" style="font-size: 0.82rem; padding: 6px 12px;">No-show — reliability affected</span>
                            ${offer.disputeReason ? '<div style="font-size:0.78rem;color:var(--dark-600);margin-top:6px;">Dispute: ' + sanitizeHTML(offer.disputeReason) + '</div>' : `<button class="btn btn-small btn-ghost" style="margin-top:6px;" onclick="disputeNoShow('${offer.id}')">Dispute</button>`}
                        </div>`;
                    break;
                case 'declined':
                    actionsHtml = '<div class="offer-actions"><span class="badge badge-neutral" style="font-size: 0.82rem; padding: 6px 12px;">You declined this invitation</span></div>';
                    break;
                case 'withdrawn':
                    actionsHtml = '<div class="offer-actions"><span class="badge badge-neutral" style="font-size: 0.82rem; padding: 6px 12px;">Withdrawn by practice</span></div>';
                    break;
                case 'expired':
                    actionsHtml = '<div class="offer-actions"><span class="badge badge-neutral" style="font-size: 0.82rem; padding: 6px 12px;">Expired</span></div>';
                    break;
            }

            // Practice rating display
            let practiceRatingHtml = '';
            {
                const avgRating = FeedbackManager.getPracticeAverageRating(offer.practiceId);
                if (avgRating) {
                    const fullStars = Math.floor(avgRating);
                    let starsHtml = '';
                    for (let s = 0; s < 5; s++) {
                        starsHtml += `<svg width="14" height="14" viewBox="0 0 24 24" fill="${s < fullStars ? '#059669' : '#E2E8F0'}" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
                    }
                    practiceRatingHtml = `<span style="display: inline-flex; align-items: center; gap: 4px; cursor: pointer;" onclick="showPracticeRatings('${offer.practiceId}', '${offer.practiceName.replace(/'/g, "\\'")}')">${starsHtml} <span style="font-size: 0.78rem; color: var(--dark-600);">${avgRating}</span></span>`;
                }
            }

            return `
            <div class="offer-card" data-offer-id="${offer.id}">
                <div class="offer-card-header">
                    <div>
                        <h3 class="offer-card-title">${offer.practiceName}</h3>
                        ${practiceRatingHtml ? `<div style="margin-top: 2px;">${practiceRatingHtml}</div>` : ''}
                        <p class="offer-card-location">${offer.healthBoard}</p>
                    </div>
                    <span class="badge ${getStatusBadge(offer.status)}">${getStatusLabel(offer.status)}</span>
                </div>
                <div class="offer-card-details">
                    <div class="offer-detail">${getIcon('calendar')} <span>${DateUtils.format(offerDate, 'full')}</span></div>
                    <div class="offer-detail">${getIcon('clock')} <span>${offer.startTime} - ${offer.endTime}</span></div>
                    <div class="offer-detail">${getIcon('tag')} <span>${offer.sessionType}</span></div>
                </div>
                <div class="offer-card-footer">
                    <div class="offer-rates">
                        <span>Rate: ${formatCurrency(proposedRate)} / ${offer.sessionType} session</span>
                    </div>
                    <span class="offer-date">${offer.sentDate ? 'Invited: ' + DateUtils.format(offer.sentDate, 'medium') : ''}</span>
                </div>
                ${actionsHtml}
            </div>`;
        }

        function showPracticeRatings(practiceId, practiceName) {
            const ratings = FeedbackManager.getPracticeRatings(practiceId);
            const avg = FeedbackManager.getPracticeAverageRating(practiceId);
            let starsHtml = '';
            const fullStars = avg ? Math.floor(avg) : 0;
            for (let s = 0; s < 5; s++) {
                starsHtml += `<svg width="22" height="22" viewBox="0 0 24 24" fill="${s < fullStars ? '#059669' : '#E2E8F0'}" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
            }
            const reviewsHtml = ratings.length > 0 ? ratings.map(r => {
                let rStars = '';
                const rFull = r.ratings.overall || 0;
                for (let s = 0; s < 5; s++) {
                    rStars += `<svg width="14" height="14" viewBox="0 0 24 24" fill="${s < rFull ? '#059669' : '#E2E8F0'}" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
                }
                const mockData = getMockData();
                const locum = mockData.locums ? mockData.locums.find(l => l.id === r.fromId) : null;
                const reviewerName = locum ? `${locum.title} ${locum.firstName} ${locum.lastName}` : (r.locumName || 'GP');
                return `<div style="padding: 12px; background: var(--gray-50); border-radius: 8px; margin-bottom: 8px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                        <span style="font-weight: 600; font-size: 0.88rem; color: var(--dark);">${reviewerName}</span>
                        <span style="font-size: 0.75rem; color: var(--dark-600);">${DateUtils.format(r.timestamp, 'medium')}</span>
                    </div>
                    <div style="display: flex; gap: 2px; margin-bottom: 4px;">${rStars}</div>
                    ${r.comment ? `<p style="font-size: 0.85rem; color: var(--dark-700); margin-top: 4px;">${sanitizeHTML(r.comment)}</p>` : ''}
                </div>`;
            }).join('') : '<p style="color: var(--dark-600); text-align: center; padding: 20px;">No reviews yet.</p>';

            Modal.show({
                title: practiceName + ' — Ratings',
                size: 'medium',
                body: `
                    <div style="text-align: center; margin-bottom: 20px;">
                        <div style="display: flex; justify-content: center; gap: 4px; margin-bottom: 4px;">${starsHtml}</div>
                        <span style="font-size: 1.4rem; font-weight: 700; color: var(--dark);">${avg || '-'}</span>
                        <span style="font-size: 0.85rem; color: var(--dark-600); margin-left: 4px;">(${ratings.length} review${ratings.length !== 1 ? 's' : ''})</span>
                    </div>
                    <div>${reviewsHtml}</div>
                `,
                footer: '<button class="btn btn-ghost" data-modal-close>Close</button>'
            });
        }

        function renderBookings() {
            const bookings = getBookings();
            const now = new Date();

            // Active: accepted, confirmed (future)
            const active = bookings.filter(o => ['accepted', 'confirmed'].includes(o.status) && new Date(o.sessionDate || o.shiftDate) >= now);
            // Past: completed, cancelled, no_show, declined, withdrawn, expired, or past-date accepted/confirmed
            const past = bookings.filter(o =>
                ['completed', 'cancelled', 'no_show', 'declined', 'withdrawn', 'expired'].includes(o.status) ||
                (['accepted', 'confirmed'].includes(o.status) && new Date(o.sessionDate || o.shiftDate) < now)
            );

            let filtered;
            if (currentTab === 'active') filtered = active;
            else if (currentTab === 'past') filtered = past;
            else filtered = bookings.filter(o => !['sent', 'viewed', 'negotiating'].includes(o.status));

            // Sort by date descending
            filtered.sort((a, b) => new Date(b.sessionDate || b.shiftDate) - new Date(a.sessionDate || a.shiftDate));

            pageContent.innerHTML = `
                <h1 style="font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--dark); margin-bottom: 8px;">My Bookings</h1>

                <div class="tabs">
                    <button class="tab-item ${currentTab === 'active' ? 'active' : ''}" onclick="switchTab('active')">Active Bookings</button>
                    <button class="tab-item ${currentTab === 'past' ? 'active' : ''}" onclick="switchTab('past')">Past</button>
                    <button class="tab-item ${currentTab === 'all' ? 'active' : ''}" onclick="switchTab('all')">All</button>
                </div>

                <div style="background: var(--gray-50); border-radius: var(--radius); padding: 10px 16px; margin-bottom: 16px; font-size: 0.8rem; color: var(--dark-600); line-height: 1.6;">
                    <strong>Booking flow:</strong> Invitation received &rarr; Accepted &rarr; Practice confirms &rarr; Session date &rarr; Completed
                </div>

                <div id="bookingsList">
                    ${filtered.length > 0
                        ? filtered.map(o => renderBookingCard(o)).join('')
                        : renderEmptyState('file-text', 'No bookings found', currentTab === 'active' ? 'No active bookings. Visit your invitations to review pending session offers.' : 'No past bookings.', 'View Invitations', 'available-shifts.html')
                    }
                </div>
            `;
        }

        window.switchTab = function(tab) {
            currentTab = tab;
            renderBookings();
        };

        window.cancelBooking = function(offerId, isLate) {
            const warningMsg = isLate
                ? '<p style="font-size:0.95rem;color:var(--danger);font-weight:600;margin-bottom:12px;">This session is less than 48 hours away!</p><p style="font-size:0.9rem;color:var(--dark-600);margin-bottom:8px;">Late cancellations reduce your reliability score by 5 points.</p>'
                : '';
            Modal.show({
                title: isLate ? 'Late Cancellation Warning' : 'Cancel Booking',
                body: `<div style="padding: 8px 0;">${warningMsg}<p style="font-size: 0.9rem; color: var(--dark-600);">Are you sure you want to cancel this booking? The practice will be notified.</p></div>`,
                footer: '<button class="btn btn-ghost" data-modal-close>Keep Booking</button><button class="btn btn-primary" style="background:var(--danger);border-color:var(--danger);" id="confirmCancelBtn">Cancel Booking</button>',
                onOpen: function(overlay) {
                    overlay.querySelector('#confirmCancelBtn').addEventListener('click', function() {
                        Modal.close(overlay);
                        const result = Booking.cancelBooking(offerId, 'locum');
                        if (result && !result.error) {
                            Toast.show('Booking cancelled. The practice has been notified.', 'info');
                        } else {
                            Toast.show((result && result.message) || 'Failed to cancel.', 'error');
                        }
                        renderBookings();
                    });
                }
            });
        };

        window.confirmComplete = function(offerId) {
            const result = Booking.markComplete(offerId, true, 'locum');
            if (result === 'too_early') {
                const data = getMockData();
                const offer = data.offers.find(o => o.id === offerId);
                const dateStr = offer ? DateUtils.format(offer.sessionDate || offer.shiftDate, 'full') : 'the scheduled date';
                Toast.show('This session cannot be completed yet. The date (' + dateStr + ') has not passed.', 'warning', 5000);
                return;
            }
            if (result && !result.error) {
                Toast.show('Session marked as complete! Invoice generated.', 'success');
            } else {
                Toast.show((result && result.message) || 'Failed to confirm completion.', 'error');
            }
            renderBookings();
        };

        window.disputeNoShow = function(offerId) {
            Modal.show({
                title: 'Dispute No-Show',
                size: 'medium',
                body: '<p style="margin-bottom:16px;color:var(--dark-600);">Explain why you believe this no-show was recorded in error.</p><div class="form-group"><label class="form-label">Reason</label><textarea id="disputeReason" class="form-textarea" rows="4" placeholder="Explain..." required></textarea></div>',
                footer: '<button class="btn btn-ghost" data-modal-close>Cancel</button><button class="btn btn-primary" id="submitDisputeBtn">Submit</button>',
                onOpen: function(overlay) {
                    overlay.querySelector('#submitDisputeBtn').addEventListener('click', function() {
                        var reason = overlay.querySelector('#disputeReason').value.trim();
                        if (!reason) { Toast.show('Please provide a reason.', 'warning'); return; }
                        var data = getMockData();
                        var offer = data.offers.find(o => o.id === offerId);
                        if (offer) {
                            offer.disputeReason = reason;
                            if (typeof Booking.addNotification === 'function') {
                                Booking.addNotification(data, offer.practiceId, 'no_show_disputed', 'No-Show Disputed',
                                    'A locum has disputed the no-show for ' + DateUtils.format(offer.sessionDate || offer.shiftDate, 'medium') + '.');
                            } else {
                                if (!data.notifications) data.notifications = [];
                                data.notifications.push({
                                    userId: offer.practiceId,
                                    type: 'no_show_disputed',
                                    title: 'No-Show Disputed',
                                    message: 'A locum has disputed the no-show for ' + DateUtils.format(offer.sessionDate || offer.shiftDate, 'medium') + '. Reason: ' + reason,
                                    date: new Date().toISOString(),
                                    read: false
                                });
                            }
                            saveMockData(data);
                        }
                        Modal.close(overlay);
                        Toast.show('Dispute submitted.', 'success');
                        setTimeout(function() { renderBookings(); }, 500);
                    });
                }
            });
        };

        renderBookings();
    </script>
</body>
</html>
