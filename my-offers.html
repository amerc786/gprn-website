<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>My Offers - GPRN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="app-layout">
    <script src="mock-data.js"></script>
    <script src="app.js"></script>
    <script src="components.js"></script>
    <script>
        if (!initPage('locum')) throw new Error('Auth required');

        const pageContent = initAppLayout('locum', 'offers', 'My Offers');
        let currentTab = 'future';

        function getOffers() {
            const data = getMockData();
            const user = Auth.getCurrentUser();
            return (data.offers || []).filter(o => o.locumId === user.id);
        }

        function renderOfferCardEnhanced(offer) {
            const now = new Date();
            const shiftDate = new Date(offer.shiftDate);
            const hoursUntilShift = (shiftDate - now) / (1000 * 60 * 60);

            // Build status-specific actions
            let actionsHtml = '';
            switch (offer.status) {
                case 'pending':
                    actionsHtml = `
                        <div class="offer-actions">
                            <button class="btn btn-small btn-ghost" onclick="withdrawOffer('${offer.id}')">Withdraw</button>
                        </div>`;
                    break;
                case 'accepted':
                    actionsHtml = `
                        <div class="offer-actions" style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
                            <button class="btn btn-small btn-primary" onclick="acknowledgeOffer('${offer.id}')">Acknowledge</button>
                            <button class="btn btn-small btn-ghost" style="color: var(--danger);" onclick="rejectOffer('${offer.id}', ${hoursUntilShift < 48})">Reject</button>
                        </div>`;
                    break;
                case 'acknowledged':
                    actionsHtml = `
                        <div class="offer-actions" style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
                            <button class="btn btn-small btn-primary" onclick="confirmAttendance('${offer.id}')">Confirm Attendance</button>
                            <button class="btn btn-small btn-ghost" style="color: var(--danger);" onclick="rejectOffer('${offer.id}', ${hoursUntilShift < 48})">Reject</button>
                        </div>`;
                    break;
                case 'confirmed':
                    actionsHtml = `
                        <div class="offer-actions" style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
                            ${new Date(offer.shiftDate) < new Date() ? `<button class="btn btn-small btn-primary" onclick="confirmComplete('${offer.id}')">Confirm Shift Complete</button>` : `<span class="badge badge-success" style="font-size: 0.82rem; padding: 6px 12px;">Confirmed - awaiting shift date</span>`}
                            <button class="btn btn-small btn-ghost" style="color: var(--danger);" onclick="rejectOffer('${offer.id}', ${hoursUntilShift < 48})">Reject</button>
                        </div>`;
                    break;
                case 'negotiating':
                    actionsHtml = `
                        <div class="offer-actions">
                            ${offer.negotiations ? `
                                <div style="background: rgba(14,165,233,0.06); border-radius: 8px; padding: 10px 14px; margin-bottom: 10px; width: 100%;">
                                    <div style="font-size: 0.78rem; font-weight: 600; color: var(--secondary); margin-bottom: 6px;">Rate Negotiation</div>
                                    ${offer.negotiations.map(n => '<div style="font-size:0.8rem;color:var(--dark-600);margin-bottom:3px;"><strong>' + (n.from === 'practice' ? offer.practiceName : 'You') + ':</strong> ' + formatCurrency(n.rate) + (n.accepted ? ' ✓ Agreed' : '') + (n.message ? ' — ' + n.message : '') + '</div>').join('')}
                                </div>
                            ` : ''}
                            ${offer.negotiations && offer.negotiations.length > 0 && offer.negotiations[offer.negotiations.length - 1].from === 'practice' ? `
                                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                                    <button class="btn btn-small btn-primary" onclick="acceptNegotiation('${offer.id}')">Accept Rate (${formatCurrency(offer.counterRate)})</button>
                                    <button class="btn btn-small" style="background: var(--secondary); color: white; border-color: var(--secondary);" onclick="counterNegotiation('${offer.id}', ${offer.counterRate})">Counter</button>
                                    <button class="btn btn-small btn-ghost" onclick="withdrawOffer('${offer.id}')">Withdraw</button>
                                </div>
                            ` : `
                                <span class="badge badge-warning" style="font-size: 0.82rem; padding: 6px 12px;">Waiting for practice response</span>
                            `}
                        </div>`;
                    break;
                case 'completed':
                    const hasReviewed = FeedbackManager.hasReviewed(Auth.getSession().id, offer.id);
                    actionsHtml = `
                        <div class="offer-actions">
                            ${hasReviewed
                                ? '<span class="badge badge-info" style="font-size: 0.82rem; padding: 6px 12px;">Feedback submitted</span>'
                                : `<a href="leave-feedback.html?offerId=${offer.id}" class="btn btn-small btn-primary">Leave Feedback</a>`
                            }
                        </div>`;
                    break;
                case 'cancelled':
                    actionsHtml = `
                        <div class="offer-actions">
                            <span class="badge badge-danger" style="font-size: 0.82rem; padding: 6px 12px;">Cancelled${offer.lateCancellation ? ' (late - reliability affected)' : ''}</span>
                        </div>`;
                    break;
                case 'no_show':
                    actionsHtml = `
                        <div class="offer-actions">
                            <span class="badge badge-danger" style="font-size: 0.82rem; padding: 6px 12px;">No-show recorded - reliability score affected</span>
                        </div>`;
                    break;
                case 'rejected_by_locum':
                    actionsHtml = `
                        <div class="offer-actions">
                            <span class="badge badge-danger" style="font-size: 0.82rem; padding: 6px 12px;">You rejected this shift${offer.lateCancellation ? ' (late - reliability affected)' : ''}</span>
                        </div>`;
                    break;
                case 'declined':
                    actionsHtml = `
                        <div class="offer-actions">
                            <span class="badge badge-neutral" style="font-size: 0.82rem; padding: 6px 12px;">Declined by practice</span>
                        </div>`;
                    break;
                case 'withdrawn':
                    actionsHtml = `
                        <div class="offer-actions">
                            <span class="badge badge-neutral" style="font-size: 0.82rem; padding: 6px 12px;">${offer.autoWithdrawn ? 'Auto-withdrawn (another offer accepted)' : 'Withdrawn'}</span>
                        </div>`;
                    break;
            }

            return `
            <div class="offer-card" data-offer-id="${offer.id}">
                <div class="offer-card-header">
                    <div>
                        <h3 class="offer-card-title">${offer.practiceName}</h3>
                        <p class="offer-card-location">${offer.healthBoard}</p>
                    </div>
                    <span class="badge ${getStatusBadge(offer.status)}">${offer.status.charAt(0).toUpperCase() + offer.status.slice(1).replace('_', ' ')}</span>
                </div>
                <div class="offer-card-details">
                    <div class="offer-detail">
                        ${getIcon('calendar')}
                        <span>${DateUtils.format(offer.shiftDate, 'full')}</span>
                    </div>
                    <div class="offer-detail">
                        ${getIcon('clock')}
                        <span>${offer.startTime} - ${offer.endTime}</span>
                    </div>
                    <div class="offer-detail">
                        ${getIcon('tag')}
                        <span>${offer.sessionType}</span>
                    </div>
                    ${!offer.housecalls ? '<span class="badge badge-neutral" style="margin-left:auto">No Housecalls</span>' : ''}
                </div>
                <div class="offer-card-footer">
                    <div class="offer-rates">
                        <span>Your rates: AM ${formatCurrency(offer.rateAM)}, PM ${formatCurrency(offer.ratePM)}, Day ${formatCurrency(offer.rateFullDay)}</span>
                    </div>
                    <span class="offer-date">Offer made: ${DateUtils.format(offer.offerDate, 'medium')}</span>
                </div>
                ${offer.comment ? '<div class="offer-comment"><strong>Your comment:</strong> ' + offer.comment + '</div>' : ''}
                ${actionsHtml}
            </div>`;
        }

        function renderOffers() {
            const offers = getOffers();
            const now = new Date();
            const future = offers.filter(o => new Date(o.shiftDate) >= now);
            const past = offers.filter(o => new Date(o.shiftDate) < now);

            let filtered;
            if (currentTab === 'future') filtered = future;
            else if (currentTab === 'past') filtered = past;
            else filtered = offers;

            pageContent.innerHTML = `
                <div class="tabs">
                    <button class="tab-item ${currentTab === 'future' ? 'active' : ''}" onclick="switchTab('future')">Future Shifts</button>
                    <button class="tab-item ${currentTab === 'past' ? 'active' : ''}" onclick="switchTab('past')">Past Shifts</button>
                    <button class="tab-item ${currentTab === 'all' ? 'active' : ''}" onclick="switchTab('all')">All</button>
                </div>
                <div id="offersList">
                    ${filtered.length > 0
                        ? filtered.map(o => renderOfferCardEnhanced(o)).join('')
                        : renderEmptyState('file-text', 'No offers found', 'No pending offers or upcoming bookings', 'Browse Shifts', 'available-shifts.html')
                    }
                </div>
            `;
        }

        function switchTab(tab) {
            currentTab = tab;
            renderOffers();
        }

        function withdrawOffer(offerId) {
            const data = getMockData();
            const offer = data.offers.find(o => o.id === offerId);
            if (offer) {
                offer.status = 'withdrawn';
                // Decrement the shift's applicant count
                const shift = data.shifts.find(s => s.id === offer.shiftId);
                if (shift && shift.applicants > 0) {
                    shift.applicants--;
                }
                saveMockData(data);
                Toast.show('Offer withdrawn successfully', 'success');
                renderOffers();
            }
        }

        function confirmAttendance(offerId) {
            const success = Booking.confirmAttendance(offerId);
            if (success) {
                Toast.show('Attendance confirmed! You are all set for this shift.', 'success');
            } else {
                Toast.show('Failed to confirm attendance. Please try again.', 'error');
            }
            renderOffers();
        }

        function cancelShift(offerId, isLateCancellation) {
            if (isLateCancellation) {
                Modal.show({
                    title: 'Late Cancellation Warning',
                    body: `
                        <div style="padding: 8px 0;">
                            <p style="font-size: 0.95rem; color: var(--danger); font-weight: 600; margin-bottom: 12px;">
                                This shift is less than 48 hours away!
                            </p>
                            <p style="font-size: 0.9rem; color: var(--dark-600); margin-bottom: 8px;">
                                Late cancellations will negatively affect your booking reliability score. This may impact your visibility to practices.
                            </p>
                            <p style="font-size: 0.9rem; color: var(--dark-600);">
                                Are you sure you want to cancel?
                            </p>
                        </div>
                    `,
                    footer: `
                        <button class="btn btn-ghost" data-modal-close>Keep Shift</button>
                        <button class="btn btn-primary" style="background: var(--danger); border-color: var(--danger);" id="confirmCancelBtn">Cancel Shift</button>
                    `,
                    onOpen: function(overlay) {
                        overlay.querySelector('#confirmCancelBtn').addEventListener('click', function() {
                            Modal.close(overlay);
                            performCancel(offerId);
                        });
                    }
                });
            } else {
                Modal.show({
                    title: 'Cancel Shift',
                    body: '<p style="font-size: 0.9rem; color: var(--dark-600); padding: 8px 0;">Are you sure you want to cancel this shift? The practice will be notified.</p>',
                    footer: `
                        <button class="btn btn-ghost" data-modal-close>Keep Shift</button>
                        <button class="btn btn-primary" style="background: var(--danger); border-color: var(--danger);" id="confirmCancelBtn">Cancel Shift</button>
                    `,
                    onOpen: function(overlay) {
                        overlay.querySelector('#confirmCancelBtn').addEventListener('click', function() {
                            Modal.close(overlay);
                            performCancel(offerId);
                        });
                    }
                });
            }
        }

        function performCancel(offerId) {
            const success = Booking.cancelShift(offerId, 'locum');
            if (success) {
                Toast.show('Shift cancelled. The practice has been notified.', 'info');
            } else {
                Toast.show('Failed to cancel shift. Please try again.', 'error');
            }
            renderOffers();
        }

        function acknowledgeOffer(offerId) {
            const success = Booking.acknowledgeOffer(offerId);
            if (success) {
                Toast.show('Offer acknowledged! The practice has been notified.', 'success');
            } else {
                Toast.show('Failed to acknowledge offer.', 'error');
            }
            renderOffers();
        }

        function rejectOffer(offerId, isLate) {
            if (isLate) {
                Modal.show({
                    title: 'Late Rejection Warning',
                    body: '<div style="padding:8px 0;"><p style="font-size:0.95rem;color:var(--danger);font-weight:600;margin-bottom:12px;">This shift is less than 48 hours away!</p><p style="font-size:0.9rem;color:var(--dark-600);margin-bottom:8px;">Late rejections negatively affect your booking reliability score.</p><p style="font-size:0.9rem;color:var(--dark-600);">The shift will be automatically relisted for other locums.</p></div>',
                    footer: '<button class="btn btn-ghost" data-modal-close>Keep Shift</button><button class="btn btn-primary" style="background:var(--danger);border-color:var(--danger);" id="confirmRejectBtn">Reject Shift</button>',
                    onOpen: function(overlay) { overlay.querySelector('#confirmRejectBtn').addEventListener('click', function() { Modal.close(overlay); doReject(offerId); }); }
                });
            } else {
                Modal.show({
                    title: 'Reject Shift',
                    body: '<p style="font-size:0.9rem;color:var(--dark-600);padding:8px 0;">Are you sure you want to reject this shift? The practice will be notified and the shift will be automatically relisted.</p>',
                    footer: '<button class="btn btn-ghost" data-modal-close>Keep Shift</button><button class="btn btn-primary" style="background:var(--danger);border-color:var(--danger);" id="confirmRejectBtn">Reject Shift</button>',
                    onOpen: function(overlay) { overlay.querySelector('#confirmRejectBtn').addEventListener('click', function() { Modal.close(overlay); doReject(offerId); }); }
                });
            }
        }

        function doReject(offerId) {
            const success = Booking.rejectAcceptedOffer(offerId);
            if (success) {
                Toast.show('Shift rejected. The practice has been notified and the shift has been relisted.', 'info');
            } else {
                Toast.show('Failed to reject shift.', 'error');
            }
            renderOffers();
        }

        function confirmComplete(offerId) {
            const success = Booking.confirmCompletion(offerId);
            if (success) {
                Toast.show('Shift marked as complete! Invoice generated. The practice has been notified.', 'success');
            } else {
                Toast.show('Failed to confirm completion.', 'error');
            }
            renderOffers();
        }

        function acceptNegotiation(offerId) {
            Booking.respondToCounter(offerId, true);
            Toast.show('Rate accepted! Your offer is now pending approval.', 'success');
            renderOffers();
        }

        function counterNegotiation(offerId, currentRate) {
            Modal.show({
                title: 'Counter-Offer',
                body: '<div style="padding:8px 0;"><p style="font-size:0.88rem;color:var(--dark-600);margin-bottom:16px;">Practice offered: <strong>' + formatCurrency(currentRate) + '</strong></p><div class="form-group"><label class="form-label">Your counter-rate (£)</label><input type="number" id="locumCounterRate" class="form-input" placeholder="e.g. 450" step="10" min="0"></div><div class="form-group"><label class="form-label">Message (optional)</label><textarea id="locumCounterMsg" class="form-input" rows="2" placeholder="e.g. I can do it for this rate..."></textarea></div></div>',
                footer: '<button class="btn btn-ghost" data-modal-close>Cancel</button><button class="btn btn-primary" id="sendLocumCounterBtn">Send Counter</button>',
                onOpen: function(overlay) {
                    overlay.querySelector('#sendLocumCounterBtn').addEventListener('click', function() {
                        var rate = Number(overlay.querySelector('#locumCounterRate').value);
                        var msg = overlay.querySelector('#locumCounterMsg').value.trim();
                        if (!rate || rate <= 0) { Toast.show('Please enter a valid rate', 'error'); return; }
                        Booking.respondToCounter(offerId, false, rate, msg);
                        Modal.close(overlay);
                        Toast.show('Counter-offer sent to practice', 'success');
                        renderOffers();
                    });
                }
            });
        }

        renderOffers();
    </script>
</body>
</html>
