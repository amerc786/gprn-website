<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - GPRN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="app-layout">
    <script src="mock-data.js"></script>
    <script src="app.js"></script>
    <script src="components.js"></script>
    <script>
        if (!initPage('practice')) throw new Error('Auth required');

        const session = Auth.getSession();
        const practice = Auth.getCurrentUser();
        const pageContent = initAppLayout('practice', 'settings', 'Settings');

        let activeTab = 'practice-info';

        const healthBoards = [
            'Aneurin Bevan', 'Betsi Cadwaladr', 'Cardiff and Vale',
            'Cwm Taf Morgannwg', 'Hywel Dda', 'Powys', 'Swansea Bay'
        ];

        const computerSystems = ['EMIS', 'Vision', 'TPP'];

        // Notification preferences (default mock state)
        const notifPrefs = {
            newApplications: true,
            shiftReminders: true,
            locumConfirmations: true,
            billingAlerts: true,
            weeklyReport: false,
            marketingUpdates: false
        };

        function render() {
            pageContent.innerHTML = `
                <h1 style="font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--dark); margin-bottom: 24px;">
                    Settings
                </h1>

                <div class="tabs">
                    <button class="tab-item ${activeTab === 'practice-info' ? 'active' : ''}" onclick="switchTab('practice-info')">Practice Info</button>
                    <button class="tab-item ${activeTab === 'contact-person' ? 'active' : ''}" onclick="switchTab('contact-person')">Contact Person</button>
                    <button class="tab-item ${activeTab === 'notifications' ? 'active' : ''}" onclick="switchTab('notifications')">Notifications</button>
                </div>

                <div class="tab-pane ${activeTab === 'practice-info' ? 'active' : ''}" id="tab-practice-info">
                    <div class="content-card">
                        <div class="content-card-header">
                            <h2>Practice Information</h2>
                        </div>
                        <div class="content-card-body">
                            <form id="practiceInfoForm" novalidate>
                                <div class="form-group">
                                    <label class="form-label" for="practiceName">Practice Name</label>
                                    <input type="text" id="practiceName" class="form-input" value="${practice.practiceName}" required>
                                    <div class="form-error"></div>
                                </div>

                                <div class="form-row">
                                    <div class="form-group">
                                        <label class="form-label" for="healthBoard">Health Board</label>
                                        <select id="healthBoard" class="form-select" required>
                                            ${healthBoards.map(hb => `<option value="${hb}" ${practice.healthBoard === hb ? 'selected' : ''}>${hb}</option>`).join('')}
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label" for="computerSystem">Computer System</label>
                                        <select id="computerSystem" class="form-select" required>
                                            ${computerSystems.map(cs => `<option value="${cs}" ${practice.computerSystem === cs ? 'selected' : ''}>${cs}</option>`).join('')}
                                        </select>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label class="form-label" for="address">Address</label>
                                    <input type="text" id="address" class="form-input" value="${practice.address}" required>
                                </div>

                                <div class="form-row">
                                    <div class="form-group">
                                        <label class="form-label" for="city">City</label>
                                        <input type="text" id="city" class="form-input" value="${practice.city}">
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label" for="postcode">Postcode</label>
                                        <input type="text" id="postcode" class="form-input" value="${practice.postcode}">
                                    </div>
                                </div>

                                <div class="form-row">
                                    <div class="form-group">
                                        <label class="form-label" for="phone">Phone</label>
                                        <input type="tel" id="phone" class="form-input" value="${practice.phone}">
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label" for="patientListSize">Patient List Size</label>
                                        <input type="number" id="patientListSize" class="form-input" value="${practice.patientListSize}">
                                    </div>
                                </div>

                                <div style="padding-top: 12px;">
                                    <button type="submit" class="btn btn-primary">Save Practice Info</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="tab-pane ${activeTab === 'contact-person' ? 'active' : ''}" id="tab-contact-person">
                    <div class="content-card">
                        <div class="content-card-header">
                            <h2>Contact Person</h2>
                        </div>
                        <div class="content-card-body">
                            <form id="contactForm" novalidate>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label class="form-label" for="contactName">Full Name</label>
                                        <input type="text" id="contactName" class="form-input" value="${practice.contactName}" required>
                                        <div class="form-error"></div>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label" for="contactRole">Role</label>
                                        <input type="text" id="contactRole" class="form-input" value="${practice.contactRole}">
                                    </div>
                                </div>

                                <div class="form-row">
                                    <div class="form-group">
                                        <label class="form-label" for="contactEmail">Email</label>
                                        <input type="email" id="contactEmail" class="form-input" value="${practice.contactEmail}" required data-validate="email">
                                        <div class="form-error"></div>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label" for="contactPhone">Phone</label>
                                        <input type="tel" id="contactPhone" class="form-input" value="${practice.contactPhone}">
                                    </div>
                                </div>

                                <div style="padding-top: 12px;">
                                    <button type="submit" class="btn btn-primary">Save Contact Info</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="tab-pane ${activeTab === 'notifications' ? 'active' : ''}" id="tab-notifications">
                    <div class="content-card">
                        <div class="content-card-header">
                            <h2>Email Notifications</h2>
                        </div>
                        <div class="content-card-body">
                            <div class="form-toggle">
                                <span class="form-toggle-label">New shift applications</span>
                                <div class="toggle-switch ${notifPrefs.newApplications ? 'active' : ''}" data-pref="newApplications" onclick="toggleNotif(this)"></div>
                            </div>
                            <div class="form-toggle">
                                <span class="form-toggle-label">Shift reminders (24 hours before)</span>
                                <div class="toggle-switch ${notifPrefs.shiftReminders ? 'active' : ''}" data-pref="shiftReminders" onclick="toggleNotif(this)"></div>
                            </div>
                            <div class="form-toggle">
                                <span class="form-toggle-label">Locum booking confirmations</span>
                                <div class="toggle-switch ${notifPrefs.locumConfirmations ? 'active' : ''}" data-pref="locumConfirmations" onclick="toggleNotif(this)"></div>
                            </div>
                            <div class="form-toggle">
                                <span class="form-toggle-label">Billing and payment alerts</span>
                                <div class="toggle-switch ${notifPrefs.billingAlerts ? 'active' : ''}" data-pref="billingAlerts" onclick="toggleNotif(this)"></div>
                            </div>
                            <div class="form-toggle">
                                <span class="form-toggle-label">Weekly shift coverage report</span>
                                <div class="toggle-switch ${notifPrefs.weeklyReport ? 'active' : ''}" data-pref="weeklyReport" onclick="toggleNotif(this)"></div>
                            </div>
                            <div class="form-toggle" style="border-bottom: none;">
                                <span class="form-toggle-label">GPRN news and updates</span>
                                <div class="toggle-switch ${notifPrefs.marketingUpdates ? 'active' : ''}" data-pref="marketingUpdates" onclick="toggleNotif(this)"></div>
                            </div>

                            <div style="padding-top: 20px;">
                                <button class="btn btn-primary" onclick="saveNotifications()">Save Notification Preferences</button>
                            </div>
                        </div>
                    </div>

                    <div class="content-card" style="margin-top: 20px;">
                        <div class="content-card-header">
                            <h2>Email Log</h2>
                        </div>
                        <div class="content-card-body">
                            ${(() => {
                                const emailLog = EmailManager.getLog(session.id).slice(0, 10);
                                if (emailLog.length === 0) {
                                    return '<p style="color: var(--dark-600); font-size: 0.88rem; padding: 12px 0;">No emails sent yet.</p>';
                                }
                                return emailLog.map(email => {
                                    const time = new Date(email.timestamp);
                                    const timeStr = time.toLocaleDateString() + ' ' + time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                                    return '<div class="email-log-item">' +
                                        '<div class="email-log-icon">' + getIcon('mail') + '</div>' +
                                        '<div class="email-log-info">' +
                                            '<div class="email-log-subject">' + email.subject + '</div>' +
                                            '<div class="email-log-body">' + (email.body || '').substring(0, 120) + (email.body && email.body.length > 120 ? '...' : '') + '</div>' +
                                        '</div>' +
                                        '<div class="email-log-time">' + timeStr + '</div>' +
                                    '</div>';
                                }).join('');
                            })()}
                        </div>
                    </div>
                </div>
            `;

            // Attach form handlers after rendering
            attachFormHandlers();
        }

        function switchTab(tab) {
            activeTab = tab;
            render();
        }

        function toggleNotif(el) {
            el.classList.toggle('active');
            const pref = el.dataset.pref;
            if (pref) notifPrefs[pref] = el.classList.contains('active');
        }

        function attachFormHandlers() {
            const practiceForm = document.getElementById('practiceInfoForm');
            if (practiceForm) {
                practiceForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const d = getMockData();
                    const p = d.practices.find(pr => pr.id === session.id);
                    if (p) {
                        p.practiceName = document.getElementById('practiceName').value;
                        p.healthBoard = document.getElementById('healthBoard').value;
                        p.computerSystem = document.getElementById('computerSystem').value;
                        p.address = document.getElementById('address').value;
                        p.city = document.getElementById('city').value;
                        p.postcode = document.getElementById('postcode').value;
                        p.phone = document.getElementById('phone').value;
                        p.patientListSize = parseInt(document.getElementById('patientListSize').value) || 0;
                        saveMockData(d);
                    }
                    Toast.show('Practice information saved successfully.', 'success');
                });
            }

            const contactForm = document.getElementById('contactForm');
            if (contactForm) {
                contactForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const d = getMockData();
                    const p = d.practices.find(pr => pr.id === session.id);
                    if (p) {
                        p.contactName = document.getElementById('contactName').value;
                        p.contactRole = document.getElementById('contactRole').value;
                        p.contactEmail = document.getElementById('contactEmail').value;
                        p.contactPhone = document.getElementById('contactPhone').value;
                        saveMockData(d);
                    }
                    Toast.show('Contact information saved successfully.', 'success');
                });
            }
        }

        function saveNotifications() {
            Toast.show('Notification preferences saved successfully.', 'success');
        }

        render();
    </script>
</body>
</html>
