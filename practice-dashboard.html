<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Dashboard - GPRN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="app-layout">
    <script src="mock-data.js"></script>
    <script src="app.js"></script>
    <script src="components.js"></script>
    <script>
        if (!initPage('practice')) throw new Error('Auth required');

        const session = Auth.getSession();
        Booking.expireOffers();
        const data = getMockData();
        const practice = Auth.getCurrentUser();
        const pageContent = initAppLayout('practice', 'dashboard', 'Dashboard');

        // Compute stats — new model uses sessionNeeds instead of shifts
        const sessionNeeds = (data.sessionNeeds || []).filter(n => n.practiceId === session.id);
        const openSessions = sessionNeeds.filter(n => n.status === 'open');
        const practiceOffers = data.offers.filter(o => o.practiceId === session.id);
        const now = new Date();
        const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
        const monthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        const filledThisMonth = practiceOffers.filter(o =>
            (o.status === 'accepted' || o.status === 'completed' || o.status === 'confirmed') &&
            new Date(o.sessionDate || o.shiftDate) >= monthStart && new Date(o.sessionDate || o.shiftDate) <= monthEnd
        );
        const monthlySpend = filledThisMonth.reduce((sum, o) => {
            return sum + (o.agreedRate || o.proposedRate || 0);
        }, 0);

        // Fill rate metric
        const totalNeedCount = sessionNeeds.length;
        const filledNeedCount = sessionNeeds.filter(n => n.status === 'filled').length;
        const completedOfferCount = practiceOffers.filter(o => o.status === 'completed' || o.status === 'accepted' || o.status === 'confirmed').length;
        const fillRate = totalNeedCount > 0 ? Math.round(((filledNeedCount + completedOfferCount) / Math.max(totalNeedCount, 1)) * 100) : 0;
        const fillRateDisplay = Math.min(fillRate, 100);

        // Coverage data for Mon-Fri — store dates for click handlers
        const weekDays = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'];
        const today = new Date();
        const dayOfWeek = today.getDay();
        const monday = new Date(today);
        monday.setDate(today.getDate() - ((dayOfWeek + 6) % 7));

        const coverageDates = [];
        const coverageData = weekDays.map((day, i) => {
            const d = new Date(monday);
            d.setDate(monday.getDate() + i);
            const dateStr = d.toISOString().split('T')[0];
            coverageDates.push(dateStr);
            const totalNeeds = sessionNeeds.filter(n => n.date === dateStr).length;
            const filledNeeds = practiceOffers.filter(o =>
                (o.sessionDate || o.shiftDate) === dateStr &&
                (o.status === 'accepted' || o.status === 'confirmed' || o.status === 'completed')
            ).length;
            const pct = totalNeeds > 0 ? Math.round((filledNeeds / totalNeeds) * 100) : 0;
            return { day, pct, totalShifts: totalNeeds, filledShifts: filledNeeds, dateStr };
        });

        // Top locums - most used based on completed offers
        const locumUsage = {};
        practiceOffers.filter(o => o.status === 'completed' || o.status === 'accepted').forEach(o => {
            locumUsage[o.locumId] = (locumUsage[o.locumId] || 0) + 1;
        });
        const topLocums = Object.entries(locumUsage)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 3)
            .map(([locumId, count]) => {
                const locum = data.locums.find(l => l.id === locumId);
                const avgRating = FeedbackManager.getAverageRating(locumId);
                return {
                    id: locumId,
                    name: locum ? `${locum.title} ${locum.firstName} ${locum.lastName}` : 'Unknown',
                    count: count,
                    reliability: locum ? locum.bookingReliability : 0,
                    rating: avgRating
                };
            });

        // Spending trend — store month metadata for click handlers
        const invoices = InvoiceManager.getForPractice(session.id);
        const monthsShort = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const spendingData = [];
        const spendingMeta = [];
        for (let i = 5; i >= 0; i--) {
            const m = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const mMonth = m.getMonth();
            const mYear = m.getFullYear();
            const monthInvoices = invoices.filter(inv => {
                const d = new Date(inv.sessionDate || inv.shiftDate);
                return d.getMonth() === mMonth && d.getFullYear() === mYear;
            });
            const total = monthInvoices.reduce((s, inv) => s + inv.total, 0);
            spendingData.push({ label: monthsShort[mMonth], value: total });
            spendingMeta.push({ month: mMonth, year: mYear, label: monthsShort[mMonth] + ' ' + mYear });
        }
        const maxSpend = Math.max(...spendingData.map(e => e.value), 1);

        // Pending feedback reminders
        const completedNoFeedback = practiceOffers
            .filter(o => o.status === 'completed' && !FeedbackManager.hasReviewed(session.id, o.id));

        // Unread messages
        const unreadMsgCount = MessageManager.getUnreadCount(session.id);

        // Active offers sent by this practice (sent/viewed/negotiating/accepted)
        const locums = data.locums;
        const activeOffers = practiceOffers.filter(o => ['sent', 'viewed', 'negotiating', 'accepted'].includes(o.status));

        const pendingApps = activeOffers.slice(0, 5).map(offer => {
            const loc = locums.find(l => l.id === offer.locumId);
            return {
                offerId: offer.id,
                locumName: loc ? `${loc.title} ${loc.firstName} ${loc.lastName}` : 'Unknown',
                locumId: offer.locumId,
                sessionDate: offer.sessionDate || offer.shiftDate,
                sessionType: offer.sessionType,
                startTime: offer.startTime,
                endTime: offer.endTime,
                rate: offer.agreedRate || offer.proposedRate || 0,
                status: offer.status,
                reliability: loc ? loc.bookingReliability : 0,
                isBarred: BarredList.isBarred(session.id, offer.locumId),
                isPreferred: BarredList.isPreferred(session.id, offer.locumId)
            };
        });

        // Notifications - filtered for current user, exclude acknowledged
        const notifications = (data.notifications || [])
            .filter(n => (n.userId === session.id || !n.userId) && !n.acknowledged)
            .slice(0, 20);

        let html = `
            <div style="margin-bottom: 32px;">
                <h1 style="font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--dark); margin-bottom: 4px;">
                    ${getGreeting()}, ${session.firstName || session.name}
                </h1>
                <p style="color: var(--dark-600); font-size: 0.95rem;">Practice Manager &mdash; ${session.name}</p>
            </div>

            ${sessionNeeds.length === 0 ? `
            <div class="content-card" style="margin-bottom: 24px; border-left: 4px solid var(--primary); background: rgba(91, 77, 255,0.03);">
                <div class="content-card-body" style="padding: 24px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 200px;">
                        <h3 style="font-size: 1.1rem; font-weight: 700; color: var(--dark); margin-bottom: 6px;">Welcome to GPRN</h3>
                        <p style="font-size: 0.9rem; color: var(--dark-600); line-height: 1.6;">Create your first session to start finding available locums. You can post a session need and send invitations to GPs in your area.</p>
                    </div>
                    <a href="post-shift.html" class="btn btn-primary btn-large">Create Your First Session</a>
                </div>
            </div>
            ` : ''}

            <div class="dash-stats-row">
                <div class="dash-stat-card" style="cursor: pointer;" onclick="showKPIDetail('openSessions')" role="button" aria-label="View open sessions details" tabindex="0">
                    <div class="dash-stat-icon" style="background: rgba(91, 77, 255,0.1); color: var(--primary)">
                        ${getIcon('search')}
                    </div>
                    <div class="dash-stat-info">
                        <span class="dash-stat-value">${openSessions.length}</span>
                        <span class="dash-stat-label">Open Sessions</span>
                    </div>
                </div>
                <div class="dash-stat-card" style="cursor: pointer;" onclick="showKPIDetail('activeOffers')" role="button" aria-label="View active offers details" tabindex="0">
                    <div class="dash-stat-icon" style="background: rgba(91, 77, 255,0.1); color: var(--primary)">
                        ${getIcon('mail')}
                    </div>
                    <div class="dash-stat-info">
                        <span class="dash-stat-value">${activeOffers.length}</span>
                        <span class="dash-stat-label">Active Offers</span>
                    </div>
                </div>
                <div class="dash-stat-card" style="cursor: pointer;" onclick="showKPIDetail('fillRate')" role="button" aria-label="View fill rate details" tabindex="0">
                    <div class="dash-stat-icon" style="background: rgba(91, 77, 255,0.1); color: var(--primary)">
                        ${getIcon('check')}
                    </div>
                    <div class="dash-stat-info">
                        <span class="dash-stat-value">${fillRateDisplay}%</span>
                        <span class="dash-stat-label">Fill Rate</span>
                    </div>
                </div>
                <div class="dash-stat-card" style="cursor: pointer;" onclick="showKPIDetail('monthlySpend')" role="button" aria-label="View monthly spend details" tabindex="0">
                    <div class="dash-stat-icon" style="background: rgba(91, 77, 255,0.1); color: var(--primary)">
                        ${getIcon('pound')}
                    </div>
                    <div class="dash-stat-info">
                        <span class="dash-stat-value">${formatCurrency(monthlySpend)}</span>
                        <span class="dash-stat-label">Monthly Spend</span>
                    </div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px;">
                <div class="content-card">
                    <div class="content-card-header">
                        <h2>Session Coverage This Week</h2>
                    </div>
                    <div class="content-card-body">
                        ${coverageData.map((c, i) => {
                            if (c.totalShifts === 0) {
                                return `
                                <div class="coverage-bar-container" style="cursor: pointer;" onclick="showDayCoverage(${i})" role="button" aria-label="${c.day} session coverage - no sessions" tabindex="0">
                                    <div class="coverage-label">
                                        <span>${c.day}</span>
                                        <span class="coverage-pct" style="color: var(--gray-400);">No sessions</span>
                                    </div>
                                    <div class="coverage-bar">
                                        <div class="coverage-fill" style="width: 0%"></div>
                                    </div>
                                </div>`;
                            }
                            const colorClass = c.pct >= 80 ? '' : (c.pct >= 50 ? 'warn' : 'danger');
                            const fillClass = c.pct < 50 ? 'warning' : '';
                            return `
                                <div class="coverage-bar-container" style="cursor: pointer;" onclick="showDayCoverage(${i})" role="button" aria-label="${c.day} session coverage - ${c.filledShifts} of ${c.totalShifts} filled" tabindex="0">
                                    <div class="coverage-label">
                                        <span>${c.day}</span>
                                        <span class="coverage-pct ${colorClass}">${c.filledShifts}/${c.totalShifts} (${c.pct}%)</span>
                                    </div>
                                    <div class="coverage-bar">
                                        <div class="coverage-fill ${fillClass}" style="width: ${c.pct}%"></div>
                                    </div>
                                </div>`;
                        }).join('')}
                    </div>
                </div>

                <div class="content-card">
                    <div class="content-card-header">
                        <h2>Spending Trend (6 Months)</h2>
                    </div>
                    <div class="content-card-body">
                        <div class="bar-chart">
                            ${spendingData.map((e, i) => `
                                <div class="bar-chart-item" style="cursor: pointer;" onclick="showMonthSpend(${i})" role="button" aria-label="${e.label} spending - ${e.value > 0 ? formatCurrency(e.value) : 'no spend'}" tabindex="0">
                                    <div class="bar-chart-value">${e.value > 0 ? formatCurrency(e.value) : '-'}</div>
                                    <div class="bar-chart-bar" style="height: ${e.value > 0 ? Math.max((e.value / maxSpend) * 120, 4) : 4}px;"></div>
                                    <div class="bar-chart-label">${e.label}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            </div>

            ${topLocums.length > 0 ? `
            <div class="content-card" style="margin-bottom: 24px;">
                <div class="content-card-header">
                    <h2>Top Locums</h2>
                    <a href="find-locums.html" class="btn btn-ghost btn-small">Find Locums</a>
                </div>
                <div class="content-card-body">
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;">
                        ${topLocums.map((loc, idx) => `
                            <div style="text-align: center; padding: 16px; background: var(--gray-50); border-radius: var(--radius);">
                                <div class="header-avatar" style="width: 48px; height: 48px; font-size: 0.9rem; margin: 0 auto 8px;">${getInitials(loc.name)}</div>
                                <strong style="display: block; font-size: 0.9rem;">${loc.name}</strong>
                                <span style="font-size: 0.82rem; color: var(--dark-600);">${loc.count} session${loc.count !== 1 ? 's' : ''} completed</span>
                                <div style="margin-top: 6px;">
                                    <span class="badge badge-success" style="font-size: 0.75rem;">${loc.reliability}% reliable</span>
                                    ${loc.rating ? `<span style="font-size: 0.78rem; color: var(--coral); margin-left: 4px;">&#9733; ${loc.rating}</span>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
            ` : ''}

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px;">
                <div class="content-card">
                    <div class="content-card-header">
                        <h2>Active Offers</h2>
                        <a href="view-requested-shifts.html" class="btn btn-ghost btn-small">View All</a>
                    </div>
                    <div class="content-card-body">
                        ${pendingApps.length === 0 ? `
                            <div class="empty-state" style="padding: 30px 10px;">
                                <p style="color: var(--dark-600);">No active offers</p>
                                <a href="find-locums.html" class="btn btn-primary btn-small" style="margin-top: 8px;">Find Locums</a>
                            </div>
                        ` : pendingApps.map(app => `
                            <div style="padding: 14px 0; border-bottom: 1px solid var(--gray-100);">
                                ${(app.isBarred || app.isPreferred) ? renderBarredWarning(session.id, app.locumId) : ''}
                                <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;">
                                    <div style="display: flex; align-items: center; gap: 12px;">
                                        <div class="header-avatar" style="width: 40px; height: 40px; font-size: 0.8rem;">${getInitials(app.locumName)}</div>
                                        <div>
                                            <strong style="display: block; font-size: 0.9rem;">${app.locumName}</strong>
                                            <span style="font-size: 0.82rem; color: var(--dark-600);">${DateUtils.format(app.sessionDate, 'medium')} &bull; ${app.sessionType || 'AM'} &bull; ${formatCurrency(app.rate)}/session</span>
                                            <span class="badge ${getStatusBadge(app.status)}" style="font-size: 0.7rem; margin-left: 6px;">${getStatusLabel(app.status)}</span>
                                        </div>
                                    </div>
                                    <div style="display: flex; gap: 8px;">
                                        ${app.status === 'accepted' ? `<button class="btn btn-primary btn-small" onclick="confirmOfferFromDash('${app.offerId}')">Confirm</button>` : ''}
                                        ${['sent', 'viewed', 'negotiating'].includes(app.status) ? `<button class="btn btn-ghost btn-small" onclick="withdrawOfferFromDash('${app.offerId}')">Withdraw</button>` : ''}
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="content-card">
                    <div class="content-card-header">
                        <h2>Recent Notifications</h2>
                        <span style="font-size: 0.78rem; color: var(--dark-600);">${notifications.length} unread</span>
                    </div>
                    <div class="content-card-body" id="notifPane" style="max-height: 320px; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none;">
                        <style>#notifPane::-webkit-scrollbar { display: none; }</style>
                        ${notifications.length === 0
                            ? '<p style="color: var(--dark-600); font-size: 0.88rem;">No new notifications.</p>'
                            : notifications.slice(0, 5).map((n, idx) => {
                                const dotColor = n.type === 'offer_accepted' ? 'var(--success)' :
                                    n.type === 'shift_cancelled' || n.type === 'no_show' ? 'var(--danger)' :
                                    n.type === 'new_offer' || n.type === 'offer_received' ? 'var(--primary)' :
                                    'var(--coral)';
                                return `
                                <div class="notif-item" id="notif-${idx}" style="cursor: pointer;" onclick="expandNotification(${idx})" role="button" aria-label="Notification: ${n.title}" tabindex="0">
                                    <div class="notif-dot ${n.read ? 'read' : 'unread'}" style="background: ${dotColor};"></div>
                                    <div style="flex: 1;">
                                        <div class="notif-title">${n.title}</div>
                                        <div class="notif-message" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${n.message}</div>
                                        <div class="notif-time">${DateUtils.relative(n.date)}</div>
                                    </div>
                                </div>
                            `}).join('')
                        }
                    </div>
                </div>
            </div>

            ${completedNoFeedback.length > 0 ? `
            <div class="content-card" style="margin-bottom: 24px;">
                <div class="content-card-header">
                    <h2>Pending Feedback</h2>
                    <span class="badge badge-info">${completedNoFeedback.length}</span>
                </div>
                <div class="content-card-body">
                    ${completedNoFeedback.slice(0, 5).map(offer => {
                        const locum = data.locums.find(l => l.id === offer.locumId);
                        const locumName = locum ? locum.title + ' ' + locum.firstName + ' ' + locum.lastName : 'Unknown';
                        return `
                        <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--gray-100);">
                            <div>
                                <strong style="font-size: 0.9rem;">${locumName}</strong>
                                <span style="font-size: 0.85rem; color: var(--dark-600); margin-left: 8px;">${DateUtils.format(offer.sessionDate || offer.shiftDate, 'medium')} &bull; ${offer.sessionType}</span>
                            </div>
                            <button class="btn btn-secondary btn-small" onclick="leaveFeedback('${offer.id}', '${offer.locumId}')" aria-label="Rate locum for ${DateUtils.format(offer.sessionDate || offer.shiftDate, 'medium')} session">
                                ${getIcon('award')} Rate Locum
                            </button>
                        </div>`;
                    }).join('')}
                </div>
            </div>
            ` : ''}

            <div style="display: flex; gap: 12px; justify-content: center; padding: 20px 0;">
                <a href="find-locums.html" class="btn btn-primary btn-large">
                    ${getIcon('search')} Find Locums
                </a>
                <a href="messages.html" class="btn btn-secondary btn-large">
                    ${getIcon('mail')} Messages${unreadMsgCount > 0 ? ' (' + unreadMsgCount + ')' : ''}
                </a>
            </div>
        `;

        pageContent.innerHTML = html;

        // ===== HANDLER FUNCTIONS =====

        // --- Accept / Decline (existing) ---
        function confirmOfferFromDash(offerId) {
            const success = Booking.confirmBooking(offerId);
            if (success) {
                Toast.show('Booking confirmed! Locum has been notified.', 'success');
            } else {
                Toast.show('Failed to confirm booking.', 'error');
            }
            setTimeout(() => window.location.reload(), 800);
        }

        function withdrawOfferFromDash(offerId) {
            const result = Booking.withdrawOffer(offerId);
            if (result.success) {
                Toast.show('Offer withdrawn.', 'info');
            } else {
                Toast.show(result.message || 'Failed to withdraw offer.', 'error');
            }
            setTimeout(() => window.location.reload(), 800);
        }

        // --- Notification Expand & Dismiss ---
        function expandNotification(idx) {
            const freshData = getMockData();
            const notifs = (freshData.notifications || [])
                .filter(n => (n.userId === session.id || !n.userId) && !n.acknowledged);
            const n = notifs[idx];
            if (!n) return;

            const overlay = Modal.show({
                title: n.title,
                size: 'medium',
                body: `
                    <div style="margin-bottom: 16px;">
                        <p style="font-size: 0.95rem; color: var(--dark); line-height: 1.6;">${n.message}</p>
                    </div>
                    <div style="padding: 10px 14px; background: var(--gray-50); border-radius: var(--radius); font-size: 0.82rem; color: var(--dark-600);">
                        ${getIcon('clock')} ${n.date ? DateUtils.format(n.date, 'full') + ' &bull; ' + DateUtils.relative(n.date) : 'Recently'}
                    </div>
                    ${n.type ? `<div style="margin-top: 8px;"><span class="badge badge-info" style="font-size: 0.75rem;">${n.type.replace(/_/g, ' ')}</span></div>` : ''}
                `,
                footer: '<button class="btn btn-primary" id="ackNotifBtn">Acknowledge &amp; Dismiss</button>'
            });

            overlay.querySelector('#ackNotifBtn').addEventListener('click', () => {
                // Mark acknowledged in mock data
                const d = getMockData();
                const allNotifs = d.notifications || [];
                const match = allNotifs.find(nn => nn.title === n.title && nn.message === n.message && nn.date === n.date);
                if (match) {
                    match.acknowledged = true;
                    match.read = true;
                }
                saveMockData(d);
                // Remove from DOM
                const el = document.getElementById('notif-' + idx);
                if (el) el.remove();
                Modal.close(overlay);
                Toast.show('Notification dismissed.', 'info', 1500);
            });

            // Also dismiss on modal close (clicking X or backdrop)
            const closeBtn = overlay.querySelector('[data-modal-close]');
            closeBtn.addEventListener('click', () => {
                const d = getMockData();
                const allNotifs = d.notifications || [];
                const match = allNotifs.find(nn => nn.title === n.title && nn.message === n.message && nn.date === n.date);
                if (match) {
                    match.acknowledged = true;
                    match.read = true;
                }
                saveMockData(d);
                const el = document.getElementById('notif-' + idx);
                if (el) el.remove();
            });
        }

        // --- Day Coverage Detail Modal ---
        function showDayCoverage(dayIndex) {
            const dateStr = coverageDates[dayIndex];
            const dayName = weekDays[dayIndex];
            const freshData = getMockData();
            const dayShifts = (freshData.sessionNeeds || []).filter(s => s.practiceId === session.id && s.date === dateStr);

            let shiftRows = '';
            if (dayShifts.length === 0) {
                shiftRows = '<p style="color: var(--dark-600); font-size: 0.88rem; padding: 16px 0;">No sessions scheduled for this day.</p>';
            } else {
                shiftRows = dayShifts.map(shift => {
                    const offer = freshData.offers.find(o => (o.sessionNeedId || o.shiftId) === shift.id && ['accepted', 'confirmed', 'acknowledged', 'completed'].includes(o.status));
                    const pendingCount = freshData.offers.filter(o => (o.sessionNeedId || o.shiftId) === shift.id && ['sent', 'viewed', 'negotiating'].includes(o.status)).length;
                    let statusBadge = '';
                    let details = '';

                    if (shift.status === 'filled' || offer) {
                        statusBadge = '<span class="badge badge-success">Filled</span>';
                        if (offer) {
                            const loc = freshData.locums.find(l => l.id === offer.locumId);
                            const locName = loc ? `${loc.title} ${loc.firstName} ${loc.lastName}` : 'Unknown';
                            const rate = offer.sessionType === 'Full Day' ? (offer.rateFullDay || 820) : (offer.sessionType === 'PM' ? (offer.ratePM || 430) : (offer.rateAM || 430));
                            details = `
                                <div style="margin-top: 8px; padding: 10px; background: rgba(34, 197, 94,0.08); border-radius: var(--radius); font-size: 0.85rem;">
                                    ${getIcon('user')} <strong>${locName}</strong> &bull; ${formatCurrency(rate)}/session
                                </div>`;
                        }
                    } else if (shift.status === 'open') {
                        statusBadge = '<span class="badge badge-warning">Open</span>';
                        details = `<div style="margin-top: 6px; font-size: 0.82rem; color: var(--dark-600);">${pendingCount} pending offer${pendingCount !== 1 ? 's' : ''} &bull; <a href="view-requested-shifts.html" style="color: var(--primary);">View details</a></div>`;
                    } else {
                        statusBadge = `<span class="badge">${shift.status}</span>`;
                    }

                    return `
                        <div style="padding: 14px 0; border-bottom: 1px solid var(--gray-100);">
                            <div style="display: flex; align-items: center; justify-content: space-between;">
                                <div>
                                    <strong style="font-size: 0.9rem;">${shift.sessionType || 'Session'}</strong>
                                    <span style="font-size: 0.85rem; color: var(--dark-600); margin-left: 8px;">${shift.startTime} - ${shift.endTime}</span>
                                </div>
                                ${statusBadge}
                            </div>
                            ${details}
                        </div>`;
                }).join('');
            }

            Modal.show({
                title: `${dayName} ${DateUtils.format(dateStr, 'full')}`,
                size: 'medium',
                body: `
                    <div style="margin-bottom: 12px; display: flex; align-items: center; gap: 10px;">
                        <span style="font-size: 0.88rem; color: var(--dark-600);">${dayShifts.length} session${dayShifts.length !== 1 ? 's' : ''} scheduled</span>
                        <span class="badge ${coverageData[dayIndex].pct >= 80 ? 'badge-success' : coverageData[dayIndex].pct >= 50 ? 'badge-warning' : 'badge-danger'}">${coverageData[dayIndex].pct}% covered</span>
                    </div>
                    ${shiftRows}
                `,
                footer: `<a href="post-shift.html" class="btn btn-primary">${getIcon('plus-circle')} Create Session for ${dayName}</a>`
            });
        }

        // --- Monthly Spend Detail Modal ---
        function showMonthSpend(monthIndex) {
            const meta = spendingMeta[monthIndex];
            const freshInvoices = InvoiceManager.getForPractice(session.id);
            const monthInvoices = freshInvoices.filter(inv => {
                const d = new Date(inv.shiftDate);
                return d.getMonth() === meta.month && d.getFullYear() === meta.year;
            });

            const totalSpent = monthInvoices.reduce((s, inv) => s + inv.total, 0);
            const paidTotal = monthInvoices.filter(i => i.status === 'paid').reduce((s, inv) => s + inv.total, 0);
            const outstandingTotal = monthInvoices.filter(i => i.status !== 'paid').reduce((s, inv) => s + inv.total, 0);

            const freshData = getMockData();
            let invoiceRows = '';
            if (monthInvoices.length === 0) {
                invoiceRows = '<p style="color: var(--dark-600); font-size: 0.88rem; padding: 16px 0;">No invoices for this month.</p>';
            } else {
                invoiceRows = `<table style="width: 100%; font-size: 0.85rem; border-collapse: collapse;">
                    <thead>
                        <tr style="border-bottom: 2px solid var(--gray-200); text-align: left;">
                            <th style="padding: 8px 4px;">Invoice</th>
                            <th style="padding: 8px 4px;">Locum</th>
                            <th style="padding: 8px 4px;">Session Date</th>
                            <th style="padding: 8px 4px;">Session</th>
                            <th style="padding: 8px 4px; text-align: right;">Amount</th>
                            <th style="padding: 8px 4px;">Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${monthInvoices.map(inv => {
                            const loc = freshData.locums.find(l => l.id === inv.locumId);
                            const locName = loc ? `${loc.title} ${loc.firstName} ${loc.lastName}` : 'Unknown';
                            const statusClass = inv.status === 'paid' ? 'badge-success' : (inv.status === 'overdue' ? 'badge-danger' : 'badge-warning');
                            return `
                                <tr style="border-bottom: 1px solid var(--gray-100);">
                                    <td style="padding: 8px 4px; font-weight: 600;">${inv.invoiceId || inv.id}</td>
                                    <td style="padding: 8px 4px;">${locName}</td>
                                    <td style="padding: 8px 4px;">${DateUtils.format(inv.shiftDate, 'short')}</td>
                                    <td style="padding: 8px 4px;">${inv.sessionType || '-'}</td>
                                    <td style="padding: 8px 4px; text-align: right; font-weight: 600;">${formatCurrency(inv.total)}</td>
                                    <td style="padding: 8px 4px;"><span class="badge ${statusClass}" style="font-size: 0.72rem;">${inv.status || 'pending'}</span></td>
                                </tr>`;
                        }).join('')}
                    </tbody>
                </table>`;
            }

            Modal.show({
                title: `Spending — ${meta.label}`,
                size: 'large',
                body: `
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px;">
                        <div style="padding: 14px; background: var(--gray-50); border-radius: var(--radius); text-align: center;">
                            <div style="font-size: 1.2rem; font-weight: 700; color: var(--dark);">${formatCurrency(totalSpent)}</div>
                            <div style="font-size: 0.78rem; color: var(--dark-600);">Total Spend</div>
                        </div>
                        <div style="padding: 14px; background: var(--gray-50); border-radius: var(--radius); text-align: center;">
                            <div style="font-size: 1.2rem; font-weight: 700; color: var(--success);">${formatCurrency(paidTotal)}</div>
                            <div style="font-size: 0.78rem; color: var(--dark-600);">Paid</div>
                        </div>
                        <div style="padding: 14px; background: var(--gray-50); border-radius: var(--radius); text-align: center;">
                            <div style="font-size: 1.2rem; font-weight: 700; color: var(--coral);">${formatCurrency(outstandingTotal)}</div>
                            <div style="font-size: 0.78rem; color: var(--dark-600);">Outstanding</div>
                        </div>
                    </div>
                    <h4 style="font-size: 0.9rem; font-weight: 600; margin-bottom: 12px;">${monthInvoices.length} Invoice${monthInvoices.length !== 1 ? 's' : ''}</h4>
                    ${invoiceRows}
                `,
                footer: `<a href="billing.html" class="btn btn-secondary">View Full Billing</a>`
            });
        }

        // --- KPI Detail Modals ---
        function showKPIDetail(type) {
            const freshData = getMockData();

            if (type === 'openSessions') {
                const needs = (freshData.sessionNeeds || []).filter(n => n.practiceId === session.id && n.status === 'open');
                const rows = needs.length === 0
                    ? '<p style="color: var(--dark-600); font-size: 0.88rem;">No open sessions.</p>'
                    : needs.map(n => {
                        const offersSent = freshData.offers.filter(o => o.sessionNeedId === n.id && ['sent','viewed','negotiating'].includes(o.status)).length;
                        return `
                            <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--gray-100);">
                                <div>
                                    <strong style="font-size: 0.9rem;">${DateUtils.format(n.date, 'medium')}</strong>
                                    <span style="font-size: 0.85rem; color: var(--dark-600); margin-left: 8px;">${n.sessionType} &bull; ${n.startTime} - ${n.endTime}</span>
                                </div>
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <span style="font-size: 0.82rem; color: var(--dark-600);">${offersSent} offer${offersSent !== 1 ? 's' : ''} sent</span>
                                    <a href="find-locums.html?needId=${n.id}" class="btn btn-primary btn-small">Find Locum</a>
                                </div>
                            </div>`;
                    }).join('');

                Modal.show({
                    title: `Open Sessions (${needs.length})`,
                    size: 'large',
                    body: rows,
                    footer: `<a href="post-shift.html" class="btn btn-primary">${getIcon('plus-circle')} Create Session</a>`
                });

            } else if (type === 'activeOffers') {
                const active = freshData.offers.filter(o => o.practiceId === session.id && ['sent','viewed','negotiating','accepted'].includes(o.status));
                const rows = active.length === 0
                    ? '<p style="color: var(--dark-600); font-size: 0.88rem;">No active offers.</p>'
                    : active.map(o => {
                        const loc = freshData.locums.find(l => l.id === o.locumId);
                        const locName = loc ? `${loc.title} ${loc.firstName} ${loc.lastName}` : 'Unknown';
                        const rate = o.agreedRate || o.proposedRate || 0;
                        return `
                            <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--gray-100);">
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <div class="header-avatar" style="width: 36px; height: 36px; font-size: 0.75rem;">${getInitials(locName)}</div>
                                    <div>
                                        <strong style="font-size: 0.9rem;">${locName}</strong>
                                        <div style="font-size: 0.82rem; color: var(--dark-600);">${DateUtils.format(o.sessionDate || o.shiftDate, 'medium')} &bull; ${o.sessionType} &bull; ${formatCurrency(rate)}</div>
                                    </div>
                                </div>
                                <span class="badge ${getStatusBadge(o.status)}">${getStatusLabel(o.status)}</span>
                            </div>`;
                    }).join('');

                Modal.show({
                    title: `Active Offers (${active.length})`,
                    size: 'large',
                    body: rows,
                    footer: `<a href="view-requested-shifts.html" class="btn btn-secondary">View All Sessions</a>`
                });

            } else if (type === 'fillRate') {
                const allNeeds = (freshData.sessionNeeds || []).filter(n => n.practiceId === session.id);
                const total = allNeeds.length;
                const filled = allNeeds.filter(n => n.status === 'filled').length;
                const completed = freshData.offers.filter(o => o.practiceId === session.id && (o.status === 'completed' || o.status === 'accepted' || o.status === 'confirmed')).length;
                const open = allNeeds.filter(n => n.status === 'open');
                const rate = total > 0 ? Math.min(Math.round(((filled + completed) / total) * 100), 100) : 0;

                const unfilledRows = open.length === 0
                    ? '<p style="color: var(--dark-600); font-size: 0.85rem;">All sessions are filled!</p>'
                    : open.slice(0, 10).map(n => `
                        <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--gray-100);">
                            <div>
                                <strong style="font-size: 0.88rem;">${DateUtils.format(n.date, 'medium')}</strong>
                                <span style="font-size: 0.82rem; color: var(--dark-600); margin-left: 8px;">${n.sessionType} &bull; ${n.startTime}-${n.endTime}</span>
                            </div>
                            <a href="find-locums.html?needId=${n.id}" class="btn btn-primary btn-small">Find Locum</a>
                        </div>
                    `).join('');

                Modal.show({
                    title: `Fill Rate Breakdown`,
                    size: 'medium',
                    body: `
                        <div style="text-align: center; margin-bottom: 20px;">
                            <div style="font-size: 3rem; font-weight: 800; color: var(--primary);">${rate}%</div>
                            <div style="font-size: 0.88rem; color: var(--dark-600);">Overall Fill Rate</div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px;">
                            <div style="padding: 12px; background: var(--gray-50); border-radius: var(--radius); text-align: center;">
                                <div style="font-size: 1.3rem; font-weight: 700;">${total}</div>
                                <div style="font-size: 0.78rem; color: var(--dark-600);">Total Sessions</div>
                            </div>
                            <div style="padding: 12px; background: var(--gray-50); border-radius: var(--radius); text-align: center;">
                                <div style="font-size: 1.3rem; font-weight: 700; color: var(--success);">${filled + completed}</div>
                                <div style="font-size: 0.78rem; color: var(--dark-600);">Filled / Completed</div>
                            </div>
                            <div style="padding: 12px; background: var(--gray-50); border-radius: var(--radius); text-align: center;">
                                <div style="font-size: 1.3rem; font-weight: 700; color: var(--coral);">${open.length}</div>
                                <div style="font-size: 0.78rem; color: var(--dark-600);">Still Open</div>
                            </div>
                        </div>
                        ${open.length > 0 ? `<h4 style="font-size: 0.9rem; font-weight: 600; margin-bottom: 8px;">Unfilled Sessions</h4>` : ''}
                        ${unfilledRows}
                    `,
                    footer: `<a href="post-shift.html" class="btn btn-primary">${getIcon('plus-circle')} Create Session</a>`
                });

            } else if (type === 'monthlySpend') {
                showMonthSpend(spendingMeta.length - 1);
            }
        }

        // --- Leave Feedback (existing) ---
        function leaveFeedback(offerId, locumId) {
            const locum = data.locums.find(l => l.id === locumId);
            const locumName = locum ? locum.title + ' ' + locum.firstName + ' ' + locum.lastName : 'Unknown';
            Modal.show({
                title: 'Rate ' + locumName,
                size: 'medium',
                body: `
                    <div style="margin-bottom: 16px;">
                        <label class="form-label">Overall Rating</label>
                        <div id="ratingStars" style="display: flex; gap: 8px; cursor: pointer;">
                            ${[1,2,3,4,5].map(i => `<svg data-star="${i}" width="28" height="28" viewBox="0 0 24 24" fill="#E2E8F0" stroke="#E2E8F0" stroke-width="1" style="cursor:pointer;"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`).join('')}
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Comment (optional)</label>
                        <textarea id="feedbackComment" class="form-textarea" rows="3" placeholder="How was the locum's performance?"></textarea>
                    </div>
                `,
                footer: `<button class="btn btn-primary" id="submitFeedbackBtn">Submit Feedback</button>`,
                onOpen: (overlay) => {
                    let selectedRating = 0;
                    const stars = overlay.querySelectorAll('#ratingStars svg');
                    stars.forEach(star => {
                        star.addEventListener('click', () => {
                            selectedRating = parseInt(star.dataset.star);
                            stars.forEach((s, idx) => {
                                s.setAttribute('fill', idx < selectedRating ? '#14B8A6' : '#E2E8F0');
                                s.setAttribute('stroke', idx < selectedRating ? '#14B8A6' : '#E2E8F0');
                            });
                        });
                    });
                    overlay.querySelector('#submitFeedbackBtn').addEventListener('click', () => {
                        if (selectedRating === 0) {
                            Toast.show('Please select a rating.', 'warning');
                            return;
                        }
                        const comment = overlay.querySelector('#feedbackComment').value;
                        FeedbackManager.submit(session.id, locumId, offerId, { overall: selectedRating }, comment, 'practice');
                        Modal.close(overlay);
                        Toast.show('Feedback submitted. Thank you!', 'success');
                        setTimeout(() => location.reload(), 500);
                    });
                }
            });
        }
        // Keyboard support for role="button" elements
        document.addEventListener('keydown', function(e) {
            if ((e.key === 'Enter' || e.key === ' ') && e.target.getAttribute('role') === 'button') {
                e.preventDefault();
                e.target.click();
            }
        });
    </script>
</body>
</html>
