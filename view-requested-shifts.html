<!DOCTYPE html>
<html lang="en">
<head>

    <meta http-equiv="Pragma" content="no-cache">

    <!-- Google Fonts: Syne + Plus Jakarta Sans -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Syne"', 'sans-serif'],
                    },
                    colors: {
                        navy: {
                            DEFAULT: '#0B0F19',
                            50: '#141C2F',
                        },
                        brand: {
                            green: '#059669',
                            mint: '#ECFDF5',
                            dark: '#022C22',
                        },
                        surface: '#F8F9FA'
                    },
                    boxShadow: {
                        'card': '0 4px 20px rgba(0, 0, 0, 0.03)',
                        'card-hover': '0 10px 40px rgba(0, 0, 0, 0.08)',
                        'subtle': '0 1px 2px rgba(0,0,0,0.02)',
                    }
                }
            }
        }
    </script>

    <style>
        body.pm-dashboard { font-family: 'Plus Jakarta Sans', sans-serif; }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        .custom-scroll:hover::-webkit-scrollbar-thumb { background: #CBD5E1; }

        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-item {
            animation: fade-in-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }

        .sidebar-active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 10%;
            height: 80%;
            width: 4px;
            background-color: #0B0F19;
            border-radius: 0 4px 4px 0;
        }

        .filter-chip.active {
            background-color: #0B0F19 !important;
            color: white !important;
            border-color: #0B0F19 !important;
        }
    </style>
</head>

        <div class="h-20 px-6 flex items-center justify-between">

                </button>

                        <div class="bg-brand-green text-white w-7 h-7 rounded-full flex items-center justify-center text-[11px] font-bold tracking-wider" id="headerAvatar">--</div>
                        <span class="text-white text-[13px] font-semibold pr-1" id="headerName">User</span>

                    <div id="profileDropMenu" class="hidden absolute right-0 top-full mt-2 w-56 bg-white rounded-xl border border-slate-200 shadow-lg py-2 z-50" style="font-family:'Plus Jakarta Sans',sans-serif;">

        <div class="flex-1 overflow-y-auto custom-scroll px-4 lg:px-10 pb-20 pt-4">

                <!-- Page Heading -->

                        </div>

                    </a>

                <!-- Filter Bar -->
                <div class="flex items-center justify-between gap-4 flex-wrap animate-item delay-100">
                    <div class="flex items-center gap-2 flex-wrap" id="filterChips">
                        <button data-filter="all" class="filter-chip active text-[13px] font-bold text-slate-600 bg-white border border-slate-200 px-4 py-1.5 rounded-full hover:bg-slate-50 transition-colors shadow-sm">All</button>
                        <button data-filter="open" class="filter-chip text-[13px] font-bold text-slate-600 bg-white border border-slate-200 px-4 py-1.5 rounded-full hover:bg-slate-50 transition-colors shadow-sm">Open</button>
                        <button data-filter="filled" class="filter-chip text-[13px] font-bold text-slate-600 bg-white border border-slate-200 px-4 py-1.5 rounded-full hover:bg-slate-50 transition-colors shadow-sm">Filled</button>
                        <button data-filter="history" class="filter-chip text-[13px] font-bold text-slate-600 bg-white border border-slate-200 px-4 py-1.5 rounded-full hover:bg-slate-50 transition-colors shadow-sm">History</button>

    <script>
        // ===== SESSION + HEADER =====
        const session = Auth.getSession();

        // Header profile pill
        document.getElementById('headerAvatar').textContent = getInitials((session.firstName || '') + ' ' + (session.lastName || session.name || ''));
        document.getElementById('headerName').textContent = session.firstName || (session.name || 'User').split(' ')[0];
        const _dn = document.getElementById('dropdownDisplayName');
        if (_dn) _dn.textContent = session.firstName || (session.name || 'User').split(' ')[0];

        // Unread messages badge
        try {
            const unreadMsgCount = MessageManager.getUnreadCount(session.id);
            if (unreadMsgCount > 0) {
                const badge = document.getElementById('sidebarUnreadBadge');
                badge.textContent = unreadMsgCount;
                badge.classList.remove('hidden');
            }
        } catch (e) { /* no-op */ }

        // ===== STATE =====
        var currentStatusFilter = 'all';
        var currentDateFrom = '';
        var currentDateTo = '';

        function escapeHtml(s) {
            return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
                return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
            });
        }

        function getSessionNeeds(statusFilter) {
            var currentData = getMockData();
            if (!currentData.sessionNeeds) currentData.sessionNeeds = [];
            var needs = currentData.sessionNeeds.filter(function(n) { return n.practiceId === session.id; });
            if (statusFilter === 'history') {
                needs = needs.filter(function(n) { return n.status === 'filled' || n.status === 'cancelled' || new Date(n.date) < new Date(); });
            } else if (statusFilter && statusFilter !== 'all') {
                needs = needs.filter(function(n) { return n.status === statusFilter; });
            }
            return needs;
        }

        // ===== STATUS PILL =====
        function statusPill(status) {
            var s = (status || '').toLowerCase();
            var cls, label;
            if (s === 'filled' || s === 'completed' || s === 'confirmed' || s === 'accepted') {
                cls = 'bg-brand-mint text-brand-green border border-brand-green/20';
                label = s === 'filled' ? 'Filled' : (s.charAt(0).toUpperCase() + s.slice(1));
            } else if (s === 'open') {
                cls = 'bg-sky-50 text-sky-700 border border-sky-100';
                label = 'Open';
            } else if (s === 'cancelled' || s === 'withdrawn') {
                cls = 'bg-rose-50 text-rose-600 border border-rose-100';
                label = s.charAt(0).toUpperCase() + s.slice(1);
            } else {
                cls = 'bg-slate-50 text-slate-600 border border-slate-200';
                label = s ? (s.charAt(0).toUpperCase() + s.slice(1)) : 'Unknown';
            }
            return '<span class="inline-flex items-center gap-1 ' + cls + ' px-3 py-1 rounded-full text-[11px] font-bold">' + label + '</span>';
        }

        // ===== RENDER TABLE =====
        function renderTable() {
            var currentData = getMockData();
            var needs = getSessionNeeds(currentStatusFilter);

            if (currentDateFrom) needs = needs.filter(function(n) { return n.date >= currentDateFrom; });
            if (currentDateTo) needs = needs.filter(function(n) { return n.date <= currentDateTo; });
            needs.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });

            var tableEl = document.getElementById('sessionsTable');

            if (needs.length === 0) {
                tableEl.innerHTML = '<div class="bg-white rounded-2xl border border-slate-200 shadow-subtle p-16 flex flex-col items-center justify-center text-center">'
                    + '<div class="w-16 h-16 rounded-2xl bg-slate-50 border border-slate-100 flex items-center justify-center mb-5">'
                    + '<i class="ph ph-calendar-blank text-3xl text-slate-400"></i>'
                    + '</div>'
                    + '<h3 class="text-[20px] font-extrabold text-navy mb-2">No sessions yet</h3>'
                    + '<p class="text-slate-500 text-[14px] font-medium max-w-sm mb-6">You haven\'t posted any shifts matching these filters. Create your first session to start receiving offers from locums.</p>'
                    + '<a href="post-shift.html" class="inline-flex items-center gap-2 bg-navy hover:bg-slate-800 text-white text-[13px] font-bold px-5 py-2.5 rounded-full transition-colors shadow-md">'
                    + '<i class="ph-bold ph-plus-circle text-base"></i> Create Session'
                    + '</a>'
                    + '</div>';
                return;
            }

            var headerRow = '<div class="grid grid-cols-12 gap-4 border-b border-slate-200 bg-slate-50/50 p-4 text-[11px] font-bold text-slate-400 uppercase tracking-wider">'
                + '<div class="col-span-3">Date</div>'
                + '<div class="col-span-2">Session</div>'
                + '<div class="col-span-2">Status</div>'
                + '<div class="col-span-2">Offers</div>'
                + '<div class="col-span-2">Budget</div>'
                + '<div class="col-span-1 text-right">Action</div>'
                + '</div>';

            var rows = needs.map(function(need) {
                var allOffers = currentData.offers.filter(function(o) { return o.sessionNeedId === need.id; });
                var activeOffers = allOffers.filter(function(o) { return ['sent', 'viewed', 'negotiating'].includes(o.status); });
                var acceptedOffer = allOffers.find(function(o) { return ['accepted', 'confirmed', 'completed'].includes(o.status); });

                var dateFull = DateUtils.format(need.date, 'full');
                var timeLabel = need.startTime + ' - ' + need.endTime;

                var offersCell;
                if (acceptedOffer) {
                    var loc = currentData.locums.find(function(l) { return l.id === acceptedOffer.locumId; });
                    var name = loc ? (loc.title + ' ' + loc.firstName + ' ' + loc.lastName) : 'Assigned';
                    offersCell = '<div class="flex items-center gap-2">'
                        + '<div class="w-7 h-7 rounded-full bg-brand-green text-white flex items-center justify-center text-[10px] font-bold">' + (loc ? getInitials(loc.firstName + ' ' + loc.lastName) : '??') + '</div>'
                        + '<span class="text-[13px] font-semibold text-navy truncate">' + escapeHtml(name) + '</span>'
                        + '</div>';
                } else {
                    offersCell = '<span class="text-[13px] font-semibold text-slate-600">' + activeOffers.length + ' offer' + (activeOffers.length !== 1 ? 's' : '') + ' sent</span>';
                }

                var budgetCell = need.budgetRate ? '<span class="text-[13px] font-bold text-navy">' + formatCurrency(need.budgetRate) + '</span>' : '<span class="text-[12px] font-medium text-slate-400">Not set</span>';

                return '<div class="grid grid-cols-12 gap-4 border-b border-slate-100 p-4 items-center hover:bg-slate-50 transition-colors cursor-pointer" data-need-id="' + need.id + '">'
                    + '<div class="col-span-3">'
                    + '<div class="text-[14px] font-bold text-navy">' + escapeHtml(dateFull) + '</div>'
                    + '<div class="text-[12px] font-medium text-slate-500">' + escapeHtml(timeLabel) + '</div>'
                    + '</div>'
                    + '<div class="col-span-2 text-[13px] font-semibold text-slate-700">' + escapeHtml(need.sessionType || '—') + '</div>'
                    + '<div class="col-span-2">' + statusPill(need.status) + '</div>'
                    + '<div class="col-span-2">' + offersCell + '</div>'
                    + '<div class="col-span-2">' + budgetCell + '</div>'
                    + '<div class="col-span-1 flex justify-end">'
                    + '<button class="row-action inline-flex items-center justify-center w-8 h-8 rounded-full bg-slate-50 hover:bg-navy hover:text-white text-slate-500 transition-colors" data-need-id="' + need.id + '">'
                    + '<i class="ph-bold ph-arrow-right text-sm"></i>'
                    + '</button>'
                    + '</div>'
                    + '</div>';
            }).join('');

            tableEl.innerHTML = '<div class="bg-white rounded-2xl border border-slate-200 shadow-subtle overflow-hidden">'
                + headerRow
                + rows
                + '</div>';

            // Bind row clicks
            tableEl.querySelectorAll('[data-need-id]').forEach(function(el) {
                el.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var id = this.getAttribute('data-need-id');
                    if (id) openNeedDetailModal(id);
                });
            });
        }

        // ===== FILTER CHIP BINDING =====
        document.querySelectorAll('.filter-chip').forEach(function(chip) {
            chip.addEventListener('click', function() {
                document.querySelectorAll('.filter-chip').forEach(function(c) { c.classList.remove('active'); });
                this.classList.add('active');
                currentStatusFilter = this.getAttribute('data-filter');
                renderTable();
            });
        });
        document.getElementById('filterDateFrom').addEventListener('change', function() {
            currentDateFrom = this.value;
            renderTable();
        });
        document.getElementById('filterDateTo').addEventListener('change', function() {
            currentDateTo = this.value;
            renderTable();
        });

        // ============== SESSION NEED DETAIL MODAL ==============

        function openNeedDetailModal(needId) {
            var currentData = getMockData();
            if (!currentData.sessionNeeds) return;
            var need = currentData.sessionNeeds.find(function(n) { return n.id === needId; });
            if (!need) return;

            var locums = currentData.locums;
            var allOffers = currentData.offers.filter(function(o) { return o.sessionNeedId === need.id; });
            var activeOffers = allOffers.filter(function(o) { return ['sent', 'viewed', 'negotiating'].includes(o.status); });
            var acceptedOffer = allOffers.find(function(o) { return ['accepted', 'confirmed', 'completed'].includes(o.status); });

            // Build info section
            var info = '<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;">'
                + '<div><div style="font-size: 0.75rem; color: var(--dark-600); margin-bottom: 2px;">Date</div><div style="font-weight: 600;">' + DateUtils.format(need.date, 'full') + '</div></div>'
                + '<div><div style="font-size: 0.75rem; color: var(--dark-600); margin-bottom: 2px;">Time</div><div style="font-weight: 600;">' + need.startTime + ' - ' + need.endTime + '</div></div>'
                + '<div><div style="font-size: 0.75rem; color: var(--dark-600); margin-bottom: 2px;">Session</div><div style="font-weight: 600;">' + need.sessionType + '</div></div>'
                + '<div><div style="font-size: 0.75rem; color: var(--dark-600); margin-bottom: 2px;">Status</div><div><span class="badge ' + getStatusBadge(need.status) + '">' + getStatusLabel(need.status) + '</span></div></div>'
                + (need.budgetRate ? '<div><div style="font-size: 0.75rem; color: var(--dark-600); margin-bottom: 2px;">Budget</div><div style="font-weight: 600;">' + formatCurrency(need.budgetRate) + '</div></div>' : '')
                + '<div><div style="font-size: 0.75rem; color: var(--dark-600); margin-bottom: 2px;">Housecalls</div><div>' + (need.housecalls ? '<span class="badge badge-info">Yes</span>' : '<span class="badge badge-neutral">No</span>') + '</div></div>'
                + '</div>';

            if (need.notes) {
                info += '<div style="padding: 10px; background: var(--gray-50); border-radius: 8px; margin-bottom: 16px; font-size: 0.85rem; color: var(--dark-600);">' + sanitizeHTML(need.notes) + '</div>';
            }

            // Accepted/confirmed locum
            if (acceptedOffer) {
                var loc = locums.find(function(l) { return l.id === acceptedOffer.locumId; });
                if (loc) {
                    var rate = acceptedOffer.agreedRate || acceptedOffer.proposedRate;
                    info += '<div style="padding: 12px; background: rgba(34, 197, 94,0.06); border-radius: 8px; border: 1px solid rgba(34, 197, 94,0.15); margin-bottom: 16px;">'
                        + '<div style="display: flex; align-items: center; gap: 10px;">'
                        + '<div class="header-avatar" style="width: 36px; height: 36px; font-size: 0.7rem;">' + getInitials(loc.firstName + ' ' + loc.lastName) + '</div>'
                        + '<div><strong style="color: var(--dark);">' + loc.title + ' ' + loc.firstName + ' ' + loc.lastName + '</strong>'
                        + '<div style="font-size: 0.8rem; color: var(--dark-600);"><span class="badge ' + getStatusBadge(acceptedOffer.status) + '" style="font-size: 0.7rem;">' + getStatusLabel(acceptedOffer.status) + '</span> &bull; Rate: ' + formatCurrency(rate) + '</div>'
                        + '</div></div>';
                    if (acceptedOffer.status === 'accepted') {
                        info += '<div style="margin-top: 8px;"><button class="btn btn-primary btn-small" onclick="Modal.close(this.closest(\'.modal-overlay\')); confirmOfferBooking(\'' + acceptedOffer.id + '\')">Confirm Booking</button></div>';
                    }
                    if (acceptedOffer.status === 'completed') {
                        var hasReported = FeedbackManager.hasReviewed(session.id, acceptedOffer.id);
                        if (hasReported) {
                            info += '<div style="margin-top: 8px;"><span class="badge badge-info" style="font-size: 0.75rem;">Issue reported</span></div>';
                        } else {
                            info += '<div style="margin-top: 8px;"><a href="leave-feedback.html?offerId=' + acceptedOffer.id + '" class="btn btn-small btn-danger btn-ghost" onclick="Modal.close(this.closest(\'.modal-overlay\'))">Report Issue</a>'
                                + '<span style="font-size: 0.75rem; color: var(--dark-600); margin-left: 8px;">No issues? No action needed.</span></div>';
                        }
                    }
                    info += '</div>';
                }
            }

            // Active offers (sent/viewed/negotiating)
            if (activeOffers.length > 0) {
                info += '<div style="border-top: 1px solid var(--gray-100); padding-top: 16px;">'
                    + '<h4 style="font-size: 0.88rem; font-weight: 600; color: var(--dark-700); margin-bottom: 12px;">Sent Offers (' + activeOffers.length + ')</h4>';

                activeOffers.forEach(function(offer) {
                    var loc = locums.find(function(l) { return l.id === offer.locumId; });
                    if (!loc) return;
                    var rate = offer.agreedRate || offer.proposedRate;

                    info += '<div style="display: flex; align-items: center; justify-content: space-between; padding: 12px; background: var(--gray-50); border-radius: 8px; margin-bottom: 8px; flex-wrap: wrap; gap: 8px;">'
                        + '<div style="display: flex; align-items: center; gap: 12px;">'
                        + '<div class="header-avatar" style="width: 36px; height: 36px; font-size: 0.7rem;">' + getInitials(loc.firstName + ' ' + loc.lastName) + '</div>'
                        + '<div><strong style="font-size: 0.88rem; color: var(--dark);">' + loc.title + ' ' + loc.firstName + ' ' + loc.lastName + '</strong>'
                        + '<div style="display: flex; align-items: center; gap: 12px; margin-top: 2px;">'
                        + '<span class="badge ' + getStatusBadge(offer.status) + '" style="font-size:0.7rem;">' + getStatusLabel(offer.status) + '</span>'
                        + '<span style="font-size: 0.8rem; color: var(--dark-600);">Rate: ' + formatCurrency(rate) + '</span>'
                        + (need.budgetRate ? (rate > need.budgetRate ? '<span class="badge badge-danger" style="font-size:0.7rem;padding:2px 6px;">Over budget</span>' : '<span class="badge badge-success" style="font-size:0.7rem;padding:2px 6px;">Within budget</span>') : '')
                        + '</div></div></div>';

                    // Negotiations
                    if (offer.negotiations && offer.negotiations.length > 0) {
                        info += '<div style="width:100%;padding:8px 12px;background:rgba(5, 150, 105,0.04);border-radius:6px;margin-top:4px;">'
                            + '<div style="font-size:0.75rem;font-weight:600;color:var(--secondary);margin-bottom:4px;">Rate Negotiation</div>';
                        offer.negotiations.forEach(function(n) {
                            info += '<div style="font-size:0.78rem;color:var(--dark-600);margin-bottom:2px;"><strong>' + (n.from === 'practice' ? 'You' : 'Locum') + ':</strong> ' + formatCurrency(n.rate) + (n.accepted ? ' ✓ Agreed' : '') + (n.message ? ' — ' + sanitizeHTML(n.message) : '') + '</div>';
                        });
                        info += '</div>';
                    }

                    // Action buttons
                    info += '<div style="display: flex; gap: 8px; flex-wrap: wrap;">'
                        + '<a href="locum-profile-view.html?id=' + loc.id + '" class="btn btn-ghost btn-small">View Profile</a>';

                    if (offer.status === 'negotiating') {
                        info += '<button class="btn btn-small" style="background:var(--secondary);color:white;border-color:var(--secondary);" onclick="Modal.close(this.closest(\'.modal-overlay\')); openNegotiate(\'' + offer.id + '\', ' + rate + ')">Counter</button>'
                            + '<button class="btn btn-primary btn-small" onclick="Modal.close(this.closest(\'.modal-overlay\')); acceptLocumCounter(\'' + offer.id + '\')">Accept Rate</button>';
                    }
                    info += '<button class="btn btn-ghost btn-small" onclick="Modal.close(this.closest(\'.modal-overlay\')); withdrawSentOffer(\'' + offer.id + '\')">Withdraw</button>';
                    info += '</div></div>';
                });
                info += '</div>';
            }

            var footerBtns = '';
            if (need.status === 'open') {
                footerBtns = '<button class="btn btn-small" style="background:var(--danger);color:white;border-color:var(--danger);margin-right:auto;" id="cancelNeedBtn">Cancel Session</button>'
                    + '<a href="find-locums.html?needId=' + need.id + '" class="btn btn-primary btn-small">Find Locum</a>';
            } else if (need.status === 'filled') {
                footerBtns = '<button class="btn btn-small" style="background:var(--danger);color:white;border-color:var(--danger);margin-right:auto;" id="cancelNeedBtn">Cancel Shift</button>';
            }
            footerBtns += '<button class="btn btn-ghost" data-modal-close>Close</button>';

            Modal.show({
                title: DateUtils.format(need.date, 'full') + ' — ' + need.sessionType,
                size: 'large',
                body: info,
                footer: footerBtns,
                onOpen: function(overlay) {
                    var cancelBtn = overlay.querySelector('#cancelNeedBtn');
                    if (cancelBtn) {
                        cancelBtn.addEventListener('click', function() {
                            Modal.close(overlay);
                            confirmCancelNeed(need.id);
                        });
                    }
                }
            });
        }

        // ============== SHARED ACTIONS ==============

        function withdrawSentOffer(offerId) {
            var currentData = getMockData();
            var offer = currentData.offers.find(function(o) { return o.id === offerId; });
            if (offer && offer.status === 'withdrawn') {
                Toast.show('This offer has already been withdrawn.', 'info');
                return;
            }
            var result = Booking.withdrawOffer(offerId);
            if (result.success) {
                Toast.show('Offer withdrawn.', 'info');
            } else {
                Toast.show(result.message || 'Failed to withdraw offer.', 'error');
            }
            setTimeout(function() { renderTable(); }, 300);
        }

        function acceptLocumCounter(offerId) {
            var currentData = getMockData();
            var offer = currentData.offers.find(function(o) { return o.id === offerId; });
            var lastNeg = offer && offer.negotiations && offer.negotiations.length > 0 ? offer.negotiations[offer.negotiations.length - 1] : null;
            var rateDisplay = lastNeg ? formatCurrency(lastNeg.rate) : (offer ? formatCurrency(offer.proposedRate) : '');
            var locum = offer ? currentData.locums.find(function(l) { return l.id === offer.locumId; }) : null;
            var locumName = locum ? locum.title + ' ' + locum.firstName + ' ' + locum.lastName : 'this locum';

            Modal.show({
                title: 'Accept Locum Rate',
                body: '<p style="font-size:0.92rem;color:var(--dark-600);margin-bottom:12px;">Are you sure you want to accept the rate of <strong>' + rateDisplay + '</strong> from <strong>' + locumName + '</strong>?</p><p style="font-size:0.85rem;color:var(--dark-600);">This will confirm the booking at the agreed rate.</p>',
                footer: '<button class="btn btn-ghost" data-modal-close>Cancel</button><button class="btn btn-primary" id="confirmAcceptCounterBtn">Accept Rate</button>',
                onOpen: function(overlay) {
                    overlay.querySelector('#confirmAcceptCounterBtn').addEventListener('click', function() {
                        Modal.close(overlay);
                        var result = Booking.practiceRespondToNegotiation(offerId, 'accept');
                        if (result.success) {
                            Toast.show('Rate agreed! Booking accepted.', 'success');
                        } else {
                            Toast.show(result.message || 'Failed to accept rate.', 'error');
                        }
                        setTimeout(function() { renderTable(); }, 300);
                    });
                }
            });
        }

        function confirmOfferBooking(offerId) {
            var success = Booking.confirmBooking(offerId);
            if (success) {
                Toast.show('Booking confirmed! The locum has been notified.', 'success');
            } else {
                Toast.show('Failed to confirm booking.', 'error');
            }
            setTimeout(function() { renderTable(); }, 300);
        }

        function openNegotiate(offerId, currentRate) {
            Modal.show({
                title: 'Counter Offer',
                body: '<div style="padding:8px 0;"><p style="font-size:0.88rem;color:var(--dark-600);margin-bottom:16px;">Current rate: <strong>' + formatCurrency(currentRate) + '</strong></p><div class="form-group"><label class="form-label">Your counter-offer (£)</label><input type="number" id="counterRate" class="form-input" placeholder="e.g. 400" step="10" min="0"></div><div class="form-group"><label class="form-label">Message (optional)</label><textarea id="counterMessage" class="form-input" rows="2" placeholder="e.g. This is our standard rate for PM sessions"></textarea></div></div>',
                footer: '<button class="btn btn-ghost" data-modal-close>Cancel</button><button class="btn btn-primary" id="sendCounterBtn">Send Counter-Offer</button>',
                onOpen: function(overlay) {
                    overlay.querySelector('#sendCounterBtn').addEventListener('click', function() {
                        var rate = Number(overlay.querySelector('#counterRate').value);
                        var msg = overlay.querySelector('#counterMessage').value.trim();
                        if (!rate || rate <= 0) { Toast.show('Please enter a valid rate', 'error'); return; }
                        var result = Booking.practiceRespondToNegotiation(offerId, 'counter', rate, msg);
                        Modal.close(overlay);
                        if (result.success) {
                            Toast.show('Counter-offer sent to locum.', 'success');
                        } else {
                            Toast.show(result.message || 'Failed to send counter-offer.', 'error');
                        }
                        setTimeout(function() { renderTable(); }, 300);
                    });
                }
            });
        }

        function confirmCancelNeed(needId) {
            var currentData = getMockData();
            var bookedOffers = currentData.offers.filter(function(o) { return o.sessionNeedId === needId && ['accepted', 'confirmed'].includes(o.status); });
            var hasBooking = bookedOffers.length > 0;
            var bookedLocumName = '';
            if (hasBooking) {
                var loc = currentData.locums.find(function(l) { return l.id === bookedOffers[0].locumId; });
                bookedLocumName = loc ? loc.title + ' ' + loc.firstName + ' ' + loc.lastName : 'the booked locum';
            }
            var bodyMsg = hasBooking
                ? '<div style="padding:8px 0;"><p style="font-size:0.95rem;color:var(--dark-600);margin-bottom:12px;">This shift is currently booked with <strong>' + bookedLocumName + '</strong>. Are you sure you want to cancel?</p><p style="font-size:0.88rem;color:var(--danger);">The locum will be notified via notifications and messages that this shift has been cancelled.</p></div>'
                : '<div style="padding:8px 0;"><p style="font-size:0.95rem;color:var(--dark-600);margin-bottom:12px;">Are you sure you want to cancel this session?</p><p style="font-size:0.88rem;color:var(--danger);">All pending offers will be withdrawn and locums notified.</p></div>';
            Modal.show({
                title: hasBooking ? 'Cancel Booked Shift' : 'Cancel Session',
                body: bodyMsg,
                footer: '<button class="btn btn-ghost" data-modal-close>Keep ' + (hasBooking ? 'Shift' : 'Session') + '</button><button class="btn btn-small" style="background:var(--danger);color:white;border-color:var(--danger);" id="confirmCancelBtn">Cancel ' + (hasBooking ? 'Shift' : 'Session') + '</button>',
                onOpen: function(overlay) {
                    overlay.querySelector('#confirmCancelBtn').addEventListener('click', function() {
                        var result = Booking.deleteSessionNeed(needId);
                        Modal.close(overlay);
                        if (result.error) {
                            Toast.show(result.message || 'Unable to cancel this session.', 'error');
                            return;
                        }
                        Toast.show(hasBooking ? 'Shift cancelled. The locum has been notified.' : 'Session cancelled. All locums have been notified.', 'success');
                        setTimeout(function() { renderTable(); }, 300);
                    });
                }
            });
        }

        // Expose cancelSessionNeed for card components
        window.cancelSessionNeed = confirmCancelNeed;
        window.openNeedDetailModal = openNeedDetailModal;

        // Initial render
        renderTable();
    </script>
</body>
</html>
