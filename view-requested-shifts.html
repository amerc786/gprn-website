<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>My Sessions - GPRN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="app-layout">
    <script src="mock-data.js"></script>
    <script src="app.js"></script>
    <script src="components.js"></script>
    <script>
        if (!initPage('practice')) throw new Error('Auth required');

        const session = Auth.getSession();
        const pageContent = initAppLayout('practice', 'my-sessions', 'My Sessions');

        // Calendar state
        var calYear = new Date().getFullYear();
        var calMonth = new Date().getMonth();
        var viewMode = 'calendar';
        var currentStatusFilter = 'all';
        var currentDateFrom = '';
        var currentDateTo = '';

        var monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        var dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

        function getSessionNeeds(statusFilter) {
            var currentData = getMockData();
            if (!currentData.sessionNeeds) currentData.sessionNeeds = [];
            var needs = currentData.sessionNeeds.filter(function(n) { return n.practiceId === session.id; });
            if (statusFilter === 'history') {
                needs = needs.filter(function(n) { return n.status === 'filled' || n.status === 'cancelled' || new Date(n.date) < new Date(); });
            } else if (statusFilter && statusFilter !== 'all') {
                needs = needs.filter(function(n) { return n.status === statusFilter; });
            }
            return needs;
        }

        function getNeedStatusColor(need) {
            var currentData = getMockData();
            var hasCompleted = currentData.offers.some(function(o) { return o.sessionNeedId === need.id && o.status === 'completed'; });
            if (hasCompleted) return 'completed';
            if (need.status === 'filled') return 'filled';
            return 'open';
        }

        // ============== CALENDAR VIEW ==============

        function renderCalendarView() {
            var daysInMonth = DateUtils.getDaysInMonth(calYear, calMonth);
            var firstDay = DateUtils.getFirstDayOfMonth(calYear, calMonth);
            var todayStr = DateUtils.toISO(new Date());
            var needs = getSessionNeeds(currentStatusFilter);

            var needsByDate = {};
            needs.forEach(function(n) {
                if (!needsByDate[n.date]) needsByDate[n.date] = [];
                needsByDate[n.date].push(n);
            });

            var prevMonth = calMonth === 0 ? 11 : calMonth - 1;
            var prevYear = calMonth === 0 ? calYear - 1 : calYear;
            var daysInPrevMonth = DateUtils.getDaysInMonth(prevYear, prevMonth);

            var cells = '';
            for (var i = firstDay - 1; i >= 0; i--) {
                var day = daysInPrevMonth - i;
                var dateStr = prevYear + '-' + String(prevMonth + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                cells += buildDayCell(day, dateStr, needsByDate[dateStr] || [], false, todayStr);
            }
            for (var d = 1; d <= daysInMonth; d++) {
                var dateStr = calYear + '-' + String(calMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
                cells += buildDayCell(d, dateStr, needsByDate[dateStr] || [], true, todayStr);
            }
            var totalCells = firstDay + daysInMonth;
            var remainder = totalCells % 7;
            if (remainder > 0) {
                var nextMonth = calMonth === 11 ? 0 : calMonth + 1;
                var nextYear = calMonth === 11 ? calYear + 1 : calYear;
                for (var d = 1; d <= (7 - remainder); d++) {
                    var dateStr = nextYear + '-' + String(nextMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
                    cells += buildDayCell(d, dateStr, needsByDate[dateStr] || [], false, todayStr);
                }
            }

            return '<div class="calendar-container">'
                + '<div class="calendar-header-bar">'
                + '<div class="calendar-nav">'
                + '<button id="calPrev">' + getIcon('chevron-left') + '</button>'
                + '<span class="calendar-title">' + monthNames[calMonth] + ' ' + calYear + '</span>'
                + '<button id="calNext">' + getIcon('chevron-right') + '</button>'
                + '</div>'
                + '<div style="display: flex; align-items: center; gap: 16px; flex-wrap: wrap;">'
                + '<button class="btn btn-secondary btn-small" id="calToday">Today</button>'
                + '<div style="display: flex; align-items: center; gap: 16px; font-size: 0.78rem; flex-wrap: wrap;">'
                + '<span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 3px; background: var(--primary);"></span> Open</span>'
                + '<span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 3px; background: var(--success);"></span> Filled</span>'
                + '<span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 3px; background: var(--secondary);"></span> Completed</span>'
                + '</div></div></div>'
                + '<div class="calendar-grid-full">'
                + dayNames.map(function(d) { return '<div class="calendar-day-header">' + d + '</div>'; }).join('')
                + cells
                + '</div></div>';
        }

        function buildDayCell(day, dateStr, needs, isCurrentMonth, todayStr) {
            var isToday = dateStr === todayStr;
            var cls = 'calendar-day-cell' + (isToday ? ' today' : '') + (!isCurrentMonth ? ' other-month' : '');
            var html = '<div class="' + cls + '" data-date="' + dateStr + '" style="cursor: pointer;">';
            html += '<div class="cal-date">' + day + '</div>';

            var maxShow = 3;
            for (var i = 0; i < Math.min(needs.length, maxShow); i++) {
                var n = needs[i];
                var color = getNeedStatusColor(n);
                var bgColor, textColor;
                if (color === 'open') { bgColor = 'rgba(79,70,229,0.15)'; textColor = 'var(--primary)'; }
                else if (color === 'filled') { bgColor = 'rgba(16,185,129,0.15)'; textColor = 'var(--success)'; }
                else { bgColor = 'rgba(14,165,233,0.15)'; textColor = 'var(--secondary)'; }

                html += '<div data-need-id="' + n.id + '" style="font-size: 0.65rem; font-weight: 600; padding: 2px 6px; border-radius: 4px; margin-bottom: 2px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: ' + bgColor + '; color: ' + textColor + ';">'
                    + n.sessionType + ' ' + n.startTime
                    + '</div>';
            }
            if (needs.length > maxShow) {
                html += '<div style="font-size: 0.65rem; color: var(--dark-600);">+' + (needs.length - maxShow) + ' more</div>';
            }
            html += '</div>';
            return html;
        }

        // ============== SESSION NEED DETAIL MODAL ==============

        function openNeedDetailModal(needId) {
            var currentData = getMockData();
            if (!currentData.sessionNeeds) return;
            var need = currentData.sessionNeeds.find(function(n) { return n.id === needId; });
            if (!need) return;

            var locums = currentData.locums;
            var allOffers = currentData.offers.filter(function(o) { return o.sessionNeedId === need.id; });
            var activeOffers = allOffers.filter(function(o) { return ['sent', 'viewed', 'negotiating'].includes(o.status); });
            var acceptedOffer = allOffers.find(function(o) { return ['accepted', 'confirmed', 'completed'].includes(o.status); });

            // Build info section
            var info = '<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;">'
                + '<div><div style="font-size: 0.75rem; color: var(--dark-600); margin-bottom: 2px;">Date</div><div style="font-weight: 600;">' + DateUtils.format(need.date, 'full') + '</div></div>'
                + '<div><div style="font-size: 0.75rem; color: var(--dark-600); margin-bottom: 2px;">Time</div><div style="font-weight: 600;">' + need.startTime + ' - ' + need.endTime + '</div></div>'
                + '<div><div style="font-size: 0.75rem; color: var(--dark-600); margin-bottom: 2px;">Session</div><div style="font-weight: 600;">' + need.sessionType + '</div></div>'
                + '<div><div style="font-size: 0.75rem; color: var(--dark-600); margin-bottom: 2px;">Status</div><div><span class="badge ' + getStatusBadge(need.status) + '">' + getStatusLabel(need.status) + '</span></div></div>'
                + (need.budgetRate ? '<div><div style="font-size: 0.75rem; color: var(--dark-600); margin-bottom: 2px;">Budget</div><div style="font-weight: 600;">' + formatCurrency(need.budgetRate) + '</div></div>' : '')
                + '<div><div style="font-size: 0.75rem; color: var(--dark-600); margin-bottom: 2px;">Housecalls</div><div>' + (need.housecalls ? '<span class="badge badge-info">Yes</span>' : '<span class="badge badge-neutral">No</span>') + '</div></div>'
                + '</div>';

            if (need.notes) {
                info += '<div style="padding: 10px; background: var(--gray-50); border-radius: 8px; margin-bottom: 16px; font-size: 0.85rem; color: var(--dark-600);">' + sanitizeHTML(need.notes) + '</div>';
            }

            // Accepted/confirmed locum
            if (acceptedOffer) {
                var loc = locums.find(function(l) { return l.id === acceptedOffer.locumId; });
                if (loc) {
                    var rate = acceptedOffer.agreedRate || acceptedOffer.proposedRate;
                    info += '<div style="padding: 12px; background: rgba(16,185,129,0.06); border-radius: 8px; border: 1px solid rgba(16,185,129,0.15); margin-bottom: 16px;">'
                        + '<div style="display: flex; align-items: center; gap: 10px;">'
                        + '<div class="header-avatar" style="width: 36px; height: 36px; font-size: 0.7rem;">' + getInitials(loc.firstName + ' ' + loc.lastName) + '</div>'
                        + '<div><strong style="color: var(--dark);">' + loc.title + ' ' + loc.firstName + ' ' + loc.lastName + '</strong>'
                        + '<div style="font-size: 0.8rem; color: var(--dark-600);"><span class="badge ' + getStatusBadge(acceptedOffer.status) + '" style="font-size: 0.7rem;">' + getStatusLabel(acceptedOffer.status) + '</span> &bull; Rate: ' + formatCurrency(rate) + '</div>'
                        + '</div></div>';
                    if (acceptedOffer.status === 'accepted') {
                        info += '<div style="margin-top: 8px;"><button class="btn btn-primary btn-small" onclick="Modal.close(this.closest(\'.modal-overlay\')); confirmOfferBooking(\'' + acceptedOffer.id + '\')">Confirm Booking</button></div>';
                    }
                    info += '</div>';
                }
            }

            // Active offers (sent/viewed/negotiating)
            if (activeOffers.length > 0) {
                info += '<div style="border-top: 1px solid var(--gray-100); padding-top: 16px;">'
                    + '<h4 style="font-size: 0.88rem; font-weight: 600; color: var(--dark-700); margin-bottom: 12px;">Sent Offers (' + activeOffers.length + ')</h4>';

                activeOffers.forEach(function(offer) {
                    var loc = locums.find(function(l) { return l.id === offer.locumId; });
                    if (!loc) return;
                    var rate = offer.agreedRate || offer.proposedRate;

                    info += '<div style="display: flex; align-items: center; justify-content: space-between; padding: 12px; background: var(--gray-50); border-radius: 8px; margin-bottom: 8px; flex-wrap: wrap; gap: 8px;">'
                        + '<div style="display: flex; align-items: center; gap: 12px;">'
                        + '<div class="header-avatar" style="width: 36px; height: 36px; font-size: 0.7rem;">' + getInitials(loc.firstName + ' ' + loc.lastName) + '</div>'
                        + '<div><strong style="font-size: 0.88rem; color: var(--dark);">' + loc.title + ' ' + loc.firstName + ' ' + loc.lastName + '</strong>'
                        + '<div style="display: flex; align-items: center; gap: 12px; margin-top: 2px;">'
                        + '<span class="badge ' + getStatusBadge(offer.status) + '" style="font-size:0.7rem;">' + getStatusLabel(offer.status) + '</span>'
                        + '<span style="font-size: 0.8rem; color: var(--dark-600);">Rate: ' + formatCurrency(rate) + '</span>'
                        + (need.budgetRate ? (rate > need.budgetRate ? '<span class="badge badge-danger" style="font-size:0.7rem;padding:2px 6px;">Over budget</span>' : '<span class="badge badge-success" style="font-size:0.7rem;padding:2px 6px;">Within budget</span>') : '')
                        + '</div></div></div>';

                    // Negotiations
                    if (offer.negotiations && offer.negotiations.length > 0) {
                        info += '<div style="width:100%;padding:8px 12px;background:rgba(14,165,233,0.06);border-radius:6px;margin-top:4px;">'
                            + '<div style="font-size:0.75rem;font-weight:600;color:var(--secondary);margin-bottom:4px;">Rate Negotiation</div>';
                        offer.negotiations.forEach(function(n) {
                            info += '<div style="font-size:0.78rem;color:var(--dark-600);margin-bottom:2px;"><strong>' + (n.from === 'practice' ? 'You' : 'Locum') + ':</strong> ' + formatCurrency(n.rate) + (n.accepted ? ' ✓ Agreed' : '') + (n.message ? ' — ' + sanitizeHTML(n.message) : '') + '</div>';
                        });
                        info += '</div>';
                    }

                    // Action buttons
                    info += '<div style="display: flex; gap: 8px; flex-wrap: wrap;">'
                        + '<a href="locum-profile-view.html?id=' + loc.id + '" class="btn btn-ghost btn-small">View Profile</a>';

                    if (offer.status === 'negotiating') {
                        info += '<button class="btn btn-small" style="background:var(--secondary);color:white;border-color:var(--secondary);" onclick="Modal.close(this.closest(\'.modal-overlay\')); openNegotiate(\'' + offer.id + '\', ' + rate + ')">Counter</button>'
                            + '<button class="btn btn-primary btn-small" onclick="Modal.close(this.closest(\'.modal-overlay\')); acceptLocumCounter(\'' + offer.id + '\')">Accept Rate</button>';
                    }
                    info += '<button class="btn btn-ghost btn-small" onclick="Modal.close(this.closest(\'.modal-overlay\')); withdrawSentOffer(\'' + offer.id + '\')">Withdraw</button>';
                    info += '</div></div>';
                });
                info += '</div>';
            }

            var footerBtns = '';
            if (need.status === 'open') {
                footerBtns = '<button class="btn btn-small" style="background:var(--danger);color:white;border-color:var(--danger);margin-right:auto;" id="cancelNeedBtn">Cancel Session</button>'
                    + '<a href="find-locums.html?needId=' + need.id + '" class="btn btn-primary btn-small">Find Locum</a>';
            }
            footerBtns += '<button class="btn btn-ghost" data-modal-close>Close</button>';

            Modal.show({
                title: DateUtils.format(need.date, 'full') + ' — ' + need.sessionType,
                size: 'large',
                body: info,
                footer: footerBtns,
                onOpen: function(overlay) {
                    var cancelBtn = overlay.querySelector('#cancelNeedBtn');
                    if (cancelBtn) {
                        cancelBtn.addEventListener('click', function() {
                            Modal.close(overlay);
                            confirmCancelNeed(need.id);
                        });
                    }
                }
            });
        }

        // ============== DAY DETAIL ==============

        function openDayDetail(dateStr) {
            var allNeeds = getSessionNeeds(currentStatusFilter);
            var dayNeeds = allNeeds.filter(function(n) { return n.date === dateStr; });

            if (dayNeeds.length === 0) {
                Modal.show({
                    title: 'Sessions for ' + DateUtils.format(dateStr, 'full'),
                    body: '<p style="color: var(--dark-600); padding: 12px 0;">No sessions scheduled for this day.</p><a href="post-shift.html" class="btn btn-primary btn-small">Create Session</a>',
                    footer: '<button class="btn btn-ghost" data-modal-close>Close</button>'
                });
                return;
            }

            if (dayNeeds.length === 1) {
                openNeedDetailModal(dayNeeds[0].id);
                return;
            }

            var currentData = getMockData();
            var body = '';
            dayNeeds.forEach(function(need) {
                var offersCount = currentData.offers.filter(function(o) { return o.sessionNeedId === need.id && ['sent','viewed','negotiating'].includes(o.status); }).length;
                var filledOffer = currentData.offers.find(function(o) { return o.sessionNeedId === need.id && ['accepted','confirmed','completed'].includes(o.status); });

                body += '<div onclick="Modal.close(this.closest(\'.modal-overlay\')); openNeedDetailModal(\'' + need.id + '\')" style="display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--gray-100); cursor: pointer; transition: background 0.15s;" onmouseover="this.style.background=\'var(--gray-50)\'" onmouseout="this.style.background=\'transparent\'">'
                    + '<div style="display: flex; align-items: center; gap: 12px;">'
                    + '<span class="badge ' + getStatusBadge(need.status) + '">' + getStatusLabel(need.status) + '</span>'
                    + '<div><strong style="font-size: 0.9rem;">' + need.sessionType + '</strong>'
                    + '<div style="font-size: 0.82rem; color: var(--dark-600);">' + need.startTime + ' - ' + need.endTime + '</div></div></div>'
                    + '<div style="text-align: right; font-size: 0.82rem; color: var(--dark-600);">';

                if (filledOffer) {
                    var loc = currentData.locums.find(function(l) { return l.id === filledOffer.locumId; });
                    body += loc ? loc.title + ' ' + loc.firstName + ' ' + loc.lastName : 'Assigned';
                } else {
                    body += offersCount + ' offer' + (offersCount !== 1 ? 's' : '') + ' sent';
                }
                body += '</div></div>';
            });

            Modal.show({
                title: 'Sessions for ' + DateUtils.format(dateStr, 'full') + ' (' + dayNeeds.length + ')',
                body: '<div style="margin: -20px -24px;">' + body + '</div>',
                footer: '<button class="btn btn-ghost" data-modal-close>Close</button>'
            });
        }

        // ============== LIST VIEW ==============

        function renderSessionsList(statusFilter, dateFrom, dateTo) {
            var currentData = getMockData();
            var needs = getSessionNeeds(statusFilter);

            if (dateFrom) needs = needs.filter(function(n) { return n.date >= dateFrom; });
            if (dateTo) needs = needs.filter(function(n) { return n.date <= dateTo; });
            needs.sort(function(a, b) { return new Date(a.date) - new Date(b.date); });

            if (needs.length === 0) {
                return renderEmptyState('list', 'No Sessions Found', 'No sessions match your current filters.', 'Create Session', 'post-shift.html');
            }

            return needs.map(function(need) {
                var allOffers = currentData.offers.filter(function(o) { return o.sessionNeedId === need.id; });
                var activeOffers = allOffers.filter(function(o) { return ['sent', 'viewed', 'negotiating'].includes(o.status); });
                var acceptedOffer = allOffers.find(function(o) { return ['accepted', 'confirmed', 'completed'].includes(o.status); });

                var html = '<div class="shift-card-full" data-need-id="' + need.id + '" style="cursor: pointer;" onclick="openNeedDetailModal(\'' + need.id + '\')">'
                    + '<div class="shift-card-header"><div>'
                    + '<h3 class="shift-card-title">' + DateUtils.format(need.date, 'full') + '</h3>'
                    + '<p class="shift-card-location">' + need.startTime + ' - ' + need.endTime + ' &bull; ' + need.sessionType + '</p>'
                    + '</div><div class="shift-card-badges">'
                    + '<span class="badge ' + getStatusBadge(need.status) + '">' + getStatusLabel(need.status) + '</span>'
                    + '<span class="badge badge-neutral">' + activeOffers.length + ' offer' + (activeOffers.length !== 1 ? 's' : '') + ' sent</span>'
                    + '</div></div>';

                // Show accepted locum if filled
                if (acceptedOffer) {
                    var loc = currentData.locums.find(function(l) { return l.id === acceptedOffer.locumId; });
                    if (loc) {
                        var rate = acceptedOffer.agreedRate || acceptedOffer.proposedRate;
                        html += '<div style="padding:12px;background:rgba(16,185,129,0.06);border-radius:8px;margin-top:8px;border:1px solid rgba(16,185,129,0.15);">'
                            + '<div style="display:flex;align-items:center;gap:10px;">'
                            + '<div class="header-avatar" style="width:32px;height:32px;font-size:0.65rem;">' + getInitials(loc.firstName + ' ' + loc.lastName) + '</div>'
                            + '<div><strong style="font-size:0.85rem;color:var(--dark);">' + loc.title + ' ' + loc.firstName + ' ' + loc.lastName + '</strong>'
                            + '<div style="font-size:0.78rem;color:var(--dark-600);"><span class="badge ' + getStatusBadge(acceptedOffer.status) + '" style="font-size:0.7rem;">' + getStatusLabel(acceptedOffer.status) + '</span> &bull; Rate: ' + formatCurrency(rate) + '</div>'
                            + '</div></div></div>';
                    }
                }

                html += '<div class="shift-card-footer">'
                    + '<span style="font-size: 0.82rem; color: var(--gray-400);">' + (need.budgetRate ? 'Budget: ' + formatCurrency(need.budgetRate) : 'No budget set') + '</span>'
                    + '<div style="display:flex;gap:8px;align-items:center;">';
                if (need.status === 'open') {
                    html += '<a href="find-locums.html?needId=' + need.id + '" class="btn btn-primary btn-small" onclick="event.stopPropagation();">Find Locum</a>';
                }
                html += '</div></div></div>';
                return html;
            }).join('');
        }

        // ============== MAIN RENDER ==============

        function render() {
            var statusEl = document.getElementById('filterStatus');
            var dateFromEl = document.getElementById('filterDateFrom');
            var dateToEl = document.getElementById('filterDateTo');
            if (statusEl) currentStatusFilter = statusEl.value;
            if (dateFromEl) currentDateFrom = dateFromEl.value;
            if (dateToEl) currentDateTo = dateToEl.value;

            var toggleBtnCal = viewMode === 'calendar' ? 'background: var(--primary); color: white;' : 'background: white; color: var(--dark);';
            var toggleBtnList = viewMode === 'list' ? 'background: var(--primary); color: white;' : 'background: white; color: var(--dark);';

            var html = '<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px;">'
                + '<h1 style="font-family: \'Space Grotesk\', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--dark); margin: 0;">My Sessions</h1>'
                + '<div style="display: flex; align-items: center; gap: 12px;">'
                + '<a href="post-shift.html" class="btn btn-primary btn-small">' + getIcon('plus-circle') + ' Create Session</a>'
                + '<div style="display: inline-flex; border: 1px solid var(--gray-200); border-radius: 8px; overflow: hidden;">'
                + '<button onclick="viewMode=\'calendar\'; render();" style="padding: 8px 16px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 500; ' + toggleBtnCal + '">' + getIcon('calendar') + ' Calendar</button>'
                + '<button onclick="viewMode=\'list\'; render();" style="padding: 8px 16px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 500; ' + toggleBtnList + '">' + getIcon('list') + ' List</button>'
                + '</div></div></div>';

            if (viewMode === 'list') {
                html += '<div class="filter-bar">'
                    + '<div class="form-group"><label class="form-label">Status</label>'
                    + '<select id="filterStatus" class="form-select" onchange="render()">'
                    + '<option value="all"' + (currentStatusFilter === 'all' ? ' selected' : '') + '>All Statuses</option>'
                    + '<option value="open"' + (currentStatusFilter === 'open' ? ' selected' : '') + '>Open</option>'
                    + '<option value="filled"' + (currentStatusFilter === 'filled' ? ' selected' : '') + '>Filled</option>'
                    + '<option value="history"' + (currentStatusFilter === 'history' ? ' selected' : '') + '>All Historical</option>'
                    + '</select></div>'
                    + '<div class="form-group"><label class="form-label">From</label>'
                    + '<input type="date" id="filterDateFrom" class="form-input" value="' + currentDateFrom + '" onchange="render()"></div>'
                    + '<div class="form-group"><label class="form-label">To</label>'
                    + '<input type="date" id="filterDateTo" class="form-input" value="' + currentDateTo + '" onchange="render()"></div>'
                    + '</div>'
                    + '<div id="sessionsList">' + renderSessionsList(currentStatusFilter, currentDateFrom, currentDateTo) + '</div>';
            } else {
                html += '<div style="margin-bottom: 16px;">'
                    + '<select id="filterStatus" class="form-select" style="width: auto; min-width: 160px;" onchange="render()">'
                    + '<option value="all"' + (currentStatusFilter === 'all' ? ' selected' : '') + '>All Statuses</option>'
                    + '<option value="open"' + (currentStatusFilter === 'open' ? ' selected' : '') + '>Open</option>'
                    + '<option value="filled"' + (currentStatusFilter === 'filled' ? ' selected' : '') + '>Filled</option>'
                    + '<option value="history"' + (currentStatusFilter === 'history' ? ' selected' : '') + '>All Historical</option>'
                    + '</select></div>';
                html += renderCalendarView();
            }

            pageContent.innerHTML = html;

            if (viewMode === 'calendar') {
                document.getElementById('calPrev').addEventListener('click', function() {
                    calMonth--;
                    if (calMonth < 0) { calMonth = 11; calYear--; }
                    render();
                });
                document.getElementById('calNext').addEventListener('click', function() {
                    calMonth++;
                    if (calMonth > 11) { calMonth = 0; calYear++; }
                    render();
                });
                document.getElementById('calToday').addEventListener('click', function() {
                    calYear = new Date().getFullYear();
                    calMonth = new Date().getMonth();
                    render();
                });

                document.querySelectorAll('.calendar-day-cell').forEach(function(cell) {
                    cell.addEventListener('click', function(e) {
                        if (e.target.closest('[data-need-id]')) return;
                        var dateStr = this.dataset.date;
                        if (dateStr) openDayDetail(dateStr);
                    });
                });
                document.querySelectorAll('[data-need-id]').forEach(function(block) {
                    block.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var needId = this.dataset.needId;
                        if (needId) openNeedDetailModal(needId);
                    });
                });
            }
        }

        render();

        // ============== SHARED ACTIONS ==============

        function withdrawSentOffer(offerId) {
            var currentData = getMockData();
            var offer = currentData.offers.find(function(o) { return o.id === offerId; });
            if (offer && offer.status === 'withdrawn') {
                Toast.show('This offer has already been withdrawn.', 'info');
                return;
            }
            var result = Booking.withdrawOffer(offerId);
            if (result.success) {
                Toast.show('Offer withdrawn.', 'info');
            } else {
                Toast.show(result.message || 'Failed to withdraw offer.', 'error');
            }
            setTimeout(function() { render(); }, 300);
        }

        function acceptLocumCounter(offerId) {
            var currentData = getMockData();
            var offer = currentData.offers.find(function(o) { return o.id === offerId; });
            var lastNeg = offer && offer.negotiations && offer.negotiations.length > 0 ? offer.negotiations[offer.negotiations.length - 1] : null;
            var rateDisplay = lastNeg ? formatCurrency(lastNeg.rate) : (offer ? formatCurrency(offer.proposedRate) : '');
            var locum = offer ? currentData.locums.find(function(l) { return l.id === offer.locumId; }) : null;
            var locumName = locum ? locum.title + ' ' + locum.firstName + ' ' + locum.lastName : 'this locum';

            Modal.show({
                title: 'Accept Proposed Rate',
                body: '<p style="font-size:0.92rem;color:var(--dark-600);margin-bottom:12px;">Are you sure you want to accept the rate of <strong>' + rateDisplay + '</strong> from <strong>' + locumName + '</strong>?</p><p style="font-size:0.85rem;color:var(--dark-600);">This will confirm the booking at the agreed rate.</p>',
                footer: '<button class="btn btn-ghost" data-modal-close>Cancel</button><button class="btn btn-primary" id="confirmAcceptCounterBtn">Accept Rate</button>',
                onOpen: function(overlay) {
                    overlay.querySelector('#confirmAcceptCounterBtn').addEventListener('click', function() {
                        Modal.close(overlay);
                        var result = Booking.practiceRespondToNegotiation(offerId, 'accept');
                        if (result.success) {
                            Toast.show('Rate agreed! Booking accepted.', 'success');
                        } else {
                            Toast.show(result.message || 'Failed to accept rate.', 'error');
                        }
                        setTimeout(function() { render(); }, 300);
                    });
                }
            });
        }

        function confirmOfferBooking(offerId) {
            var success = Booking.confirmBooking(offerId);
            if (success) {
                Toast.show('Booking confirmed! The locum has been notified.', 'success');
            } else {
                Toast.show('Failed to confirm booking.', 'error');
            }
            setTimeout(function() { render(); }, 300);
        }

        function openNegotiate(offerId, currentRate) {
            Modal.show({
                title: 'Negotiate Rate',
                body: '<div style="padding:8px 0;"><p style="font-size:0.88rem;color:var(--dark-600);margin-bottom:16px;">Current rate: <strong>' + formatCurrency(currentRate) + '</strong></p><div class="form-group"><label class="form-label">Your counter-offer (£)</label><input type="number" id="counterRate" class="form-input" placeholder="e.g. 400" step="10" min="0"></div><div class="form-group"><label class="form-label">Message (optional)</label><textarea id="counterMessage" class="form-input" rows="2" placeholder="e.g. This is our standard rate for PM sessions"></textarea></div></div>',
                footer: '<button class="btn btn-ghost" data-modal-close>Cancel</button><button class="btn btn-primary" id="sendCounterBtn">Send Counter-Offer</button>',
                onOpen: function(overlay) {
                    overlay.querySelector('#sendCounterBtn').addEventListener('click', function() {
                        var rate = Number(overlay.querySelector('#counterRate').value);
                        var msg = overlay.querySelector('#counterMessage').value.trim();
                        if (!rate || rate <= 0) { Toast.show('Please enter a valid rate', 'error'); return; }
                        var result = Booking.practiceRespondToNegotiation(offerId, 'counter', rate, msg);
                        Modal.close(overlay);
                        if (result.success) {
                            Toast.show('Counter-offer sent to locum.', 'success');
                        } else {
                            Toast.show(result.message || 'Failed to send counter-offer.', 'error');
                        }
                        setTimeout(function() { render(); }, 300);
                    });
                }
            });
        }

        function confirmCancelNeed(needId) {
            Modal.show({
                title: 'Cancel Session',
                body: '<div style="padding:8px 0;"><p style="font-size:0.95rem;color:var(--dark-600);margin-bottom:12px;">Are you sure you want to cancel this session need?</p><p style="font-size:0.88rem;color:var(--danger);">All pending offers will be withdrawn and locums notified.</p></div>',
                footer: '<button class="btn btn-ghost" data-modal-close>Keep Session</button><button class="btn btn-small" style="background:var(--danger);color:white;border-color:var(--danger);" id="confirmCancelBtn">Cancel Session</button>',
                onOpen: function(overlay) {
                    overlay.querySelector('#confirmCancelBtn').addEventListener('click', function() {
                        var result = Booking.deleteSessionNeed(needId);
                        Modal.close(overlay);
                        if (result.error) {
                            Toast.show(result.message || 'Unable to cancel this session.', 'error');
                            return;
                        }
                        Toast.show('Session cancelled. All locums have been notified.', 'success');
                        setTimeout(function() { render(); }, 300);
                    });
                }
            });
        }

        // Also expose cancelSessionNeed for the card component
        window.cancelSessionNeed = confirmCancelNeed;
    </script>
</body>
</html>
