<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>View Shifts - GPRN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="app-layout">
    <script src="mock-data.js"></script>
    <script src="app.js"></script>
    <script src="components.js"></script>
    <script>
        if (!initPage('practice')) throw new Error('Auth required');

        const session = Auth.getSession();
        const data = getMockData();
        const pageContent = initAppLayout('practice', 'view-shifts', 'View Shifts');

        // Ensure each shift's applicants have corresponding offer records
        function ensureOfferExists(currentData, shift, locum) {
            const existing = currentData.offers.find(o => o.shiftId === shift.id && o.locumId === locum.id && o.status === 'pending');
            if (existing) return existing.id;
            const offerId = 'offer-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5);
            currentData.offers.push({
                id: offerId,
                shiftId: shift.id,
                locumId: locum.id,
                practiceId: shift.practiceId,
                practiceName: shift.practiceName,
                healthBoard: shift.healthBoard,
                shiftDate: shift.date,
                startTime: shift.startTime,
                endTime: shift.endTime,
                sessionType: shift.sessionType,
                rateAM: locum.rates.am,
                ratePM: locum.rates.pm,
                rateFullDay: locum.rates.fullDay,
                rateHousecall: locum.rates.housecall || 0,
                status: 'pending',
                offerDate: DateUtils.toISO(new Date()),
                comment: '',
                housecalls: shift.housecalls
            });
            saveMockData(currentData);
            return offerId;
        }

        function renderShiftsList(statusFilter, dateFrom, dateTo) {
            const currentData = getMockData();
            let shifts = currentData.shifts.filter(s => s.practiceId === session.id);

            if (statusFilter === 'history') {
                shifts = shifts.filter(s => s.status === 'filled' || new Date(s.date) < new Date());
            } else if (statusFilter === 'completed') {
                shifts = shifts.filter(s => {
                    return currentData.offers.some(o => o.shiftId === s.id && o.status === 'completed');
                });
            } else if (statusFilter && statusFilter !== 'all') {
                shifts = shifts.filter(s => s.status === statusFilter);
            }
            if (dateFrom) {
                shifts = shifts.filter(s => s.date >= dateFrom);
            }
            if (dateTo) {
                shifts = shifts.filter(s => s.date <= dateTo);
            }

            shifts.sort((a, b) => new Date(a.date) - new Date(b.date));

            const locums = currentData.locums;

            if (shifts.length === 0) {
                return renderEmptyState('list', 'No Shifts Found', 'No shifts match your current filters.', 'Post a Shift', 'post-shift.html');
            }

            return shifts.map(shift => {
                // Get ALL offers for this shift (to avoid recreating handled ones)
                const allShiftOffers = currentData.offers.filter(o => o.shiftId === shift.id);
                let shiftOffers = allShiftOffers.filter(o => o.status === 'pending' || o.status === 'negotiating');

                // Only create mock offers for open shifts that have never had real offers
                if (shift.status === 'open' && allShiftOffers.length === 0 && (shift.applicants || 0) > 0) {
                    const applicantCount = shift.applicants || 0;
                    const usedLocumIds = new Set(shiftOffers.map(o => o.locumId));
                    const availableLocums = locums.filter(l => !usedLocumIds.has(l.id));
                    for (let i = 0; i < Math.min(applicantCount, availableLocums.length); i++) {
                        ensureOfferExists(currentData, shift, availableLocums[i]);
                    }
                    shiftOffers = currentData.offers.filter(o => o.shiftId === shift.id && (o.status === 'pending' || o.status === 'negotiating'));
                }

                // Resolve locum details for each offer
                const applicants = shiftOffers.map(offer => {
                    const loc = locums.find(l => l.id === offer.locumId);
                    return loc ? { offer, locum: loc } : null;
                }).filter(Boolean);

                return `
                    <div class="shift-card-full" data-shift-id="${shift.id}">
                        <div class="shift-card-header">
                            <div>
                                <h3 class="shift-card-title">${DateUtils.format(shift.date, 'full')}</h3>
                                <p class="shift-card-location">${shift.startTime} - ${shift.endTime} &bull; ${shift.sessionType}</p>
                            </div>
                            <div class="shift-card-badges">
                                <span class="badge ${getStatusBadge(shift.status)}">${shift.status.charAt(0).toUpperCase() + shift.status.slice(1)}</span>
                                <span class="badge badge-neutral">${applicants.length} applicant${applicants.length !== 1 ? 's' : ''}</span>
                            </div>
                        </div>
                        <div class="shift-card-details">
                            <div class="shift-card-detail">
                                ${getIcon('monitor')}
                                <span>${shift.computerSystem}</span>
                            </div>
                            <div class="shift-card-detail">
                                ${getIcon('tag')}
                                <span>${shift.shiftType}</span>
                            </div>
                            ${!shift.housecalls ? `<span class="badge badge-neutral">No Housecalls</span>` : `<span class="badge badge-info">Housecalls</span>`}
                        </div>

                        ${applicants.length > 0 ? `
                        <div id="applicants-${shift.id}" style="display: none; padding-top: 12px; border-top: 1px solid var(--gray-100);">
                            <h4 style="font-size: 0.88rem; font-weight: 600; color: var(--dark-700); margin-bottom: 12px;">Applicants</h4>
                            ${applicants.map(({ offer, locum: loc }) => `
                                <div class="applicant-row" data-offer-id="${offer.id}" style="display: flex; align-items: center; justify-content: space-between; padding: 12px; background: var(--gray-50); border-radius: 8px; margin-bottom: 8px; flex-wrap: wrap; gap: 8px;">
                                    <div style="display: flex; align-items: center; gap: 12px;">
                                        <div class="header-avatar" style="width: 36px; height: 36px; font-size: 0.7rem;">${getInitials(loc.firstName + ' ' + loc.lastName)}</div>
                                        <div>
                                            <strong style="font-size: 0.88rem; color: var(--dark);">${loc.title} ${loc.firstName} ${loc.lastName}</strong>
                                            ${renderBarredWarning(session.id, loc.id)}
                                            <div style="display: flex; align-items: center; gap: 12px; margin-top: 2px;">
                                                <span style="font-size: 0.8rem; color: var(--dark-600);">Reliability: <strong style="color: ${loc.bookingReliability >= 95 ? 'var(--success)' : 'var(--warning)'};">${loc.bookingReliability}%</strong></span>
                                                <span style="font-size: 0.8rem; color: var(--dark-600);">Rate: ${formatCurrency(offer.sessionType === 'Full Day' ? offer.rateFullDay : offer.sessionType === 'AM' ? offer.rateAM : offer.ratePM)}</span>
                                                ${shift.budgetRate ? (() => { const offerRate = offer.sessionType === 'Full Day' ? offer.rateFullDay : offer.sessionType === 'AM' ? offer.rateAM : offer.ratePM; return offerRate > shift.budgetRate ? '<span class="badge badge-danger" style="font-size:0.7rem;padding:2px 6px;">Over budget</span>' : '<span class="badge badge-success" style="font-size:0.7rem;padding:2px 6px;">Within budget</span>'; })() : ''}
                                            </div>
                                        </div>
                                    </div>
                                    ${offer.negotiations && offer.negotiations.length > 0 ? `
                                    <div style="width:100%;padding:8px 12px;background:rgba(14,165,233,0.06);border-radius:6px;margin-top:4px;">
                                        <div style="font-size:0.75rem;font-weight:600;color:var(--secondary);margin-bottom:4px;">Rate Negotiation</div>
                                        ${offer.negotiations.map(n => '<div style="font-size:0.78rem;color:var(--dark-600);margin-bottom:2px;"><strong>' + (n.from === 'practice' ? 'You' : 'Locum') + ':</strong> ' + formatCurrency(n.rate) + (n.accepted ? ' ✓ Agreed' : '') + (n.message ? ' — ' + n.message : '') + '</div>').join('')}
                                    </div>` : ''}
                                    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                                        <a href="locum-profile-view.html?id=${loc.id}" class="btn btn-ghost btn-small">View Profile</a>
                                        ${offer.status === 'negotiating' && offer.negotiations && offer.negotiations.length > 0 && offer.negotiations[offer.negotiations.length - 1].from === 'locum' ? `
                                            <button class="btn btn-small" style="background:var(--secondary);color:white;border-color:var(--secondary);" onclick="openNegotiate('${offer.id}', ${offer.counterRate})">Counter</button>
                                            <button class="btn btn-primary btn-small" onclick="acceptCounterOffer('${offer.id}')">Accept Rate</button>
                                            <button class="btn btn-ghost btn-small" onclick="declineApplicant('${offer.id}')">Decline</button>
                                        ` : `
                                            <button class="btn btn-small" style="background:var(--secondary);color:white;border-color:var(--secondary);" onclick="openNegotiate('${offer.id}', ${offer.sessionType === 'Full Day' ? offer.rateFullDay : offer.sessionType === 'AM' ? offer.rateAM : offer.ratePM})">Negotiate</button>
                                            <button class="btn btn-primary btn-small" onclick="acceptApplicant('${offer.id}')">Accept</button>
                                            <button class="btn btn-ghost btn-small" onclick="declineApplicant('${offer.id}')">Decline</button>
                                        `}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        ` : ''}

                        ${allShiftOffers && allShiftOffers.some(o => ['accepted','acknowledged','confirmed','completed'].includes(o.status)) ? (() => {
                            const ao = allShiftOffers.find(o => ['accepted','acknowledged','confirmed','completed'].includes(o.status));
                            if (!ao) return '';
                            const loc = locums.find(l => l.id === ao.locumId);
                            if (!loc) return '';
                            const inv = currentData.invoices ? currentData.invoices.find(i => i.offerId === ao.id) : null;
                            return '<div style="padding:12px;background:rgba(16,185,129,0.06);border-radius:8px;margin-top:8px;border:1px solid rgba(16,185,129,0.15);"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;"><div style="display:flex;align-items:center;gap:10px;"><div class="header-avatar" style="width:32px;height:32px;font-size:0.65rem;">' + getInitials(loc.firstName + ' ' + loc.lastName) + '</div><div><strong style="font-size:0.85rem;color:var(--dark);">' + loc.title + ' ' + loc.firstName + ' ' + loc.lastName + '</strong><div style="font-size:0.78rem;color:var(--dark-600);">Status: <span class="badge ' + getStatusBadge(ao.status) + '" style="font-size:0.7rem;">' + ao.status.charAt(0).toUpperCase() + ao.status.slice(1).replace(/_/g,' ') + '</span>' + (ao.agreedRate ? ' • Agreed rate: ' + formatCurrency(ao.agreedRate) : ' • Rate: ' + formatCurrency(ao.sessionType === 'Full Day' ? ao.rateFullDay : ao.sessionType === 'AM' ? ao.rateAM : ao.ratePM)) + '</div></div></div><div style="display:flex;gap:8px;">' + (inv ? '<a href="invoice-view.html?id=' + inv.id + '" class="btn btn-ghost btn-small">' + inv.invoiceNumber + ' (' + inv.status + ')</a>' : '') + '<a href="locum-profile-view.html?id=' + loc.id + '" class="btn btn-ghost btn-small">View Profile</a></div></div></div>';
                        })() : ''}

                        <div class="shift-card-footer">
                            <span style="font-size: 0.82rem; color: var(--gray-400);">Shift date: ${DateUtils.format(shift.date, 'medium')}</span>
                            ${applicants.length > 0 ? `
                                <button class="btn btn-ghost btn-small" onclick="toggleApplicants('${shift.id}', this)">
                                    ${getIcon('chevron-down')} Show Applicants
                                </button>
                            ` : `
                                <span style="font-size: 0.82rem; color: var(--gray-400);">No applicants yet</span>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function render() {
            const statusFilter = document.getElementById('filterStatus') ? document.getElementById('filterStatus').value : 'all';
            const dateFrom = document.getElementById('filterDateFrom') ? document.getElementById('filterDateFrom').value : '';
            const dateTo = document.getElementById('filterDateTo') ? document.getElementById('filterDateTo').value : '';

            pageContent.innerHTML = `
                <h1 style="font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--dark); margin-bottom: 24px;">
                    Your Posted Shifts
                </h1>

                <div class="filter-bar">
                    <div class="form-group">
                        <label class="form-label">Status</label>
                        <select id="filterStatus" class="form-select" onchange="render()">
                            <option value="all" ${statusFilter === 'all' ? 'selected' : ''}>All Statuses</option>
                            <option value="open" ${statusFilter === 'open' ? 'selected' : ''}>Open</option>
                            <option value="filled" ${statusFilter === 'filled' ? 'selected' : ''}>Filled</option>
                            <option value="completed" ${statusFilter === 'completed' ? 'selected' : ''}>Completed</option>
                            <option value="history" ${statusFilter === 'history' ? 'selected' : ''}>All Historical</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">From</label>
                        <input type="date" id="filterDateFrom" class="form-input" value="${dateFrom}" onchange="render()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">To</label>
                        <input type="date" id="filterDateTo" class="form-input" value="${dateTo}" onchange="render()">
                    </div>
                </div>

                <div id="shiftsList">
                    ${renderShiftsList(statusFilter, dateFrom, dateTo)}
                </div>
            `;
        }

        render();

        function toggleApplicants(shiftId, btn) {
            const el = document.getElementById('applicants-' + shiftId);
            if (el) {
                const isHidden = el.style.display === 'none';
                el.style.display = isHidden ? 'block' : 'none';
                btn.innerHTML = isHidden
                    ? getIcon('chevron-down') + ' Hide Applicants'
                    : getIcon('chevron-down') + ' Show Applicants';
            }
        }

        function acceptApplicant(offerId) {
            const success = Booking.acceptOffer(offerId);
            if (success) {
                Toast.show('Applicant accepted! Shift marked as filled. Other applicants have been auto-declined.', 'success');
            } else {
                Toast.show('Failed to accept applicant. Please try again.', 'error');
            }
            setTimeout(() => render(), 500);
        }

        function declineApplicant(offerId) {
            const success = Booking.declineOffer(offerId);
            if (success) {
                Toast.show('Applicant declined. The locum has been notified.', 'info');
            } else {
                Toast.show('Failed to decline applicant. Please try again.', 'error');
            }
            setTimeout(() => render(), 500);
        }
        function getStatusBadge(status) {
            const map = { 'open': 'badge-primary', 'filled': 'badge-success', 'pending': 'badge-warning', 'accepted': 'badge-success', 'acknowledged': 'badge-success', 'confirmed': 'badge-info', 'completed': 'badge-info', 'declined': 'badge-neutral', 'withdrawn': 'badge-neutral', 'cancelled': 'badge-danger', 'no_show': 'badge-danger', 'negotiating': 'badge-warning', 'rejected_by_locum': 'badge-danger', 'paid': 'badge-success', 'overdue': 'badge-danger', 'disputed': 'badge-warning' };
            return map[status] || 'badge-neutral';
        }

        function openNegotiate(offerId, currentRate) {
            Modal.show({
                title: 'Negotiate Rate',
                body: '<div style="padding:8px 0;"><p style="font-size:0.88rem;color:var(--dark-600);margin-bottom:16px;">Current offered rate: <strong>' + formatCurrency(currentRate) + '</strong></p><div class="form-group"><label class="form-label">Your counter-offer (£)</label><input type="number" id="counterRate" class="form-input" placeholder="e.g. 400" step="10" min="0"></div><div class="form-group"><label class="form-label">Message (optional)</label><textarea id="counterMessage" class="form-input" rows="2" placeholder="e.g. This is our standard rate for PM sessions"></textarea></div></div>',
                footer: '<button class="btn btn-ghost" data-modal-close>Cancel</button><button class="btn btn-primary" id="sendCounterBtn">Send Counter-Offer</button>',
                onOpen: function(overlay) {
                    overlay.querySelector('#sendCounterBtn').addEventListener('click', function() {
                        var rate = Number(overlay.querySelector('#counterRate').value);
                        var msg = overlay.querySelector('#counterMessage').value.trim();
                        if (!rate || rate <= 0) { Toast.show('Please enter a valid rate', 'error'); return; }
                        Booking.counterOffer(offerId, rate, msg);
                        Modal.close(overlay);
                        Toast.show('Counter-offer sent to locum', 'success');
                        setTimeout(function() { render(); }, 500);
                    });
                }
            });
        }

        function acceptCounterOffer(offerId) {
            Booking.practiceRespondToCounter(offerId, true);
            Toast.show('Rate agreed! The locum has been notified.', 'success');
            setTimeout(function() { render(); }, 500);
        }
    </script>
</body>
</html>
