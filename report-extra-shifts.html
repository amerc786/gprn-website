<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Log External Sessions - GPRN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Syne"', 'sans-serif'],
                    },
                    colors: {
                        navy: { DEFAULT: '#0B0F19', 50: '#141C2F' },
                        brand: { green: '#059669', mint: '#ECFDF5', dark: '#022C22' },
                        surface: '#F8F9FA'
                    },
                    boxShadow: {
                        'card': '0 4px 20px rgba(0, 0, 0, 0.03)',
                        'card-hover': '0 10px 40px rgba(0, 0, 0, 0.08)',
                        'subtle': '0 1px 2px rgba(0,0,0,0.02)',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="app-layout">
    <script src="mock-data.js"></script>
    <script src="app.js"></script>
<script src="supabase-client.js"></script>
    <script src="components.js"></script>
    <script>
        if (!initPage('locum')) throw new Error('Auth required');

        const pageContent = initAppLayout('locum', 'report', 'Log External Sessions');

        function getReportedShifts() {
            const raw = localStorage.getItem('gprn_reported_shifts_' + Auth.getSession().id);
            return raw ? JSON.parse(raw) : [];
        }

        function saveReportedShifts(shifts) {
            localStorage.setItem('gprn_reported_shifts_' + Auth.getSession().id, JSON.stringify(shifts));
        }

        function renderPage() {
            const data = getMockData();
            const practices = data.practices;
            const reported = getReportedShifts();

            pageContent.innerHTML = `
                <p style="font-size: 0.92rem; color: var(--dark-700); line-height: 1.7; margin-bottom: 16px;">
                    Use this form to log sessions you have worked directly with a practice outside of the GPRN booking system. This helps us keep an accurate record of your activity and ensures your booking reliability and session history remain up to date.
                </p>

                <div style="background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.25); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 28px; display: flex; align-items: flex-start; gap: 12px; font-size: 0.88rem; color: var(--dark-700);">
                    <span style="color: var(--warning); flex-shrink: 0; margin-top: 2px;">${getIcon('help-circle')}</span>
                    <span><strong>Important:</strong> Do not use this page to record sessions already booked and confirmed through the GPRN platform. Only log sessions arranged directly with a practice outside this system.</span>
                </div>

                <!-- Report Form -->
                <div class="content-card">
                    <div class="content-card-header"><h2>Log a Session</h2></div>
                    <div class="content-card-body">
                        <form id="reportForm" onsubmit="submitReport(event)">
                            <div class="form-group">
                                <label class="form-label">Practice</label>
                                <select class="form-select" id="reportPractice" required>
                                    <option value="">Select a practice...</option>
                                    ${practices.map(p => `<option value="${p.id}">${p.practiceName} - ${p.healthBoard}</option>`).join('')}
                                </select>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">Date</label>
                                    <input type="date" class="form-input" id="reportDate" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Session Type</label>
                                    <div style="display: flex; gap: 20px; padding-top: 8px;">
                                        <label class="form-radio">
                                            <input type="radio" name="reportSession" value="AM" checked> AM Only
                                        </label>
                                        <label class="form-radio">
                                            <input type="radio" name="reportSession" value="PM"> PM Only
                                        </label>
                                        <label class="form-radio">
                                            <input type="radio" name="reportSession" value="Full Day"> Full Day
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary">Submit Report</button>
                        </form>
                    </div>
                </div>

                <!-- History -->
                <div class="content-card">
                    <div class="content-card-header"><h2>Previously Logged Sessions</h2></div>
                    <div class="content-card-body" style="${reported.length === 0 ? '' : 'padding: 0;'}">
                        ${reported.length > 0 ? `
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Practice</th>
                                        <th>Date</th>
                                        <th>Session</th>
                                        <th>Reported On</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${reported.map(r => `
                                        <tr>
                                            <td style="font-weight: 600;">${r.practiceName}</td>
                                            <td>${DateUtils.format(r.date, 'medium')}</td>
                                            <td><span class="badge badge-primary">${r.sessionType}</span></td>
                                            <td>${DateUtils.format(r.reportedOn, 'medium')}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        ` : `
                            <div class="empty-state" style="padding: 40px 20px;">
                                <div class="empty-state-icon">${getIcon('file-text')}</div>
                                <h3>No logged sessions</h3>
                                <p>Sessions you log outside of the GPRN platform will appear here.</p>
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        function submitReport(e) {
            e.preventDefault();
            const practiceId = document.getElementById('reportPractice').value;
            const date = document.getElementById('reportDate').value;
            const sessionType = document.querySelector('input[name="reportSession"]:checked').value;

            if (!practiceId || !date) {
                Toast.show('Please fill in all fields', 'error');
                return;
            }

            if (new Date(date) > new Date()) {
                Toast.show('Cannot log sessions for future dates.', 'error');
                return;
            }

            const data = getMockData();
            const practice = data.practices.find(p => p.id === practiceId);

            const reported = getReportedShifts();

            const duplicate = reported.find(r => r.practiceId === practiceId && r.date === date && r.sessionType === sessionType);
            if (duplicate) {
                Toast.show('You have already logged a ' + sessionType + ' session at this practice on this date.', 'warning');
                return;
            }

            reported.unshift({
                id: 'rep-' + Date.now(),
                practiceId: practiceId,
                practiceName: practice ? practice.practiceName : 'Unknown',
                date: date,
                sessionType: sessionType,
                reportedOn: new Date().toISOString().split('T')[0]
            });
            saveReportedShifts(reported);

            Toast.show('Session logged successfully', 'success');
            document.getElementById('reportForm').reset();
            renderPage();
        }

        renderPage();
    </script>
</body>
</html>
