<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Admin — Account Approvals · GPRN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: var(--bg, #081425);
            color: var(--text-primary, #F8FAFC);
            font-family: Inter, sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        .admin-wrap {
            max-width: 1180px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .admin-header .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #F8FAFC;
            text-decoration: none;
            font-family: 'Space Grotesk', Inter, sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
        }
        .admin-header .logo-icon {
            background: #059669;
            color: #fff;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
        }
        .admin-user {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #CBD5E1;
            font-size: 0.9rem;
        }
        .admin-user button {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            color: #CBD5E1;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: inherit;
        }
        .admin-user button:hover {
            background: rgba(255,255,255,0.05);
        }
        .admin-title {
            font-family: 'Space Grotesk', Inter, sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
        }
        .admin-subtitle {
            color: #94A3B8;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }
        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .filter-tab {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: #CBD5E1;
            padding: 0.55rem 1.1rem;
            border-radius: 999px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 150ms;
        }
        .filter-tab:hover {
            background: rgba(255,255,255,0.08);
        }
        .filter-tab.active {
            background: #059669;
            border-color: transparent;
            color: #fff;
        }
        .filter-tab .count {
            display: inline-block;
            margin-left: 0.4rem;
            background: rgba(255,255,255,0.15);
            padding: 0.05rem 0.5rem;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }
        .profile-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .profile-card-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.75rem;
        }
        .profile-name {
            font-weight: 700;
            font-size: 1.05rem;
            color: #F8FAFC;
            margin: 0 0 0.15rem;
        }
        .profile-email {
            color: #94A3B8;
            font-size: 0.85rem;
            word-break: break-all;
        }
        .role-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            flex-shrink: 0;
        }
        .role-badge.locum {
            background: rgba(5, 150, 105, 0.1);
            color: #60A5FA;
            border: 1px solid rgba(5, 150, 105, 0.2);
        }
        .role-badge.practice {
            background: rgba(20, 184, 166, 0.15);
            color: #2DD4BF;
            border: 1px solid rgba(20, 184, 166, 0.3);
        }
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .status-badge.pending {
            background: rgba(245, 158, 11, 0.15);
            color: #FCD34D;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        .status-badge.approved {
            background: rgba(34, 197, 94, 0.15);
            color: #86EFAC;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .status-badge.rejected {
            background: rgba(239, 68, 68, 0.15);
            color: #FCA5A5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .profile-meta {
            font-size: 0.82rem;
            color: #94A3B8;
            line-height: 1.5;
        }
        .profile-meta strong {
            color: #CBD5E1;
            font-weight: 600;
        }
        .profile-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        .admin-flag {
            display: inline-block;
            padding: 0.2rem 0.55rem;
            border-radius: 999px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            background: linear-gradient(135deg, #F59E0B, #EF4444);
            color: #fff;
            margin-left: 0.35rem;
        }
        .menu-wrap {
            position: relative;
            flex: 1;
        }
        .menu-wrap .btn-admin {
            width: 100%;
        }
        .menu-pop {
            position: absolute;
            bottom: calc(100% + 6px);
            left: 0;
            right: 0;
            background: #10233D;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            padding: 0.35rem;
            z-index: 100;
            display: none;
        }
        .menu-pop.open { display: block; }
        .menu-pop button {
            display: block;
            width: 100%;
            text-align: left;
            background: transparent;
            border: none;
            color: #CBD5E1;
            padding: 0.55rem 0.7rem;
            border-radius: 7px;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .menu-pop button:hover { background: rgba(255,255,255,0.06); color: #F8FAFC; }
        .menu-pop button.danger { color: #FCA5A5; }
        .menu-pop button.danger:hover { background: rgba(239,68,68,0.1); }
        .menu-pop hr { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 0.25rem 0; }
        .admin-modal label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #CBD5E1;
            margin-bottom: 0.35rem;
        }
        .admin-modal input[type="text"],
        .admin-modal input[type="email"],
        .admin-modal input[type="tel"],
        .admin-modal input[type="number"] {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 0.6rem 0.75rem;
            color: #F8FAFC;
            font-family: inherit;
            font-size: 0.9rem;
            margin-bottom: 0.85rem;
            box-sizing: border-box;
        }
        .admin-modal input:focus,
        .admin-modal textarea:focus {
            outline: none;
            border-color: #059669;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }
        @media (max-width: 520px) {
            .form-row { grid-template-columns: 1fr; }
        }
        .danger-banner {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            padding: 0.85rem 1rem;
            color: #FCA5A5;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        .btn-admin {
            flex: 1;
            padding: 0.55rem 0.85rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: all 150ms;
        }
        .btn-admin.primary {
            background: linear-gradient(135deg, #22C55E, #14B8A6);
            color: #fff;
        }
        .btn-admin.primary:hover {
            filter: brightness(1.1);
        }
        .btn-admin.danger {
            background: rgba(239, 68, 68, 0.15);
            color: #FCA5A5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .btn-admin.danger:hover {
            background: rgba(239, 68, 68, 0.25);
        }
        .btn-admin.ghost {
            background: transparent;
            color: #94A3B8;
            border: 1px solid rgba(255,255,255,0.12);
        }
        .btn-admin.ghost:hover {
            background: rgba(255,255,255,0.05);
            color: #F8FAFC;
        }
        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: #94A3B8;
        }
        .empty-state svg {
            color: #14B8A6;
            margin-bottom: 1rem;
        }
        .empty-state h3 {
            color: #F8FAFC;
            margin: 0 0 0.5rem;
            font-size: 1.25rem;
        }
        .details-list {
            list-style: none;
            padding: 0;
            margin: 0.5rem 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .details-list li {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
        }
        .details-list li span:first-child {
            color: #94A3B8;
            font-weight: 500;
        }
        .details-list li span:last-child {
            color: #F8FAFC;
            font-weight: 600;
            text-align: right;
            margin-left: 1rem;
            word-break: break-word;
        }
        /* Modal */
        .admin-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 1rem;
        }
        .admin-modal {
            background: #10233D;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 1.75rem;
            max-width: 560px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            color: #F8FAFC;
        }
        .admin-modal h3 {
            font-family: 'Space Grotesk', Inter, sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            margin: 0 0 1rem;
        }
        .admin-modal textarea {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 0.75rem;
            color: #F8FAFC;
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
            min-height: 80px;
            margin-bottom: 1rem;
        }
        .admin-modal .modal-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }
        .toast-holder {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 20000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .admin-toast {
            background: #10233D;
            border: 1px solid rgba(255,255,255,0.12);
            color: #F8FAFC;
            padding: 0.85rem 1.1rem;
            border-radius: 10px;
            font-size: 0.88rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            max-width: 360px;
        }
        .admin-toast.success { border-color: rgba(34, 197, 94, 0.4); }
        .admin-toast.error { border-color: rgba(239, 68, 68, 0.4); }
    </style>
</head>
<body>
    <script src="mock-data.js"></script>
    <script src="app.js"></script>
    <script src="supabase-client.js"></script>
    <script src="supabase-tables.js"></script>

    <div class="admin-wrap">
        <div class="admin-header">
            <a href="index.html" class="logo">
                <span class="logo-icon">GP</span><span>RN</span>
            </a>
            <div class="admin-user">
                <span id="adminEmail"></span>
                <button onclick="Auth.logout()">Sign out</button>
            </div>
        </div>

        <h1 class="admin-title">Account Approvals</h1>
        <p class="admin-subtitle">Review and approve new account registrations. All new sign-ups start as pending until you act on them.</p>

        <div class="filter-tabs" id="filterTabs">
            <button class="filter-tab active" data-filter="pending">Pending <span class="count" id="cntPending">0</span></button>
            <button class="filter-tab" data-filter="approved">Approved <span class="count" id="cntApproved">0</span></button>
            <button class="filter-tab" data-filter="rejected">Rejected <span class="count" id="cntRejected">0</span></button>
            <button class="filter-tab" data-filter="all">All <span class="count" id="cntAll">0</span></button>
        </div>

        <div id="profilesContainer"></div>
    </div>

    <div class="toast-holder" id="toastHolder"></div>

    <script>
        (function() {
            // ---- Access gate ----
            if (!Auth.isLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }

            var session = Auth.getSession();
            if (!session.is_admin) {
                // Double check against server — the session flag could be stale
                var isAdminServer = AdminApproval.isCurrentUserAdmin();
                if (!isAdminServer) {
                    window.location.href = (session.role === 'locum') ? 'locum-dashboard.html' : 'practice-dashboard.html';
                    return;
                }
            }

            document.getElementById('adminEmail').textContent = session.email || '';

            // ---- State ----
            var currentFilter = 'pending';
            var allProfiles = [];

            // ---- Helpers ----
            function esc(str) {
                return String(str == null ? '' : str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            function formatDate(iso) {
                if (!iso) return '—';
                try {
                    var d = new Date(iso);
                    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' })
                         + ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                } catch(e) { return iso; }
            }

            function showToast(msg, type) {
                var t = document.createElement('div');
                t.className = 'admin-toast ' + (type || '');
                t.textContent = msg;
                document.getElementById('toastHolder').appendChild(t);
                setTimeout(function() { t.style.opacity = '0'; t.style.transition = 'opacity 300ms'; }, 3200);
                setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 3600);
            }

            function displayNameFor(p) {
                var pd = p.profile_data || {};
                if (p.role === 'locum') {
                    var bits = [pd.title, pd.firstName, pd.lastName].filter(Boolean);
                    if (bits.length) return bits.join(' ');
                } else {
                    if (pd.practiceName) return pd.practiceName;
                }
                return p.email;
            }

            // ---- Rendering ----
            function updateCounts() {
                var counts = { pending: 0, approved: 0, rejected: 0 };
                allProfiles.forEach(function(p) {
                    if (counts[p.approval_status] !== undefined) counts[p.approval_status]++;
                });
                document.getElementById('cntPending').textContent = counts.pending;
                document.getElementById('cntApproved').textContent = counts.approved;
                document.getElementById('cntRejected').textContent = counts.rejected;
                document.getElementById('cntAll').textContent = allProfiles.length;
            }

            function renderList() {
                var filtered = allProfiles.filter(function(p) {
                    if (currentFilter === 'all') return true;
                    return p.approval_status === currentFilter;
                });

                var container = document.getElementById('profilesContainer');

                if (!filtered.length) {
                    var message = currentFilter === 'pending'
                        ? 'No pending registrations to review right now.'
                        : 'No ' + currentFilter + ' profiles.';
                    container.innerHTML = ''
                        + '<div class="empty-state">'
                        +   '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>'
                        +   '<h3>All caught up</h3>'
                        +   '<p>' + esc(message) + '</p>'
                        + '</div>';
                    return;
                }

                var html = '<div class="profile-grid">';
                filtered.forEach(function(p) {
                    var pd = p.profile_data || {};
                    var name = displayNameFor(p);
                    var metaBits = [];
                    if (p.role === 'locum') {
                        if (pd.phone) metaBits.push('<strong>Phone:</strong> ' + esc(pd.phone));
                        if (pd.gmcNumber) metaBits.push('<strong>GMC:</strong> ' + esc(pd.gmcNumber));
                        if (pd.yearsExperience != null) metaBits.push('<strong>Experience:</strong> ' + esc(pd.yearsExperience) + ' yrs');
                        if (pd.healthBoard) metaBits.push('<strong>Health board:</strong> ' + esc(pd.healthBoard));
                    } else {
                        if (pd.phone) metaBits.push('<strong>Phone:</strong> ' + esc(pd.phone));
                        if (pd.contactName) metaBits.push('<strong>Contact:</strong> ' + esc(pd.contactName));
                        if (pd.healthBoard) metaBits.push('<strong>Health board:</strong> ' + esc(pd.healthBoard));
                        if (pd.city) metaBits.push('<strong>City:</strong> ' + esc(pd.city));
                        if (pd.odsCode) metaBits.push('<strong>ODS:</strong> ' + esc(pd.odsCode));
                    }
                    metaBits.push('<strong>Registered:</strong> ' + esc(formatDate(p.created_at)));
                    if (p.approval_status === 'approved' && p.approved_at) {
                        metaBits.push('<strong>Approved:</strong> ' + esc(formatDate(p.approved_at)));
                    }
                    if (p.approval_status === 'rejected' && p.rejected_at) {
                        metaBits.push('<strong>Rejected:</strong> ' + esc(formatDate(p.rejected_at)));
                        if (p.rejection_reason) metaBits.push('<strong>Reason:</strong> ' + esc(p.rejection_reason));
                    }

                    var actions = '';
                    if (p.approval_status === 'pending') {
                        actions = ''
                            + '<div class="profile-actions">'
                            +   '<button class="btn-admin ghost" data-action="view" data-id="' + esc(p.id) + '">Details</button>'
                            +   '<button class="btn-admin danger" data-action="reject" data-id="' + esc(p.id) + '">Reject</button>'
                            +   '<button class="btn-admin primary" data-action="approve" data-id="' + esc(p.id) + '">Approve</button>'
                            + '</div>';
                    } else {
                        // Build dropdown menu for approved/rejected accounts
                        var menuItems = '';
                        menuItems += '<button data-action="view" data-id="' + esc(p.id) + '">View details</button>';
                        menuItems += '<button data-action="edit" data-id="' + esc(p.id) + '">Edit profile</button>';
                        menuItems += '<button data-action="reset-password" data-id="' + esc(p.id) + '">Send password reset email</button>';
                        if (p.approval_status === 'approved') {
                            menuItems += '<button data-action="resend-approval" data-id="' + esc(p.id) + '">Resend approval email</button>';
                            menuItems += '<hr>';
                            if (p.is_admin) {
                                menuItems += '<button data-action="demote" data-id="' + esc(p.id) + '">Revoke admin</button>';
                            } else {
                                menuItems += '<button data-action="promote" data-id="' + esc(p.id) + '">Promote to admin</button>';
                            }
                            menuItems += '<button class="danger" data-action="suspend" data-id="' + esc(p.id) + '">Suspend account</button>';
                        } else if (p.approval_status === 'rejected') {
                            menuItems += '<hr>';
                            menuItems += '<button data-action="unsuspend" data-id="' + esc(p.id) + '">Re-approve / unsuspend</button>';
                        }
                        menuItems += '<hr>';
                        menuItems += '<button class="danger" data-action="delete" data-id="' + esc(p.id) + '">Delete permanently</button>';

                        actions = ''
                            + '<div class="profile-actions">'
                            +   '<div class="menu-wrap">'
                            +     '<button class="btn-admin ghost" data-menu-toggle="' + esc(p.id) + '">Manage ▾</button>'
                            +     '<div class="menu-pop" data-menu-for="' + esc(p.id) + '">' + menuItems + '</div>'
                            +   '</div>'
                            + '</div>';
                    }

                    var adminBadge = p.is_admin ? '<span class="admin-flag">Admin</span>' : '';
                    html += ''
                        + '<div class="profile-card">'
                        +   '<div class="profile-card-head">'
                        +     '<div>'
                        +       '<div class="profile-name">' + esc(name) + adminBadge + '</div>'
                        +       '<div class="profile-email">' + esc(p.email) + '</div>'
                        +     '</div>'
                        +     '<span class="role-badge ' + esc(p.role) + '">' + esc(p.role) + '</span>'
                        +   '</div>'
                        +   '<span class="status-badge ' + esc(p.approval_status) + '">' + esc(p.approval_status) + '</span>'
                        +   '<div class="profile-meta">' + metaBits.join('<br>') + '</div>'
                        +   actions
                        + '</div>';
                });
                html += '</div>';
                container.innerHTML = html;

                // Wire up menu toggles
                container.querySelectorAll('button[data-menu-toggle]').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var id = btn.getAttribute('data-menu-toggle');
                        var pop = container.querySelector('.menu-pop[data-menu-for="' + id + '"]');
                        // Close all other menus
                        container.querySelectorAll('.menu-pop.open').forEach(function(m) {
                            if (m !== pop) m.classList.remove('open');
                        });
                        if (pop) pop.classList.toggle('open');
                    });
                });

                // Wire up action buttons
                container.querySelectorAll('button[data-action]').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var action = btn.getAttribute('data-action');
                        var id = btn.getAttribute('data-id');
                        var profile = allProfiles.find(function(p) { return p.id === id; });
                        if (!profile) return;

                    showDiagBanner('error', msg, cta);

                    cta = '<button onclick="localStorage.removeItem(\'gprn_session\'); window.location.href=\'login.html\';" style="margin-top:10px; padding:8px 16px; background:#059669; color:#fff; border:none; border-radius:8px; font-weight:600; cursor:pointer;">Log out and log back in</button>';
                    showDiagBanner('error', msg, cta);
                    return;
                }

                // Hit the profiles REST endpoint directly to read the real status
                var xhr = new XMLHttpRequest();
                xhr.open('GET', SUPABASE_URL + '/rest/v1/profiles?select=id,email,approval_status,is_admin', true);

                xhr.onload = function() {
                    var status = xhr.status;
                    var body = xhr.responseText;
                    var parsed = null;
                    try { parsed = JSON.parse(body); } catch (e) {}

                    if (status === 401) {
                        showDiagBanner('error',

                            '<button onclick="localStorage.removeItem(\'gprn_session\'); window.location.href=\'login.html\';" style="margin-top:10px; padding:8px 16px; background:#059669; color:#fff; border:none; border-radius:8px; font-weight:600; cursor:pointer;">Log out and log back in</button>'
                        );
                    } else if (status === 200 && Array.isArray(parsed) && parsed.length === 0) {
                        showDiagBanner('warn',
                            'Supabase returned no profiles at all. The profiles table is empty or RLS is filtering everything. If you recently ran SQL that affected this table, you may need to restore it.',
                            ''
                        );
                    } else if (status === 200 && Array.isArray(parsed) && parsed.length > 0) {
                        // Data IS there — the client-side list call must have failed.
                        // Force-set allProfiles from this fetch and re-render.
                        showDiagBanner('warn',
                            'Profiles exist but the admin client returned empty. Auto-recovering from direct fetch (' + parsed.length + ' rows).',
                            ''
                        );
                        // Refetch full rows for a proper render
                        var xhr2 = new XMLHttpRequest();
                        xhr2.open('GET', SUPABASE_URL + '/rest/v1/profiles?select=id,email,role,approval_status,is_admin,profile_data,created_at,approved_at,rejected_at,rejection_reason&order=created_at.desc', true);
                        xhr2.setRequestHeader('apikey', SUPABASE_ANON_KEY);
                        xhr2.setRequestHeader('Authorization', 'Bearer ' + session.access_token);
                        xhr2.onload = function() {
                            if (xhr2.status === 200) {
                                try {
                                    allProfiles = JSON.parse(xhr2.responseText) || [];
                                    updateCounts();
                                    renderList();
                                } catch (e) {}
                            }
                        };
                        xhr2.send();
                    } else {
                        showDiagBanner('error',
                            'Unexpected response from Supabase (HTTP ' + status + '). Response: ' + (body || '(empty)').substring(0, 300),
                            ''
                        );
                    }
                };
                xhr.onerror = function() {
                    showDiagBanner('error', 'Network error reaching Supabase. Check your internet connection.', '');
                };
                xhr.send();
            }

            function showDiagBanner(kind, msg, cta) {

                var color = kind === 'error' ? '#991B1B' : '#92400E';
                var banner = document.createElement('div');
                banner.id = 'adminDiagBanner';
                banner.style.cssText = 'background:' + bg + ';border:1px solid ' + border + ';color:' + color + ';padding:16px 20px;border-radius:12px;margin:16px 0;font-size:0.9rem;line-height:1.5;';

                main.insertBefore(banner, main.firstChild);

                    +   '<strong>This action cannot be undone.</strong> The user record, profile, and all associated auth data will be permanently removed. Any historical shifts, bookings, and messages they created will remain in the database but will no longer be linked to an active account.'
                    + '</div>'
                    + '<p style="color:#CBD5E1; font-size:0.9rem; margin-bottom:0.35rem;">'
                    +   'To confirm, type the email address <code style="color:#FCA5A5">' + esc(profile.email) + '</code> below:'
                    + '</p>'
                    + '<input type="text" id="deleteConfirm" placeholder="' + esc(profile.email) + '">'
                    + '<div class="modal-actions">'
                    +   '<button class="btn-admin ghost" id="cancelDelete">Cancel</button>'
                    +   '<button class="btn-admin danger" id="doDelete" disabled>Delete forever</button>'
                    + '</div>'
                , function(overlay) {
                    var input = overlay.querySelector('#deleteConfirm');
                    var delBtn = overlay.querySelector('#doDelete');
                    input.addEventListener('input', function() {
                        delBtn.disabled = input.value.trim().toLowerCase() !== profile.email.toLowerCase();
                    });
                    overlay.querySelector('#cancelDelete').addEventListener('click', function() {
                        document.body.removeChild(overlay);
                    });
                    delBtn.addEventListener('click', function() {
                        delBtn.disabled = true;
                        delBtn.textContent = 'Deleting…';
                        var res = AdminApproval.callAdminAction('delete_user', profile.id);
                        if (res && res.success) {
                            showToast('Account deleted', 'success');
                            document.body.removeChild(overlay);
                            loadProfiles();
                        } else {
                            showToast('Delete failed: ' + (res && res.error || 'unknown'), 'error');
                            delBtn.disabled = false;
                            delBtn.textContent = 'Delete forever';
                        }
                    });
                });
            }

            // ---- Filter tabs ----
            document.getElementById('filterTabs').addEventListener('click', function(e) {
                var btn = e.target.closest('.filter-tab');
                if (!btn) return;
                document.querySelectorAll('.filter-tab').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                currentFilter = btn.getAttribute('data-filter');
                renderList();
            });

            // ---- Initial load ----
            loadProfiles();
        })();
    </script>
</body>
</html>
