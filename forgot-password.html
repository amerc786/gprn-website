<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Forgot Password - GPRN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="hero-bg-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>

        <div class="auth-card">
            <div class="auth-logo">
                <a href="index.html" class="logo">
                    <span class="logo-icon">GP</span><span class="logo-text">RN</span>
                </a>
                <p>Reset Your Password</p>
            </div>

            <form id="forgotForm" novalidate>
                <div id="formFields">
                    <p style="font-size:0.9rem; color:var(--dark-600); margin-bottom:24px;">Enter your email address and we'll send you a link to reset your password.</p>

                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" id="email" class="form-input" placeholder="you@example.com" required data-validate="email">
                        <div class="form-error"></div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Send Reset Link</button>
                </div>

                <div id="successMessage" style="display:none; text-align:center; padding:20px 0;">
                    <div style="width:64px; height:64px; border-radius:50%; background:rgba(16,185,129,0.1); display:flex; align-items:center; justify-content:center; margin:0 auto 16px;">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                    <h3 style="font-size:1.1rem; font-weight:700; color:var(--dark); margin-bottom:8px;">Check Your Email</h3>
                    <p style="font-size:0.9rem; color:var(--dark-600); line-height:1.6;">If an account with that email exists, we've sent a password reset link. Please check your inbox and spam folder.</p>
                </div>
            </form>

            <div class="auth-footer">
                <a href="login.html" style="display:inline-flex; align-items:center; gap:6px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    Back to Login
                </a>
            </div>
        </div>
    </div>

    <script src="mock-data.js"></script>
    <script src="app.js?v=20260407b"></script>
    <script src="supabase-client.js?v=20260407b"></script>
    <script src="supabase-tables.js?v=20260407b"></script>
    <script src="components.js?v=20260407b"></script>
    <script>
        (function() {
            // Public Supabase config (anon key is safe to embed)
            var SUPABASE_URL = 'https://fysilmypgpewbzyxkymx.supabase.co';
            var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5c2lsbXlwZ3Bld2J6eXhreW14Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzODQwNjYsImV4cCI6MjA5MDk2MDA2Nn0.BEgSiUO_RWvk0ixZSORuKFqwMG6nYNGsCqWCftukBnE';

            var form = document.getElementById('forgotForm');
            var formFields = document.getElementById('formFields');
            var successMessage = document.getElementById('successMessage');
            var submitBtn = form.querySelector('button[type="submit"]');

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                if (!FormValidator.validate(this)) return;

                var email = document.getElementById('email').value.trim();
                var redirectTo = window.location.origin + '/reset-password.html';

                submitBtn.disabled = true;
                var originalLabel = submitBtn.textContent;
                submitBtn.textContent = 'Sending...';

                var xhr = new XMLHttpRequest();
                xhr.open('POST', SUPABASE_URL + '/auth/v1/recover', true);
                xhr.setRequestHeader('apikey', SUPABASE_ANON_KEY);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.onload = function() {
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalLabel;
                    // Intentionally show the same success state regardless of
                    // whether the email exists — prevents account enumeration.
                    formFields.style.display = 'none';
                    successMessage.style.display = 'block';
                    if (typeof Toast !== 'undefined') {
                        Toast.show('Password reset email sent (if an account exists)', 'success');
                    }
                };
                xhr.onerror = function() {
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalLabel;
                    if (typeof Toast !== 'undefined') {
                        Toast.show('Network error — please try again', 'error');
                    }
                };
                xhr.send(JSON.stringify({ email: email, redirect_to: redirectTo }));
            });
        })();
    </script>
</body>
</html>
