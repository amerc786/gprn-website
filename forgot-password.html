<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Forgot Password - GPRN</title>

    <!-- Fonts -->
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@800;900&display=swap" rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Manrope', sans-serif; background: #F8FAFC; color: #0F172A; margin: 0;
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
        }
        .font-display { font-family: 'Clash Display', sans-serif; }

        /* GPRN logo (same as login) */
        .gprn-logo { display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
        .gprn-logo-mark {
            width: 38px; height: 38px; border-radius: 12px; background: #101524;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 1px 2px rgba(16,21,36,0.08);
        }
        .gprn-logo-mark span {
            color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 900; font-size: 24px; line-height: 1;
            letter-spacing: -0.025em; padding-top: 2px;
        }
        .gprn-logo-word {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #101524; font-weight: 900; font-size: 32px;
            line-height: 0.8; letter-spacing: -0.05em;
            display: inline-flex; align-items: baseline; padding-top: 4px;
        }
        .gprn-logo-word::after {
            content: ''; display: inline-block; width: 9px; height: 9px;
            background: #0F8B5A; margin-left: 4px; margin-bottom: 3px; align-self: flex-end;
        }

        .auth-card {
            width: 100%; max-width: 440px; background: #ffffff;
            border: 1px solid #E2E8F0; border-radius: 24px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -4px rgba(0,0,0,0.05);
            padding: 40px 36px;
        }
        @media (max-width: 480px) { .auth-card { padding: 32px 24px; } }

        .card-title {
            font-family: 'Clash Display', sans-serif; font-size: 1.75rem; font-weight: 600;
            color: #0F172A; margin: 24px 0 8px;
        }
        .card-lede { color: #475569; font-size: 0.92rem; line-height: 1.6; margin: 0 0 24px; }

        .form-label { display: block; font-size: 0.85rem; font-weight: 600; color: #1E293B; margin-bottom: 6px; }
        .form-input {
            width: 100%; padding: 14px 16px; border-radius: 12px;
            border: 1px solid #E2E8F0; background: #ffffff;
            font-size: 0.95rem; color: #0F172A; font-family: inherit;
            transition: border-color .15s, box-shadow .15s;
        }
        .form-input::placeholder { color: #94A3B8; }
        .form-input:focus {
            outline: none; border-color: #0F8B5A;
            box-shadow: 0 0 0 4px rgba(15, 139, 90, 0.12);
        }
        .form-input.error { border-color: #DC2626; box-shadow: 0 0 0 4px rgba(220,38,38,0.1); }
        .form-error { color: #DC2626; font-size: 0.8rem; margin-top: 6px; min-height: 1em; }
        .form-group { margin-bottom: 18px; }

        .btn-primary {
            width: 100%; display: inline-flex; align-items: center; justify-content: center;
            gap: 8px; padding: 14px 20px; border-radius: 9999px;
            background: #101524; color: #ffffff; font-weight: 600; font-size: 0.95rem;
            border: none; cursor: pointer; font-family: inherit; text-decoration: none;
            transition: transform .15s, background .15s;
        }
        .btn-primary:hover { background: #1E293B; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.6; cursor: default; transform: none; }

        .auth-footer { margin-top: 24px; padding-top: 20px; border-top: 1px solid #E2E8F0; text-align: center; }
        .auth-footer a {
            display: inline-flex; align-items: center; gap: 6px;
            color: #047857; font-weight: 600; font-size: 0.88rem; text-decoration: none;
        }
        .auth-footer a:hover { color: #064E3B; }

        /* Toasts (this page does not load styles.css) */
        .toast-container {
            position: fixed; top: 20px; right: 20px; z-index: 2000;
            display: flex; flex-direction: column; gap: 8px;
        }
        .toast {
            display: flex; align-items: center; gap: 12px; padding: 14px 20px;
            border-radius: 10px; background: #ffffff;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
            border: 1px solid #E2E8F0; font-size: 0.88rem; font-weight: 500; color: #0B0F19;
            transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            min-width: 300px;
        }
        .toast.toast-visible { transform: translateX(0); }
        .toast-icon { flex-shrink: 0; }
        .toast-success .toast-icon { color: #22C55E; }
        .toast-error .toast-icon { color: #EF4444; }
        .toast-warning .toast-icon { color: #F59E0B; }
        .toast-info .toast-icon { color: #0B0F19; }
        .toast-close { background: none; border: none; font-size: 1.2rem; color: #94A3B8; cursor: pointer; margin-left: auto; }

        @keyframes rise { 0% { opacity: 0; transform: translateY(12px); } 100% { opacity: 1; transform: translateY(0); } }
        .rise { animation: rise .6s cubic-bezier(0.16, 1, 0.3, 1) both; }
    </style>
</head>
<body>
    <div class="auth-card rise">
        <a href="index.html" class="gprn-logo">
            <span class="gprn-logo-mark"><span>G</span></span>
            <span class="gprn-logo-word">PRN</span>
        </a>

        <form id="forgotForm" novalidate>
            <div id="formFields">
                <h1 class="card-title">Reset your password.</h1>
                <p class="card-lede">Enter your email address and we'll send you a link to reset your password.</p>

                <div class="form-group">
                    <label class="form-label" for="email">Email address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required data-validate="email" autocomplete="email">
                    <div class="form-error"></div>
                </div>

                <button type="submit" class="btn-primary">Send reset link <i class="ph ph-arrow-right"></i></button>
            </div>

            <div id="successMessage" style="display:none; text-align:center; padding:20px 0 0;">
                <div style="width:64px; height:64px; border-radius:50%; background:rgba(16,185,129,0.1); display:flex; align-items:center; justify-content:center; margin:0 auto 16px;">
                    <i class="ph ph-check" style="font-size:32px; color:#10B981;"></i>
                </div>
                <h3 class="font-display" style="font-size:1.25rem; font-weight:600; color:#0F172A; margin:0 0 8px;">Check your email</h3>
                <p style="font-size:0.9rem; color:#475569; line-height:1.6; margin:0;">If an account with that email exists, we've sent a password reset link. Please check your inbox and spam folder.</p>
            </div>
        </form>

        <div class="auth-footer">
            <a href="login.html">
                <i class="ph ph-arrow-left"></i>
                Back to login
            </a>
        </div>
    </div>

    <script src="mock-data.js?v=20260702a"></script>
    <script src="app.js?v=20260702a"></script>
    <script src="supabase-client.js?v=20260702a"></script>
    <script src="supabase-tables.js?v=20260702a"></script>
    <script src="components.js?v=20260702a"></script>
    <script>
        (function() {
            // Public Supabase config (anon key is safe to embed)
            var SUPABASE_URL = 'https://fysilmypgpewbzyxkymx.supabase.co';
            var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5c2lsbXlwZ3Bld2J6eXhreW14Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzODQwNjYsImV4cCI6MjA5MDk2MDA2Nn0.BEgSiUO_RWvk0ixZSORuKFqwMG6nYNGsCqWCftukBnE';

            var form = document.getElementById('forgotForm');
            var formFields = document.getElementById('formFields');
            var successMessage = document.getElementById('successMessage');
            var submitBtn = form.querySelector('button[type="submit"]');

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                if (!FormValidator.validate(this)) return;

                var email = document.getElementById('email').value.trim();
                // Built from the page's own path so it also works from a subpath.
                var redirectTo = window.location.href.replace(/[^/]*$/, 'reset-password.html');

                submitBtn.disabled = true;
                var originalLabel = submitBtn.innerHTML;
                submitBtn.textContent = 'Sending...';

                // GoTrue only honours redirect_to as a QUERY parameter — a body
                // key is ignored and the email would fall back to the Site URL.
                var xhr = new XMLHttpRequest();
                xhr.open('POST', SUPABASE_URL + '/auth/v1/recover?redirect_to=' + encodeURIComponent(redirectTo), true);
                xhr.setRequestHeader('apikey', SUPABASE_ANON_KEY);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.onload = function() {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalLabel;
                    // Intentionally show the same success state regardless of
                    // whether the email exists — prevents account enumeration.
                    formFields.style.display = 'none';
                    successMessage.style.display = 'block';
                    if (typeof Toast !== 'undefined') {
                        Toast.show('Password reset email sent (if an account exists)', 'success');
                    }
                };
                xhr.onerror = function() {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalLabel;
                    if (typeof Toast !== 'undefined') {
                        Toast.show('Network error — please try again', 'error');
                    }
                };
                xhr.send(JSON.stringify({ email: email }));
            });
        })();
    </script>
</body>
</html>
