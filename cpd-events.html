<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>CPD Events - GPRN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Syne"', 'sans-serif'],
                    },
                    colors: {
                        navy: { DEFAULT: '#0B0F19', 50: '#141C2F' },
                        brand: { green: '#059669', mint: '#ECFDF5', dark: '#022C22' },
                        surface: '#F8F9FA'
                    },
                    boxShadow: {
                        'card': '0 4px 20px rgba(0, 0, 0, 0.03)',
                        'card-hover': '0 10px 40px rgba(0, 0, 0, 0.08)',
                        'subtle': '0 1px 2px rgba(0,0,0,0.02)',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <script src="mock-data.js"></script>
    <script src="app.js?v=20260407b"></script>
<script src="supabase-client.js?v=20260407b"></script>
    <script src="supabase-tables.js?v=20260407b"></script>
    <script src="components.js?v=20260407b"></script>
    <script>
        if (!initPage()) throw new Error('Auth required');

        const role = Auth.getRole();
        const pageContent = initAppLayout(role, 'cpd', 'CPD Events');
        const data = getMockData();

        // Separate web-based CPD from events
        const webCpd = data.cpdEvents.filter(e => e.type === 'web');
        const events = data.cpdEvents.filter(e => e.type === 'event');

        // Group events by health board
        const grouped = {};
        events.forEach(evt => {
            const hb = evt.healthBoard || 'General';
            if (!grouped[hb]) grouped[hb] = [];
            grouped[hb].push(evt);
        });

        var session = Auth.getSession();
        var html = '';

        // My Registrations section
        html += renderMyRegistrations();

        // Web-based CPD card
        html += `
        <div class="content-card" style="margin-bottom: 24px;">
            <div class="content-card-header">
                <h2>Web-based CPD</h2>
            </div>
            <div class="content-card-body">
                ${webCpd.length === 0 ? '<p style="color: var(--dark-600); font-size: 0.88rem;">No web-based CPD resources available at this time.</p>' : webCpd.map(item => `
                <div style="display: flex; align-items: flex-start; gap: 16px; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 200px;">
                        <h3 style="font-size: 1.05rem; margin-bottom: 4px;">${item.title}</h3>
                        <p style="font-size: 0.9rem; color: var(--dark-600); margin-bottom: 4px;">${item.provider}</p>
                        <p style="font-size: 0.85rem; color: var(--dark-600); line-height: 1.6;">${item.description}</p>
                    </div>
                    <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="btn btn-primary btn-small">
                        ${getIcon('external-link')}
                        Visit HEIW Portal
                    </a>
                </div>
                `).join('')}
            </div>
        </div>`;

        // Upcoming Events card
        html += `
        <div class="content-card">
            <div class="content-card-header">
                <h2>Upcoming Events</h2>
            </div>
            <div class="content-card-body">`;

        const sortedBoards = Object.keys(grouped).sort();
        if (sortedBoards.length === 0) {
            html += '<p style="color: var(--dark-600); font-size: 0.88rem;">No upcoming events scheduled at this time. Check back soon.</p>';
        }
        sortedBoards.forEach(board => {
            html += `<h3 style="font-size: 0.95rem; color: var(--dark-600); margin-bottom: 12px; margin-top: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--gray-100);">
                <span class="badge badge-primary" style="margin-right: 8px;">${board}</span>
            </h3>`;

            grouped[board].forEach(evt => {
                html += `
                <div class="shift-card-full" style="margin-bottom: 16px;">
                    <div class="shift-card-header">
                        <div>
                            <h3 class="shift-card-title">${evt.title}</h3>
                            <p class="shift-card-location">${evt.provider}</p>
                        </div>
                        <div class="shift-card-badges">
                            <span class="badge badge-primary">${evt.healthBoard}</span>
                        </div>
                    </div>
                    <div class="shift-card-details">
                        <div class="shift-card-detail">
                            ${getIcon('calendar')}
                            <span>${DateUtils.format(evt.date, 'full')}</span>
                        </div>
                        <div class="shift-card-detail">
                            ${getIcon('clock')}
                            <span>${evt.time}</span>
                        </div>
                        <div class="shift-card-detail">
                            ${getIcon('map-pin')}
                            <span>${evt.location}</span>
                        </div>
                    </div>
                    <p style="font-size: 0.88rem; color: var(--dark-600); line-height: 1.6; margin-top: 12px; padding: 0 4px;">${evt.description}</p>
                    <div class="shift-card-footer" style="margin-top: 12px;">
                        <div></div>

                        <p style="font-size: 0.75rem; color: var(--dark-600); margin-top: 4px;">You'll receive confirmation details. The organiser will be notified.</p>
                    </div>
                </div>`;
            });
        });

        html += `</div></div>`;

        pageContent.innerHTML = html;

        // Render My Registrations section
        function renderMyRegistrations() {
            var data = getMockData();
            if (!data.cpdInterests || data.cpdInterests.length === 0) return '';
            var registeredEvents = data.cpdInterests.map(function(id) {
                return data.cpdEvents.find(function(e) { return e.id === id; });
            }).filter(Boolean);
            if (registeredEvents.length === 0) return '';
            var items = registeredEvents.map(function(evt) {
                return '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--gray-50);border-radius:8px;margin-bottom:8px;">'
                    + '<div><strong style="font-size:0.9rem;color:var(--dark);">' + evt.title + '</strong>'
                    + '<div style="font-size:0.82rem;color:var(--dark-600);">' + DateUtils.format(evt.date, 'full') + ' &bull; ' + evt.time + '</div></div>'
                    + '<span class="badge badge-success" style="font-size:0.75rem;">Registered</span></div>';
            }).join('');
            return '<div class="content-card" style="margin-bottom:24px;"><div class="content-card-header"><h2>My CPD Registrations</h2></div>'
                + '<div class="content-card-body" id="myRegistrations">' + items + '</div></div>';
        }

        function updateMyRegistrations() {
            var section = document.getElementById('myRegistrations');
            if (section) {
                var parent = section.closest('.content-card');
                if (parent) parent.outerHTML = renderMyRegistrations();
            } else {
                var newHtml = renderMyRegistrations();
                if (newHtml) {
                    pageContent.insertAdjacentHTML('afterbegin', newHtml);
                }
            }
        }

        // CPD Interest Registration
        function registerCPDInterest(eventId) {
            var data = getMockData();
            var session = Auth.getSession();
            if (!data.cpdInterests) data.cpdInterests = [];
            if (data.cpdInterests.includes(eventId)) {
                Toast.show('You have already registered interest for this event.', 'info');
                return;
            }
            data.cpdInterests.push(eventId);

            var evt = data.cpdEvents.find(function(e) { return e.id === eventId; });

            // Create confirmation notification
            if (!data.notifications) data.notifications = [];
            data.notifications.push({
                userId: session.id,
                type: 'cpd_registered',
                title: 'CPD Registration Confirmed',
                message: 'Your interest in "' + (evt ? evt.title : 'this event') + '" has been registered. The organiser will contact you with further details.',
                date: new Date().toISOString(),
                read: false
            });

            // Log confirmation email to user
            EmailManager.send(session.id, 'CPD Registration Confirmed',
                'You have registered interest for ' + (evt ? evt.title : 'a CPD event') + (evt ? ' on ' + DateUtils.format(evt.date, 'full') : '') + '. The event organiser has been notified and will contact you with joining instructions.',
                'cpd_registration');

            saveMockData(data);

            var btn = document.getElementById('cpd-btn-' + eventId);
            if (btn) {
                btn.textContent = 'Registered';
                btn.disabled = true;
                btn.style.opacity = '0.7';
            }
            Toast.show('Registration confirmed! Check your email for details.', 'success');

            updateMyRegistrations();
        }

        // Update buttons for already-registered events
        (function() {
            var data = getMockData();
            if (data.cpdInterests) {
                data.cpdInterests.forEach(function(id) {
                    var btn = document.getElementById('cpd-btn-' + id);
                    if (btn) {
                        btn.textContent = 'Registered';
                        btn.disabled = true;
                        btn.style.opacity = '0.7';
                    }
                });
            }
        })();
    </script>
</body>
</html>
