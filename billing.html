<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing - GPRN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="app-layout">
    <script src="mock-data.js"></script>
    <script src="app.js"></script>
    <script src="components.js"></script>
    <script>
        if (!initPage('practice')) throw new Error('Auth required');

        const session = Auth.getSession();
        const data = getMockData();
        const pageContent = initAppLayout('practice', 'billing', 'Billing');

        // Seed invoices from completed offers if none exist for this practice
        let invoices = InvoiceManager.getForPractice(session.id);
        if (invoices.length === 0) {
            const completedOffers = data.offers.filter(o => o.practiceId === session.id && o.status === 'completed');
            if (completedOffers.length > 0) {
                completedOffers.forEach(offer => InvoiceManager.generateFromOffer(data, offer));
                saveMockData(data);
                invoices = InvoiceManager.getForPractice(session.id);
            }
            // If still no invoices, seed some manually
            if (invoices.length === 0) {
                const today = new Date();
                const locums = data.locums;
                if (!data.invoices) data.invoices = [];
                const seedStatuses = ['paid', 'pending', 'paid', 'overdue', 'paid', 'paid', 'pending', 'paid', 'paid', 'pending', 'paid', 'paid'];
                const sessionTypes = ['AM', 'PM', 'Full Day'];
                for (let i = 0; i < 12; i++) {
                    const loc = locums[i % locums.length];
                    const genDate = new Date(today);
                    genDate.setDate(today.getDate() - (i * 5 + 2));
                    const shiftDate = new Date(genDate);
                    shiftDate.setDate(genDate.getDate() - 1);
                    const dueDate = new Date(genDate);
                    dueDate.setDate(genDate.getDate() + 30);
                    const sType = sessionTypes[i % 3];
                    const rate = sType === 'Full Day' ? loc.rates.fullDay : (sType === 'AM' ? loc.rates.am : loc.rates.pm);
                    const housecallFee = i % 3 === 0 ? 0 : (loc.rates.housecall || 0);
                    const total = rate + housecallFee;
                    const status = seedStatuses[i];
                    data.invoices.push({
                        id: 'inv-prac-seed-' + Date.now() + '-' + i,
                        invoiceNumber: 'INV-' + String(data.invoices.length + 1001).padStart(4, '0'),
                        offerId: null,
                        locumId: loc.id,
                        locumName: `${loc.title} ${loc.firstName} ${loc.lastName}`,
                        practiceId: session.id,
                        practiceName: session.name,
                        shiftDate: shiftDate.toISOString().split('T')[0],
                        sessionType: sType,
                        startTime: sType === 'PM' ? '13:00' : '08:30',
                        endTime: sType === 'AM' ? '12:30' : '17:00',
                        sessionRate: rate,
                        housecallFee: housecallFee,
                        total: total,
                        status: status,
                        generatedDate: genDate.toISOString().split('T')[0],
                        dueDate: dueDate.toISOString().split('T')[0],
                        paidDate: status === 'paid' ? genDate.toISOString().split('T')[0] : null,
                        disputeReason: null
                    });
                }
                saveMockData(data);
                invoices = InvoiceManager.getForPractice(session.id);
            }
        }

        let filterMonth = '';
        let filterStatus = '';

        function getFilteredInvoices() {
            let filtered = InvoiceManager.getForPractice(session.id);
            if (filterMonth !== '') {
                filtered = filtered.filter(inv => new Date(inv.generatedDate).getMonth() === parseInt(filterMonth));
            }
            if (filterStatus) {
                filtered = filtered.filter(inv => inv.status === filterStatus);
            }
            return filtered;
        }

        function getInvoiceStatusBadge(status) {
            const map = {
                pending: 'badge-warning',
                paid: 'badge-success',
                overdue: 'badge-danger',
                disputed: 'badge-info'
            };
            return map[status] || 'badge-neutral';
        }

        function handleMarkPaid(invoiceId) {
            // Find invoice number before updating for the confirmation message
            const preData = getMockData();
            const preInv = preData.invoices.find(i => i.id === invoiceId);
            const invNum = preInv ? preInv.invoiceNumber : '';

            const success = InvoiceManager.updateStatus(invoiceId, 'paid');
            if (success) {
                // Reset filter to All so user can see the updated invoice with Paid status
                filterStatus = '';
                filterMonth = '';
                render(false);
                Toast.show(invNum + ' marked as paid. Locum has been notified.', 'success', 3000);
                // Highlight the updated row briefly
                setTimeout(() => {
                    const rows = document.querySelectorAll('.data-table tbody tr');
                    rows.forEach(row => {
                        const numCell = row.querySelector('td:first-child strong');
                        if (numCell && numCell.textContent.trim() === invNum) {
                            row.style.transition = 'background 0.3s';
                            row.style.background = 'rgba(16,185,129,0.12)';
                            setTimeout(() => { row.style.background = ''; }, 2500);
                        }
                    });
                }, 100);
            } else {
                Toast.show('Failed to update invoice. Please try again.', 'error');
                render();
            }
        }

        function handleDispute(invoiceId) {
            Modal.show({
                title: 'Dispute Invoice',
                size: 'medium',
                body: `
                    <p style="margin-bottom: 16px; color: var(--dark-600);">Please provide a reason for disputing this invoice. The locum will be notified.</p>
                    <div class="form-group">
                        <label class="form-label">Dispute Reason</label>
                        <textarea id="disputeReason" class="form-textarea" rows="4" placeholder="Describe the reason for the dispute..." required></textarea>
                    </div>
                `,
                footer: `
                    <button class="btn btn-ghost" data-modal-close>Cancel</button>
                    <button class="btn btn-danger" id="submitDispute">Submit Dispute</button>
                `,
                onOpen(overlay) {
                    overlay.querySelector('#submitDispute').addEventListener('click', () => {
                        const reason = overlay.querySelector('#disputeReason').value.trim();
                        if (!reason) {
                            Toast.show('Please provide a dispute reason.', 'warning');
                            return;
                        }
                        const preData = getMockData();
                        const preInv = preData.invoices.find(i => i.id === invoiceId);
                        const invNum = preInv ? preInv.invoiceNumber : '';
                        const success = InvoiceManager.updateStatus(invoiceId, 'disputed', reason);
                        Modal.close(overlay);
                        if (success) {
                            filterStatus = '';
                            filterMonth = '';
                            render(false);
                            Toast.show(invNum + ' has been disputed. Locum notified.', 'info', 3000);
                        } else {
                            Toast.show('Failed to dispute invoice. Please try again.', 'error');
                            render();
                        }
                    });
                }
            });
        }

        function render(preserveFilters) {
            if (preserveFilters !== false) {
                const monthEl = document.getElementById('filterMonth');
                const statusEl = document.getElementById('filterInvStatus');
                if (monthEl) filterMonth = monthEl.value;
                if (statusEl) filterStatus = statusEl.value;
            }

            const allInvoices = InvoiceManager.getForPractice(session.id);
            const filtered = getFilteredInvoices();
            const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

            // Summary calculations
            const now = new Date();
            const totalThisMonth = allInvoices
                .filter(inv => { const d = new Date(inv.generatedDate); return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth(); })
                .reduce((s, inv) => s + inv.total, 0);
            const outstanding = allInvoices.filter(inv => inv.status === 'pending' || inv.status === 'overdue').reduce((s, inv) => s + inv.total, 0);
            const paid = allInvoices.filter(inv => inv.status === 'paid').reduce((s, inv) => s + inv.total, 0);

            pageContent.innerHTML = `
                <h1 style="font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--dark); margin-bottom: 24px;">
                    Billing
                </h1>

                <div class="dash-stats-row" style="grid-template-columns: repeat(3, 1fr); margin-bottom: 32px;">
                    ${renderStatCard('pound', 'Total This Month', formatCurrency(totalThisMonth), null, null)}
                    ${renderStatCard('clock', 'Outstanding', formatCurrency(outstanding), null, null)}
                    ${renderStatCard('check', 'Paid', formatCurrency(paid), null, null)}
                </div>

                <div class="content-card">
                    <div class="content-card-header">
                        <h2>Invoices</h2>
                    </div>
                    <div style="padding: 16px 24px; border-bottom: 1px solid var(--gray-100);">
                        <div class="filter-bar" style="margin-bottom: 0;">
                            <div class="form-group">
                                <label class="form-label">Month</label>
                                <select id="filterMonth" class="form-select" onchange="render()">
                                    <option value="">All Months</option>
                                    ${months.map((m, i) => `<option value="${i}" ${filterMonth === String(i) ? 'selected' : ''}>${m}</option>`).join('')}
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Status</label>
                                <select id="filterInvStatus" class="form-select" onchange="render()">
                                    <option value="" ${filterStatus === '' ? 'selected' : ''}>All Statuses</option>
                                    <option value="paid" ${filterStatus === 'paid' ? 'selected' : ''}>Paid</option>
                                    <option value="pending" ${filterStatus === 'pending' ? 'selected' : ''}>Pending</option>
                                    <option value="overdue" ${filterStatus === 'overdue' ? 'selected' : ''}>Overdue</option>
                                    <option value="disputed" ${filterStatus === 'disputed' ? 'selected' : ''}>Disputed</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="content-card-body" style="padding: 0; overflow-x: auto;">
                        ${filtered.length === 0 ? `
                            <div class="empty-state" style="padding: 40px;">
                                <p style="color: var(--dark-600);">No invoices match your filters.</p>
                            </div>
                        ` : `
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Invoice #</th>
                                    <th>Date</th>
                                    <th>Locum</th>
                                    <th>Shift Date</th>
                                    <th>Session</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${filtered.map(inv => `
                                    <tr>
                                        <td><strong style="color: var(--dark);">${inv.invoiceNumber}</strong></td>
                                        <td>${DateUtils.format(inv.generatedDate, 'short')}</td>
                                        <td>
                                            <div style="display: flex; align-items: center; gap: 8px;">
                                                <div class="header-avatar" style="width: 28px; height: 28px; font-size: 0.6rem;">${getInitials(inv.locumName)}</div>
                                                ${inv.locumName}
                                            </div>
                                        </td>
                                        <td>${DateUtils.format(inv.shiftDate, 'medium')}</td>
                                        <td>${inv.sessionType}</td>
                                        <td><strong style="color: var(--dark);">${formatCurrency(inv.total)}</strong></td>
                                        <td><span class="badge ${getInvoiceStatusBadge(inv.status)}">${inv.status.charAt(0).toUpperCase() + inv.status.slice(1)}</span></td>
                                        <td>
                                            <div style="display: flex; gap: 6px; align-items: center; flex-wrap: wrap;">
                                                <a href="invoice-view.html?id=${inv.id}" class="btn btn-ghost btn-small">View</a>
                                                ${inv.status === 'pending' || inv.status === 'overdue' ? `
                                                    <button class="btn btn-small btn-primary" onclick="handleMarkPaid('${inv.id}')">Mark Paid</button>
                                                    <button class="btn btn-small btn-ghost" style="color: var(--danger);" onclick="handleDispute('${inv.id}')">Dispute</button>
                                                ` : ''}
                                            </div>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        `}
                    </div>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
