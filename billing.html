<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Billing - GPRN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="app-layout">
    <script src="mock-data.js"></script>
    <script src="app.js"></script>
    <script src="components.js"></script>
    <script>
        if (!initPage('practice')) throw new Error('Auth required');

        const session = Auth.getSession();
        const pageContent = initAppLayout('practice', 'billing', 'Billing');

        // Seed invoices if none exist for this practice
        (function seedInvoices() {
            var raw = localStorage.getItem('gprn_data');
            var d = JSON.parse(raw);
            if (!d.invoices) d.invoices = [];
            var practiceInvoices = d.invoices.filter(function(i) { return i.practiceId === session.id; });
            if (practiceInvoices.length > 0) return;

            // Try from completed offers
            var completedOffers = (d.offers || []).filter(function(o) { return o.practiceId === session.id && o.status === 'completed'; });
            if (completedOffers.length > 0) {
                completedOffers.forEach(function(offer) { InvoiceManager.generateFromOffer(d, offer); });
                localStorage.setItem('gprn_data', JSON.stringify(d));
                d = JSON.parse(localStorage.getItem('gprn_data'));
                practiceInvoices = d.invoices.filter(function(i) { return i.practiceId === session.id; });
            }

            // No fake seed data — only show real invoices from completed bookings
            if (false) {
                var today = new Date();
                var locums = d.locums || [];
                var seedStatuses = ['paid', 'pending', 'paid', 'overdue', 'paid', 'paid', 'pending', 'paid', 'paid', 'pending', 'paid', 'paid'];
                var sessionTypes = ['AM', 'PM', 'Full Day'];
                for (var i = 0; i < 12; i++) {
                    var loc = locums[i % locums.length];
                    if (!loc) continue;
                    var genDate = new Date(today);
                    genDate.setDate(today.getDate() - (i * 5 + 2));
                    var shiftDate = new Date(genDate);
                    shiftDate.setDate(genDate.getDate() - 1);
                    var dueDate = new Date(genDate);
                    dueDate.setDate(genDate.getDate() + 30);
                    var sType = sessionTypes[i % 3];
                    var rate = sType === 'Full Day' ? loc.rates.fullDay : (sType === 'AM' ? loc.rates.am : loc.rates.pm);
                    var housecallFee = i % 3 === 0 ? 0 : (loc.rates.housecall || 0);
                    var total = rate + housecallFee;
                    var status = seedStatuses[i];
                    d.invoices.push({
                        id: 'inv-seed-' + Date.now() + '-' + i,
                        invoiceNumber: 'INV-' + String(d.invoices.length + 1001).padStart(4, '0'),
                        offerId: null,
                        locumId: loc.id,
                        locumName: loc.title + ' ' + loc.firstName + ' ' + loc.lastName,
                        practiceId: session.id,
                        practiceName: session.name,
                        shiftDate: shiftDate.toISOString().split('T')[0],
                        sessionType: sType,
                        startTime: sType === 'PM' ? '13:00' : '08:30',
                        endTime: sType === 'AM' ? '12:30' : '17:00',
                        sessionRate: rate,
                        housecallFee: housecallFee,
                        total: total,
                        status: status,
                        generatedDate: genDate.toISOString().split('T')[0],
                        dueDate: dueDate.toISOString().split('T')[0],
                        paidDate: status === 'paid' ? genDate.toISOString().split('T')[0] : null,
                        disputeReason: null
                    });
                }
                localStorage.setItem('gprn_data', JSON.stringify(d));
            }
        })();

        var billingFilterMonth = '';
        var billingFilterStatus = '';

        function readInvoicesFromStorage() {
            var raw = localStorage.getItem('gprn_data');
            var d = JSON.parse(raw);
            if (!d || !d.invoices) return [];
            return d.invoices.filter(function(i) { return i.practiceId === session.id; })
                .sort(function(a, b) { return new Date(b.generatedDate) - new Date(a.generatedDate); });
        }

        function getStatusBadgeClass(status) {
            if (status === 'pending') return 'badge-warning';
            if (status === 'paid') return 'badge-success';
            if (status === 'overdue') return 'badge-danger';
            if (status === 'disputed') return 'badge-info';
            return 'badge-neutral';
        }

        function handleMarkPaid(invoiceId) {
            var raw = localStorage.getItem('gprn_data');
            var d = JSON.parse(raw);
            var inv = null;
            for (var i = 0; i < d.invoices.length; i++) {
                if (d.invoices[i].id === invoiceId) {
                    inv = d.invoices[i];
                    break;
                }
            }
            if (!inv) {
                alert('Invoice not found: ' + invoiceId);
                return;
            }

            Modal.show({
                title: 'Confirm Payment',
                size: 'medium',
                body: '<div style="padding:8px 0;">'
                    + '<p style="font-size:0.9rem;color:var(--dark-600);margin-bottom:16px;">Are you sure you want to mark invoice <strong>' + inv.invoiceNumber + '</strong> as paid?</p>'
                    + '<div style="padding:12px;background:var(--gray-50);border-radius:var(--radius);margin-bottom:16px;">'
                    + '<div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span>Amount:</span><strong>' + formatCurrency(inv.total) + '</strong></div>'
                    + '<div style="display:flex;justify-content:space-between;"><span>Locum:</span><strong>' + (inv.locumName || 'Unknown') + '</strong></div>'
                    + '</div>'
                    + '<div class="form-group"><label class="form-label">Payment Reference (e.g. BACS reference) <span style="color:var(--danger);">*</span></label>'
                    + '<input type="text" id="paymentRefInput" class="form-input" placeholder="e.g. BACS-20240404-001" required></div>'
                    + '<p style="font-size:0.8rem;color:var(--dark-600);">This will be recorded in the payment audit log.</p>'
                    + '</div>',
                footer: '<button class="btn btn-ghost" data-modal-close>Cancel</button><button class="btn btn-primary" id="confirmMarkPaidBtn">Confirm Payment</button>',
                onOpen: function(overlay) {
                    overlay.querySelector('#confirmMarkPaidBtn').addEventListener('click', function() {
                        var paymentRef = overlay.querySelector('#paymentRefInput').value.trim();
                        if (!paymentRef) {
                            Toast.show('Please enter a payment reference.', 'warning');
                            return;
                        }

                        var raw2 = localStorage.getItem('gprn_data');
                        var d2 = JSON.parse(raw2);
                        var inv2 = null;
                        for (var j = 0; j < d2.invoices.length; j++) {
                            if (d2.invoices[j].id === invoiceId) {
                                inv2 = d2.invoices[j];
                                break;
                            }
                        }
                        if (!inv2) return;

                        inv2.status = 'paid';
                        inv2.paidDate = new Date().toISOString().split('T')[0];
                        inv2.paymentReference = paymentRef;

                        if (!d2.auditLog) d2.auditLog = [];
                        d2.auditLog.push({
                            invoiceId: invoiceId,
                            action: 'marked_paid',
                            reference: paymentRef,
                            date: new Date().toISOString(),
                            by: session.id
                        });

                        localStorage.setItem('gprn_data', JSON.stringify(d2));
                        Modal.close(overlay);

                        var row = document.getElementById('inv-row-' + invoiceId);
                        if (row) {
                            var badge = row.querySelector('.badge');
                            if (badge) {
                                badge.className = 'badge badge-success';
                                badge.textContent = 'Paid';
                            }
                            var actionsCell = row.querySelector('.inv-actions');
                            if (actionsCell) {
                                var viewBtn = actionsCell.querySelector('a');
                                actionsCell.innerHTML = '';
                                if (viewBtn) actionsCell.appendChild(viewBtn);
                            }
                        }

                        updateBillingSummary();
                        Toast.show('Invoice marked as paid. Payment reference: ' + paymentRef, 'success');
                    });
                }
            });
        }

        function updateBillingSummary() {
            var allInvoices = readInvoicesFromStorage();
            var now = new Date();
            var totalThisMonth = 0;
            var outstanding = 0;
            var paid = 0;
            for (var i = 0; i < allInvoices.length; i++) {
                var inv = allInvoices[i];
                var gd = new Date(inv.generatedDate);
                if (gd.getFullYear() === now.getFullYear() && gd.getMonth() === now.getMonth()) {
                    totalThisMonth += inv.total;
                }
                if (inv.status === 'pending' || inv.status === 'overdue') {
                    outstanding += inv.total;
                }
                if (inv.status === 'paid') {
                    paid += inv.total;
                }
            }
            var el1 = document.getElementById('billing-stat-total');
            var el2 = document.getElementById('billing-stat-outstanding');
            var el3 = document.getElementById('billing-stat-paid');
            if (el1) el1.textContent = formatCurrency(totalThisMonth);
            if (el2) el2.textContent = formatCurrency(outstanding);
            if (el3) el3.textContent = formatCurrency(paid);
        }

        function handleDispute(invoiceId) {
            Modal.show({
                title: 'Dispute Invoice',
                size: 'medium',
                body: '<p style="margin-bottom: 16px; color: var(--dark-600);">Please provide a reason for disputing this invoice. The locum will be notified.</p><div class="form-group"><label class="form-label">Dispute Reason</label><textarea id="disputeReason" class="form-textarea" rows="4" placeholder="Describe the reason for the dispute..." required></textarea></div>',
                footer: '<button class="btn btn-ghost" data-modal-close>Cancel</button><button class="btn btn-danger" id="submitDispute">Submit Dispute</button>',
                onOpen: function(overlay) {
                    overlay.querySelector('#submitDispute').addEventListener('click', function() {
                        var reason = overlay.querySelector('#disputeReason').value.trim();
                        if (!reason) {
                            Toast.show('Please provide a dispute reason.', 'warning');
                            return;
                        }
                        // Direct localStorage update for dispute
                        var raw = localStorage.getItem('gprn_data');
                        var d = JSON.parse(raw);
                        var disputedInv = null;
                        for (var i = 0; i < d.invoices.length; i++) {
                            if (d.invoices[i].id === invoiceId) {
                                d.invoices[i].status = 'disputed';
                                d.invoices[i].disputeReason = reason;
                                disputedInv = d.invoices[i];
                                break;
                            }
                        }
                        // Actually notify the locum about the dispute
                        if (disputedInv && disputedInv.locumId) {
                            if (!d.notifications) d.notifications = [];
                            d.notifications.push({
                                id: 'notif-' + Date.now() + Math.random().toString(36).substr(2, 5),
                                userId: disputedInv.locumId,
                                type: 'invoice_disputed',
                                title: 'Invoice Disputed',
                                message: 'Invoice ' + disputedInv.invoiceNumber + ' for ' + formatCurrency(disputedInv.total) + ' on ' + DateUtils.format(disputedInv.shiftDate, 'medium') + ' has been disputed by ' + disputedInv.practiceName + '. Reason: ' + reason,
                                date: new Date().toISOString(),
                                read: false
                            });
                            // Also send email notification
                            if (!d.emailLog) d.emailLog = [];
                            var locum = null;
                            for (var li = 0; li < d.locums.length; li++) {
                                if (d.locums[li].id === disputedInv.locumId) { locum = d.locums[li]; break; }
                            }
                            if (locum) {
                                d.emailLog.push({
                                    id: 'email-' + Date.now() + Math.random().toString(36).substr(2, 5),
                                    toUserId: locum.id,
                                    toEmail: locum.email,
                                    toName: locum.title + ' ' + locum.firstName + ' ' + locum.lastName,
                                    subject: 'Invoice Disputed',
                                    body: 'Invoice ' + disputedInv.invoiceNumber + ' has been disputed. Reason: ' + reason,
                                    type: 'invoice_disputed',
                                    timestamp: new Date().toISOString(),
                                    status: 'sent'
                                });
                            }
                        }
                        localStorage.setItem('gprn_data', JSON.stringify(d));
                        Modal.close(overlay);

                        // Update DOM directly
                        var row = document.getElementById('inv-row-' + invoiceId);
                        if (row) {
                            var badge = row.querySelector('.badge');
                            if (badge) {
                                badge.className = 'badge badge-info';
                                badge.textContent = 'Disputed';
                            }
                            var actionsCell = row.querySelector('.inv-actions');
                            if (actionsCell) {
                                var viewBtn = actionsCell.querySelector('a');
                                actionsCell.innerHTML = '';
                                if (viewBtn) actionsCell.appendChild(viewBtn);
                            }
                        }
                        updateBillingSummary();
                        Toast.show('Invoice has been disputed. Locum notified.', 'info');
                    });
                }
            });
        }

        function applyBillingFilter() {
            var monthEl = document.getElementById('filterMonth');
            var statusEl = document.getElementById('filterInvStatus');
            billingFilterMonth = monthEl ? monthEl.value : '';
            billingFilterStatus = statusEl ? statusEl.value : '';
            renderBillingTable();
        }

        function renderBillingTable() {
            var allInvoices = readInvoicesFromStorage();
            var filtered = allInvoices;

            if (billingFilterMonth !== '') {
                var fm = parseInt(billingFilterMonth);
                filtered = filtered.filter(function(inv) {
                    return new Date(inv.generatedDate).getMonth() === fm;
                });
            }
            if (billingFilterStatus) {
                filtered = filtered.filter(function(inv) {
                    return inv.status === billingFilterStatus;
                });
            }

            var tbody = document.getElementById('invoiceTableBody');
            var emptyState = document.getElementById('invoiceEmptyState');
            var tableEl = document.getElementById('invoiceTable');

            if (filtered.length === 0) {
                if (tableEl) tableEl.style.display = 'none';
                if (emptyState) {
                    emptyState.style.display = 'block';
                    var msgEl = document.getElementById('invoiceEmptyMsg');
                    if (msgEl) {
                        var hasFilter = billingFilterMonth !== '' || billingFilterStatus !== '';
                        msgEl.textContent = hasFilter ? 'No invoices match the current filter.' : 'No invoices yet. Invoices are generated when completed sessions are confirmed.';
                    }
                }
                return;
            }

            if (tableEl) tableEl.style.display = 'table';
            if (emptyState) emptyState.style.display = 'none';

            var html = '';
            for (var i = 0; i < filtered.length; i++) {
                var inv = filtered[i];
                var statusLabel = inv.status.charAt(0).toUpperCase() + inv.status.slice(1);
                var badgeClass = getStatusBadgeClass(inv.status);
                var actions = '<a href="invoice-view.html?id=' + inv.id + '" class="btn btn-ghost btn-small">View Details</a>';
                if (inv.status === 'pending' || inv.status === 'overdue') {
                    actions += ' <button class="btn btn-small btn-primary" onclick="handleMarkPaid(\'' + inv.id + '\')">Record Payment</button>';
                    actions += ' <button class="btn btn-small btn-ghost" style="color: var(--danger);" onclick="handleDispute(\'' + inv.id + '\')">Dispute</button>';
                }
                html += '<tr id="inv-row-' + inv.id + '">'
                    + '<td><strong style="color: var(--dark);">' + inv.invoiceNumber + '</strong></td>'
                    + '<td>' + DateUtils.format(inv.generatedDate, 'short') + '</td>'
                    + '<td><div style="display: flex; align-items: center; gap: 8px;"><div class="header-avatar" style="width: 28px; height: 28px; font-size: 0.6rem;">' + getInitials(inv.locumName) + '</div>' + inv.locumName + '</div></td>'
                    + '<td>' + DateUtils.format(inv.shiftDate, 'medium') + '</td>'
                    + '<td>' + inv.sessionType + '</td>'
                    + '<td><strong style="color: var(--dark);">' + formatCurrency(inv.total) + '</strong></td>'
                    + '<td><span class="badge ' + badgeClass + '">' + statusLabel + '</span></td>'
                    + '<td><div class="inv-actions" style="display: flex; gap: 6px; align-items: center; flex-wrap: wrap;">' + actions + '</div></td>'
                    + '</tr>';
            }
            if (tbody) tbody.innerHTML = html;
        }

        function exportInvoicesCSV() {
            var allInvoices = readInvoicesFromStorage();
            var csv = 'Invoice Number,Date,Locum/Practice,Session Type,Amount,Status,Payment Reference\n';
            allInvoices.forEach(function(inv) {
                csv += [
                    inv.invoiceNumber || '',
                    inv.generatedDate || '',
                    (inv.locumName || inv.practiceName || '').replace(/,/g, ' '),
                    inv.sessionType || '',
                    inv.total || 0,
                    inv.status || '',
                    (inv.paymentReference || '').replace(/,/g, ' ')
                ].join(',') + '\n';
            });
            var blob = new Blob([csv], { type: 'text/csv' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'gprn-invoices-' + new Date().toISOString().split('T')[0] + '.csv';
            a.click();
            URL.revokeObjectURL(url);
            Toast.show('Invoice data exported successfully', 'success');
        }

        function renderBillingPage() {
            var allInvoices = readInvoicesFromStorage();
            var now = new Date();
            var totalThisMonth = 0;
            var outstanding = 0;
            var paid = 0;
            for (var i = 0; i < allInvoices.length; i++) {
                var inv = allInvoices[i];
                var gd = new Date(inv.generatedDate);
                if (gd.getFullYear() === now.getFullYear() && gd.getMonth() === now.getMonth()) {
                    totalThisMonth += inv.total;
                }
                if (inv.status === 'pending' || inv.status === 'overdue') {
                    outstanding += inv.total;
                }
                if (inv.status === 'paid') {
                    paid += inv.total;
                }
            }

            var months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

            pageContent.innerHTML = ''
                + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">'
                + '<h1 style="font-family: \'Space Grotesk\', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--dark); margin:0;">Billing</h1>'
                + '<button class="btn btn-ghost btn-small" onclick="exportInvoicesCSV()" style="display:flex;align-items:center;gap:6px;">' + getIcon('file-text') + ' Export CSV</button>'
                + '</div>'

                + '<div class="content-card" style="margin-bottom:24px;background:var(--cream);border:1px solid var(--primary-light);">'
                + '<div class="content-card-body" style="padding:16px;">'
                + '<h3 style="font-size:0.95rem;margin-bottom:8px;">How Billing Works</h3>'
                + '<p style="font-size:0.85rem;color:var(--dark-600);line-height:1.6;">'
                + 'Payments are processed directly between practices and locums via BACS transfer. '
                + 'Standard payment terms are <strong>Net 30 days</strong> from invoice date. '
                + 'If an invoice becomes overdue, use "Send Payment Reminder" to notify the locum/practice. '
                + 'For payment disputes, contact <a href="mailto:support@gprn.wales">support@gprn.wales</a>.'
                + '</p></div></div>'

                + '<div class="dash-stats-row" style="grid-template-columns: repeat(3, 1fr); margin-bottom: 32px;">'
                + renderStatCard('pound', 'Total This Month', '<span id="billing-stat-total">' + formatCurrency(totalThisMonth) + '</span>', null, null)
                + renderStatCard('clock', 'Unpaid', '<span id="billing-stat-outstanding">' + formatCurrency(outstanding) + '</span>', null, null)
                + renderStatCard('check', 'Paid', '<span id="billing-stat-paid">' + formatCurrency(paid) + '</span>', null, null)
                + '</div>'

                + '<div class="content-card">'
                + '<div class="content-card-header"><h2>Invoices</h2></div>'
                + '<div style="padding: 16px 24px; border-bottom: 1px solid var(--gray-100);">'
                + '<div class="filter-bar" style="margin-bottom: 0;">'
                + '<div class="form-group"><label class="form-label">Month</label><select id="filterMonth" class="form-select" onchange="applyBillingFilter()"><option value="">All Months</option>' + months.map(function(m, i) { return '<option value="' + i + '">' + m + '</option>'; }).join('') + '</select></div>'
                + '<div class="form-group"><label class="form-label">Status</label><select id="filterInvStatus" class="form-select" onchange="applyBillingFilter()"><option value="">All Statuses</option><option value="paid">Paid</option><option value="pending">Pending</option><option value="overdue">Overdue</option><option value="disputed">Disputed</option></select></div>'
                + '</div></div>'
                + '<div class="content-card-body" style="padding: 0; overflow-x: auto;">'
                + '<div id="invoiceEmptyState" class="empty-state" style="padding: 40px; display: none;"><p id="invoiceEmptyMsg" style="color: var(--dark-600);">No invoices yet. Invoices are generated when completed sessions are confirmed.</p></div>'
                + '<table id="invoiceTable" class="data-table"><thead><tr><th>Invoice #</th><th>Date</th><th>Locum</th><th>Session Date</th><th>Session</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead><tbody id="invoiceTableBody"></tbody></table>'
                + '</div></div>';

            renderBillingTable();
        }

        renderBillingPage();
    </script>
</body>
</html>
