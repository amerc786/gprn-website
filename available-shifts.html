<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>My Invitations - GPRN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="app-layout">
    <script src="mock-data.js"></script>
    <script src="app.js"></script>
    <script src="components.js"></script>
    <script>
        if (!initPage('locum')) throw new Error('Auth required');

        const session = Auth.getSession();
        const pageContent = initAppLayout('locum', 'invitations', 'My Invitations');

        // Auto-expire old offers
        Booking.expireOffers();

        const healthBoards = [
            'All Health Boards',
            'Aneurin Bevan', 'Betsi Cadwaladr', 'Cardiff and Vale',
            'Cwm Taf Morgannwg', 'Hywel Dda', 'Powys', 'Swansea Bay'
        ];

        let currentFilter = { status: '', healthBoard: '', sessionType: '', search: '' };

        function getInvitations() {
            const data = getMockData();
            return (data.offers || []).filter(o =>
                o.locumId === session.id &&
                ['sent', 'viewed', 'negotiating'].includes(o.status)
            ).sort((a, b) => new Date(a.sessionDate || a.shiftDate) - new Date(b.sessionDate || b.shiftDate));
        }

        function renderPage() {
            let invitations = getInvitations();

            // Auto-mark sent offers as viewed
            invitations.forEach(inv => {
                if (inv.status === 'sent') {
                    Booking.viewOffer(inv.id);
                    inv.status = 'viewed';
                }
            });

            // Apply filters
            if (currentFilter.status) {
                invitations = invitations.filter(i => i.status === currentFilter.status);
            }
            if (currentFilter.healthBoard) {
                invitations = invitations.filter(i => i.healthBoard === currentFilter.healthBoard);
            }
            if (currentFilter.sessionType) {
                invitations = invitations.filter(i => i.sessionType === currentFilter.sessionType);
            }
            if (currentFilter.search) {
                const q = currentFilter.search.toLowerCase();
                invitations = invitations.filter(i =>
                    (i.practiceName || '').toLowerCase().includes(q) ||
                    (i.healthBoard || '').toLowerCase().includes(q)
                );
            }

            pageContent.innerHTML = `
                <h1 style="font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--dark); margin-bottom: 8px;">
                    My Invitations
                </h1>
                <p style="font-size: 0.9rem; color: var(--dark-600); margin-bottom: 20px;">
                    Review session invitations from practices. Accept, negotiate, or decline.
                </p>

                <div class="filter-bar">
                    <div class="form-group">
                        <label class="form-label">Status</label>
                        <select class="form-select" id="filterStatus">
                            <option value="">All</option>
                            <option value="viewed">New</option>
                            <option value="negotiating">Negotiating</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Health Board</label>
                        <select class="form-select" id="filterHealthBoard">
                            ${healthBoards.map(hb => `<option value="${hb === 'All Health Boards' ? '' : hb}">${hb}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Session Type</label>
                        <select class="form-select" id="filterSessionType">
                            <option value="">Any</option>
                            <option value="AM">AM</option>
                            <option value="PM">PM</option>
                            <option value="Full Day">Full Day</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Search</label>
                        <input type="text" class="form-input" id="filterSearch" placeholder="Practice name...">
                    </div>
                </div>

                <p style="font-size: 0.88rem; color: var(--dark-600); margin-bottom: 16px;">
                    <strong>${invitations.length}</strong> invitation${invitations.length !== 1 ? 's' : ''} awaiting your response
                </p>

                <div id="invitationsList">
                    ${invitations.length === 0
                        ? renderEmptyState('mail', 'No invitations', 'You have no pending invitations from practices. Make sure your availability is up to date so practices can find you.', 'Update Calendar', 'my-calendar.html')
                        : invitations.map(offer => renderOfferCard(offer)).join('')
                    }
                </div>
            `;

            // Bind filters
            ['filterStatus', 'filterHealthBoard', 'filterSessionType'].forEach(id => {
                document.getElementById(id).addEventListener('change', applyFilters);
            });
            var searchTimer = null;
            document.getElementById('filterSearch').addEventListener('input', function() {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(applyFilters, 300);
            });
        }

        function applyFilters() {
            currentFilter.status = document.getElementById('filterStatus').value;
            currentFilter.healthBoard = document.getElementById('filterHealthBoard').value;
            currentFilter.sessionType = document.getElementById('filterSessionType').value;
            currentFilter.search = document.getElementById('filterSearch').value.trim();
            renderPage();
        }

        // Action handlers called by renderOfferCard
        window.acceptOffer = function(offerId) {
            const result = Booking.respondToOffer(offerId, 'accept');
            if (result && !result.error) {
                Toast.show('Offer accepted! The practice will confirm your booking.', 'success');
            } else {
                Toast.show((result && result.message) || 'Failed to accept offer.', 'error');
            }
            renderPage();
        };

        window.declineOffer = function(offerId) {
            Modal.show({
                title: 'Decline Invitation',
                body: '<p style="font-size: 0.9rem; color: var(--dark-600); padding: 8px 0;">Are you sure you want to decline this invitation? The practice will be notified.</p>',
                footer: '<button class="btn btn-ghost" data-modal-close>Cancel</button><button class="btn btn-primary" style="background: var(--danger); border-color: var(--danger);" id="confirmDeclineBtn">Decline</button>',
                onOpen: function(overlay) {
                    overlay.querySelector('#confirmDeclineBtn').addEventListener('click', function() {
                        Modal.close(overlay);
                        const result = Booking.respondToOffer(offerId, 'decline');
                        if (result && !result.error) {
                            Toast.show('Invitation declined.', 'info');
                        } else {
                            Toast.show((result && result.message) || 'Failed to decline.', 'error');
                        }
                        renderPage();
                    });
                }
            });
        };

        window.counterOffer = function(offerId) {
            const data = getMockData();
            const offer = data.offers.find(o => o.id === offerId);
            if (!offer) return;
            const currentRate = offer.proposedRate || 0;

            Modal.show({
                title: 'Counter-Offer',
                body: `<div style="padding: 8px 0;">
                    <p style="font-size: 0.88rem; color: var(--dark-600); margin-bottom: 16px;">Practice offered: <strong>${formatCurrency(currentRate)}</strong> for ${offer.sessionType} session</p>
                    <div class="form-group">
                        <label class="form-label">Your counter-rate (£)</label>
                        <input type="number" id="counterRate" class="form-input" placeholder="e.g. 450" step="10" min="0" value="${currentRate}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Message (optional)</label>
                        <textarea id="counterMsg" class="form-textarea" rows="2" placeholder="e.g. I can do it for this rate..."></textarea>
                    </div>
                </div>`,
                footer: '<button class="btn btn-ghost" data-modal-close>Cancel</button><button class="btn btn-primary" id="sendCounterBtn">Send Counter</button>',
                onOpen: function(overlay) {
                    overlay.querySelector('#sendCounterBtn').addEventListener('click', function() {
                        var rate = Number(overlay.querySelector('#counterRate').value);
                        var msg = overlay.querySelector('#counterMsg').value.trim();
                        if (!rate || rate <= 0) { Toast.show('Please enter a valid rate.', 'error'); return; }
                        const result = Booking.respondToOffer(offerId, 'counter', rate, msg);
                        Modal.close(overlay);
                        if (result && !result.error) {
                            Toast.show('Counter-offer sent to practice.', 'success');
                        } else {
                            Toast.show((result && result.message) || 'Failed to send counter.', 'error');
                        }
                        renderPage();
                    });
                }
            });
        };

        window.viewBookingDetail = function(offerId) {
            window.location.href = 'my-offers.html';
        };

        renderPage();
    </script>
</body>
</html>
