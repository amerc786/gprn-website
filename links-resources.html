<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Links & Resources - GPRN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Syne"', 'sans-serif'],
                    },
                    colors: {
                        navy: { DEFAULT: '#0B0F19', 50: '#141C2F' },
                        brand: { green: '#059669', mint: '#ECFDF5', dark: '#022C22' },
                        surface: '#F8F9FA'
                    },
                    boxShadow: {
                        'card': '0 4px 20px rgba(0, 0, 0, 0.03)',
                        'card-hover': '0 10px 40px rgba(0, 0, 0, 0.08)',
                        'subtle': '0 1px 2px rgba(0,0,0,0.02)',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <script src="mock-data.js?v=20260703a"></script>
    <script src="app.js?v=20260703a"></script>
<script src="supabase-client.js?v=20260703a"></script>
    <script src="supabase-tables.js?v=20260703a"></script>
    <script src="components.js?v=20260703a"></script>
    <script>
        if (!initPage()) throw new Error('Auth required');

        const role = Auth.getRole();
        const pageContent = initAppLayout(role, 'links', 'Links & Resources');

        function linkCard(href, icon, title, desc) {
            return `
            <a href="${href}" target="_blank" rel="noopener noreferrer" class="link-card">
                <div class="link-card-icon">${getIcon(icon)}</div>
                <div>
                    <div class="link-card-title">${title} <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline;vertical-align:middle;margin-left:4px;opacity:0.5;"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></div>
                    <div class="link-card-desc">${desc}</div>
                </div>
            </a>`;
        }

        const html = `
        <h2 style="font-size: 1.25rem; margin-bottom: 24px;">Useful Links and Resources</h2>

        <!-- Key Resources -->
        <div class="content-card" style="margin-bottom: 24px;">
            <div class="content-card-header">
                <h2>Key Resources</h2>
            </div>
            <div class="content-card-body" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px;">
                ${linkCard('https://www.bma.org.uk/pay-and-contracts/locum-and-freelance-gps', 'file-text', 'BMA Locum GP Guidance', 'British Medical Association guidance for locum GPs on contracts, rates, rights and best practice.')}
                ${linkCard('https://www.gmc-uk.org', 'shield', 'GMC', 'General Medical Council - registration, licensing, standards and guidance for all doctors in the UK.')}
                ${linkCard('https://www.nbmedical.com', 'book-open', 'NB Medical', 'Independent CPD and clinical updates for GPs, including hot topics, guidelines and educational resources.')}
            </div>
        </div>

        <!-- Welsh GPs -->
        <div class="content-card">
            <div class="content-card-header">
                <h2>Welsh GPs</h2>
            </div>
            <div class="content-card-body" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px;">
                ${linkCard('https://abuhb.nhs.wales', 'activity', 'Aneurin Bevan UHB', 'Aneurin Bevan University Health Board covering Gwent, Newport and surrounding areas.')}
                ${linkCard('https://bcuhb.nhs.wales', 'activity', 'Betsi Cadwaladr UHB', 'Betsi Cadwaladr University Health Board covering North Wales.')}
                ${linkCard('https://cavuhb.nhs.wales', 'activity', 'Cardiff and Vale UHB', 'Cardiff and Vale University Health Board covering Cardiff and the Vale of Glamorgan.')}
                ${linkCard('https://ctmuhb.nhs.wales', 'activity', 'Cwm Taf Morgannwg UHB', 'Cwm Taf Morgannwg University Health Board covering the Valleys and Bridgend.')}
                ${linkCard('https://hduhb.nhs.wales', 'activity', 'Hywel Dda UHB', 'Hywel Dda University Health Board covering West Wales including Carmarthenshire, Ceredigion and Pembrokeshire.')}
                ${linkCard('https://pthb.nhs.wales', 'activity', 'Powys THB', 'Powys Teaching Health Board covering Mid Wales.')}
                ${linkCard('https://sbuhb.nhs.wales', 'activity', 'Swansea Bay UHB', 'Swansea Bay University Health Board covering Swansea and Neath Port Talbot.')}
            </div>
        </div>

        <!-- Wales-Wide Emergency & Key Numbers -->
        <div id="referral-pathways" class="content-card" style="margin-top: 24px; border-left: 3px solid var(--primary);">
            <div class="content-card-header">
                <h2>${getIcon('phone')} Wales-Wide Emergency & Key Numbers</h2>
            </div>
            <div class="content-card-body" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px;">
                <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px;">
                    <div style="font-weight: 700; margin-bottom: 4px;">${getIcon('phone')} NHS 111 Wales</div>
                    <div style="font-size: 0.85rem; color: var(--dark-600);">Non-emergency medical advice, out-of-hours GP access</div>
                    <div style="font-weight: 700; color: var(--primary); margin-top: 6px; font-size: 1.1rem;">111</div>
                </div>
                <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px;">
                    <div style="font-weight: 700; margin-bottom: 4px;">${getIcon('heartbeat')} Mental Health Crisis Line (C.A.L.L.)</div>
                    <div style="font-size: 0.85rem; color: var(--dark-600);">Community Advice & Listening Line — 24/7 mental health support</div>
                    <div style="font-weight: 700; color: var(--primary); margin-top: 6px; font-size: 1.1rem;">0800 132 737</div>
                </div>
                <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px;">
                    <div style="font-weight: 700; margin-bottom: 4px;">${getIcon('warning')} National Poisons Information Service</div>
                    <div style="font-size: 0.85rem; color: var(--dark-600);">NPIS — poisoning/overdose advice for healthcare professionals</div>
                    <div style="font-weight: 700; color: var(--primary); margin-top: 6px; font-size: 1.1rem;">0344 892 0111</div>
                </div>
                <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px;">
                    <div style="font-weight: 700; margin-bottom: 4px;">${getIcon('users')} Social Services (Wales)</div>
                    <div style="font-size: 0.85rem; color: var(--dark-600);">Dewis Cymru — directory of social services and wellbeing resources</div>
                    <div style="font-weight: 700; color: var(--primary); margin-top: 6px; font-size: 1.1rem;">dewis.wales</div>
                </div>
                <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px;">
                    <div style="font-weight: 700; margin-bottom: 4px;">${getIcon('first-aid')} Emergency Ambulance</div>
                    <div style="font-size: 0.85rem; color: var(--dark-600);">Welsh Ambulance Service — life-threatening emergencies</div>
                    <div style="font-weight: 700; color: var(--primary); margin-top: 6px; font-size: 1.1rem;">999</div>
                </div>
            </div>
        </div>

        <!-- Referral Pathways by Health Board -->
        <div class="content-card" style="margin-top: 24px;">
            <div class="content-card-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h2>${getIcon('map-pin')} Referral Pathways by Health Board</h2>
            </div>
            <div class="content-card-body">
                <p style="color: var(--dark-600); margin-bottom: 16px; font-size: 0.9rem;">Referral contacts and pathways are managed by each health board and change frequently. Select a health board to find its official referral and contact information.</p>

                <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;" id="hbTabs">
                    <button class="btn btn-small btn-primary hb-tab" onclick="showHB('abuhb', event)">Aneurin Bevan</button>
                    <button class="btn btn-small btn-ghost hb-tab" onclick="showHB('bcuhb', event)">Betsi Cadwaladr</button>
                    <button class="btn btn-small btn-ghost hb-tab" onclick="showHB('cavuhb', event)">Cardiff & Vale</button>
                    <button class="btn btn-small btn-ghost hb-tab" onclick="showHB('ctmuhb', event)">Cwm Taf Morgannwg</button>
                    <button class="btn btn-small btn-ghost hb-tab" onclick="showHB('hduhb', event)">Hywel Dda</button>
                    <button class="btn btn-small btn-ghost hb-tab" onclick="showHB('pthb', event)">Powys</button>
                    <button class="btn btn-small btn-ghost hb-tab" onclick="showHB('sbuhb', event)">Swansea Bay</button>
                </div>

                <div id="hbContent"></div>
            </div>
        </div>`;

        // Per-board referral numbers are deliberately NOT hardcoded here: they vary by
        // service and change frequently, and an out-of-date number is a clinical risk.
        // Each board links to its official site, which carries the current contacts.
        const hbData = {
            abuhb: { name: 'Aneurin Bevan University Health Board', area: 'Blaenau Gwent, Caerphilly, Monmouthshire, Newport, Torfaen', url: 'https://abuhb.nhs.wales' },
            bcuhb: { name: 'Betsi Cadwaladr University Health Board', area: 'Anglesey, Gwynedd, Conwy, Denbighshire, Flintshire, Wrexham', url: 'https://bcuhb.nhs.wales' },
            cavuhb: { name: 'Cardiff and Vale University Health Board', area: 'Cardiff, Vale of Glamorgan', url: 'https://cavuhb.nhs.wales' },
            ctmuhb: { name: 'Cwm Taf Morgannwg University Health Board', area: 'Bridgend, Merthyr Tydfil, Rhondda Cynon Taf', url: 'https://ctmuhb.nhs.wales' },
            hduhb: { name: 'Hywel Dda University Health Board', area: 'Carmarthenshire, Ceredigion, Pembrokeshire', url: 'https://hduhb.nhs.wales' },
            pthb: { name: 'Powys Teaching Health Board', area: 'Powys (Mid Wales)', url: 'https://pthb.nhs.wales' },
            sbuhb: { name: 'Swansea Bay University Health Board', area: 'Swansea, Neath Port Talbot', url: 'https://sbuhb.nhs.wales' }
        };

        function showHB(id, evt) {
            const hb = hbData[id];
            if (!hb) return;

            // Update tab styles — the active tab uses the primary button style
            document.querySelectorAll('.hb-tab').forEach(t => {
                t.className = 'btn btn-small btn-ghost hb-tab';
            });
            const clickedBtn = (evt && evt.target) || document.querySelector('.hb-tab');
            if (clickedBtn) clickedBtn.className = 'btn btn-small btn-primary hb-tab';

            document.getElementById('hbContent').innerHTML = `
                <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden;">
                    <div style="background: var(--primary); color: white; padding: 14px 18px;">
                        <div style="font-weight: 700; font-size: 1.05rem;">${hb.name}</div>
                        <div style="font-size: 0.85rem; opacity: 0.85; margin-top: 2px;">Covering: ${hb.area}</div>
                    </div>
                    <div style="padding: 18px;">
                        <p style="font-size: 0.9rem; color: var(--dark-600); line-height: 1.6; margin-bottom: 14px;">
                            Referral numbers for services such as district nursing, mental health, safeguarding and palliative care are published and kept up to date by the health board itself.
                            Use the official website below for current contacts, and check your host practice's local referral directory when on shift.
                        </p>
                        <a href="${hb.url}" target="_blank" rel="noopener noreferrer" class="btn btn-primary btn-small">
                            ${getIcon('external-link')}
                            Official Contacts &amp; Referral Information
                        </a>
                    </div>
                </div>
            `;
        }

        pageContent.innerHTML = html;

        // Show first health board by default
        showHB('abuhb');
    </script>
</body>
</html>
