        function showHB(id, evt) {
            const hb = hbData[id];
            if (!hb) return;

            // Update tab styles
            document.querySelectorAll('.hb-tab').forEach(t => {
                t.className = 'btn btn-small btn-ghost hb-tab';
            });
            const clickedBtn = (evt && evt.target) || document.querySelector('.hb-tab');
            if (clickedBtn) clickedBtn.className = 'btn btn-small hb-tab active';

            let rows = hb.contacts.map(c => `
                <tr style="border-bottom: 1px solid var(--border);">
                    <td style="padding: 10px 12px; font-weight: 600; white-space: nowrap; vertical-align: top;">${c.cat}</td>
                    <td style="padding: 10px 12px; font-weight: 700; color: var(--primary); white-space: nowrap; vertical-align: top;">${c.number}</td>
                    <td style="padding: 10px 12px; font-size: 0.85rem; color: var(--text-secondary); vertical-align: top;">${c.note}</td>
                </tr>
            `).join('');

            document.getElementById('hbContent').innerHTML = `
                <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden;">
                    <div style="background: var(--primary); color: white; padding: 14px 18px;">
                        <div style="font-weight: 700; font-size: 1.05rem;">${hb.name}</div>

                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                </div>
            `;
