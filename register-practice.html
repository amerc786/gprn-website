<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Register Practice - GPRN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="hero-bg-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>

        <div class="auth-card wide">
            <div class="auth-logo">
                <a href="index.html" class="logo">
                    <span class="logo-icon">GP</span><span class="logo-text">RN</span>
                </a>
                <p>Register Your Practice</p>
            </div>

            <!-- Stepper -->
            <div class="stepper" id="stepper">
                <div class="step active" data-step="1">
                    <div class="step-circle">1</div>
                    <span class="step-label">Practice Details</span>
                </div>
                <div class="step-line"></div>
                <div class="step" data-step="2">
                    <div class="step-circle">2</div>
                    <span class="step-label">Contact Person</span>
                </div>
            </div>

            <form id="registerForm" novalidate>
                <!-- Step 1: Practice Details -->
                <div class="form-step" id="step1">
                    <div class="form-group">
                        <label class="form-label" for="practiceName">Practice Name</label>
                        <input type="text" id="practiceName" class="form-input" placeholder="e.g. Ringland Medical Practice" required>
                        <div class="form-error"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="odsCode">ODS Code (optional)</label>
                        <input type="text" id="odsCode" class="form-input" placeholder="e.g. W00001">
                        <p class="form-hint">Your Organisation Data Service code, e.g. W00001. Leave blank if you don't have it.</p>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="healthBoard">Health Board</label>
                            <select id="healthBoard" class="form-select" required>
                                <option value="">Select health board...</option>
                                <option value="Aneurin Bevan">Aneurin Bevan</option>
                                <option value="Betsi Cadwaladr">Betsi Cadwaladr</option>
                                <option value="Cardiff and Vale">Cardiff and Vale</option>
                                <option value="Cwm Taf Morgannwg">Cwm Taf Morgannwg</option>
                                <option value="Hywel Dda">Hywel Dda</option>
                                <option value="Powys">Powys</option>
                                <option value="Swansea Bay">Swansea Bay</option>
                            </select>
                            <div class="form-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="computerSystem">Computer System</label>
                            <select id="computerSystem" class="form-select" required>
                                <option value="">Select system...</option>
                                <option value="EMIS">EMIS</option>
                                <option value="Vision">Vision</option>
                                <option value="TPP">TPP</option>
                            </select>
                            <div class="form-error"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="address">Address</label>
                        <input type="text" id="address" class="form-input" placeholder="Street address" required>
                        <div class="form-error"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="city">City / Town</label>
                            <input type="text" id="city" class="form-input" placeholder="City" required>
                            <div class="form-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="postcode">Postcode</label>
                            <input type="text" id="postcode" class="form-input" placeholder="e.g. NP9 9PS" required>
                            <div class="form-error"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="practicePhone">Phone Number</label>
                        <input type="tel" id="practicePhone" class="form-input" placeholder="01633 274000" required data-validate="tel">
                        <div class="form-error"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="partners">Number of Partners</label>
                            <input type="number" id="partners" class="form-input" placeholder="e.g. 4" min="1" max="20" required>
                            <div class="form-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="patientListSize">Patient List Size</label>
                            <input type="number" id="patientListSize" class="form-input" placeholder="e.g. 8500" min="100" required>
                            <div class="form-error"></div>
                        </div>
                    </div>
                </div>

                <!-- Step 2: Contact Person -->
                <div class="form-step" id="step2" style="display:none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="contactName">Contact Name</label>
                            <input type="text" id="contactName" class="form-input" placeholder="Full name" required>
                            <div class="form-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="contactRole">Role</label>
                            <input type="text" id="contactRole" class="form-input" placeholder="e.g. Practice Manager" required>
                            <div class="form-error"></div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="contactEmail">Email Address</label>
                            <input type="email" id="contactEmail" class="form-input" placeholder="manager@practice.wales" required data-validate="email">
                            <div class="form-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="contactPhone">Phone Number</label>
                            <input type="tel" id="contactPhone" class="form-input" placeholder="01633 274001" required data-validate="tel">
                            <div class="form-error"></div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="password">Password</label>
                            <div class="password-wrapper">
                                <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required data-validate="password">
                                <button type="button" class="password-toggle" onclick="togglePw('password', this)" aria-label="Show password">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                </button>
                            </div>
                            <div class="form-error"></div>
                            <p class="form-hint">Minimum 6 characters</p>
                            <div id="passwordStrength" style="margin-top:6px; font-size:0.8rem; font-weight:600;"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="confirmPassword">Confirm Password</label>
                            <div class="password-wrapper">
                                <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm password" required data-validate="password-confirm">
                                <button type="button" class="password-toggle" onclick="togglePw('confirmPassword', this)" aria-label="Show password">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                </button>
                            </div>
                            <div class="form-error"></div>
                        </div>
                    </div>
                </div>

                <!-- Terms Checkbox -->
                <div class="form-group" id="termsGroup" style="margin-bottom: 16px; display: none;">
                    <label style="display: flex; align-items: flex-start; gap: 8px; font-size: 0.85rem; color: var(--dark-600); cursor: pointer;">
                        <input type="checkbox" id="agreeTerms" required style="margin-top: 3px;">
                        I agree to the <a href="terms-conditions.html" target="_blank" style="color: var(--primary);">Terms &amp; Conditions</a> and <a href="privacy-policy.html" target="_blank" style="color: var(--primary);">Privacy Policy</a>
                    </label>
                    <div class="form-error" id="termsError"></div>
                </div>

                <!-- Navigation Buttons -->
                <div style="display:flex; justify-content:space-between; margin-top:32px;">
                    <button type="button" class="btn btn-ghost" id="btnBack" style="display:none;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                        Back
                    </button>
                    <div style="flex:1;"></div>
                    <button type="button" class="btn btn-primary" id="btnNext">Next Step</button>
                </div>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Log In</a>
            </div>
        </div>
    </div>

    <script src="mock-data.js"></script>
    <script src="app.js"></script>
<script src="supabase-client.js"></script>
    <script src="components.js"></script>
    <script>
        (function() {
            initMockData();

            let currentStep = 1;
            const totalSteps = 2;

            const btnNext = document.getElementById('btnNext');
            const btnBack = document.getElementById('btnBack');
            const stepper = document.getElementById('stepper');

            function showStep(step) {
                for (let i = 1; i <= totalSteps; i++) {
                    document.getElementById('step' + i).style.display = i === step ? 'block' : 'none';
                }

                const steps = stepper.querySelectorAll('.step');
                const lines = stepper.querySelectorAll('.step-line');
                steps.forEach((s, idx) => {
                    const num = idx + 1;
                    s.classList.remove('active', 'completed');
                    if (num < step) s.classList.add('completed');
                    else if (num === step) s.classList.add('active');
                });
                lines.forEach((l, idx) => {
                    l.classList.toggle('completed', idx + 1 < step);
                });

                btnBack.style.display = step > 1 ? 'inline-flex' : 'none';
                btnNext.textContent = step === totalSteps ? 'Create Account' : 'Next Step';
                document.getElementById('termsGroup').style.display = step === totalSteps ? 'block' : 'none';
            }

            function validateCurrentStep() {
                const stepEl = document.getElementById('step' + currentStep);
                const fields = stepEl.querySelectorAll('[required], [data-validate]');
                let valid = true;
                fields.forEach(field => {
                    const error = FormValidator.validateField(field);
                    const errorEl = field.closest('.form-group')?.querySelector('.form-error');
                    if (error) {
                        valid = false;
                        field.classList.add('error');
                        if (errorEl) errorEl.textContent = error;
                    } else {
                        field.classList.remove('error');
                        if (errorEl) errorEl.textContent = '';
                    }
                });
                return valid;
            }

            btnNext.addEventListener('click', function() {
                if (!validateCurrentStep()) return;

                if (currentStep === totalSteps) {
                    var termsCheckbox = document.getElementById('agreeTerms');
                    var termsError = document.getElementById('termsError');
                    if (!termsCheckbox.checked) {
                        termsError.textContent = 'You must agree to the Terms & Conditions and Privacy Policy';
                        termsError.style.color = 'var(--danger)';
                        return;
                    } else {
                        termsError.textContent = '';
                    }
                }

                if (currentStep < totalSteps) {
                    currentStep++;
                    showStep(currentStep);
                } else {
                    // Final submit
                    const data = getMockData();
                    const newId = 'prac-' + String(data.practices.length + 1).padStart(3, '0');
                    const email = document.getElementById('contactEmail').value.trim();

                    const newPractice = {
                        id: newId,
                        email: email,
                        password: document.getElementById('password').value,
                        role: 'practice',
                        practiceName: document.getElementById('practiceName').value.trim(),
                        odsCode: document.getElementById('odsCode') ? document.getElementById('odsCode').value.trim() : '',
                        healthBoard: document.getElementById('healthBoard').value,
                        address: document.getElementById('address').value.trim(),
                        city: document.getElementById('city').value.trim(),
                        postcode: document.getElementById('postcode').value.trim(),
                        phone: document.getElementById('practicePhone').value.trim(),
                        website: '',
                        computerSystem: document.getElementById('computerSystem').value,
                        partners: parseInt(document.getElementById('partners').value),
                        patientListSize: parseInt(document.getElementById('patientListSize').value),
                        contactName: document.getElementById('contactName').value.trim(),
                        contactRole: document.getElementById('contactRole').value.trim(),
                        contactEmail: email,
                        contactPhone: document.getElementById('contactPhone').value.trim()
                    };

                    // Create the Supabase Auth account first so subsequent saves are authenticated
                    var signupResult = window.SupaSignup ? window.SupaSignup(newPractice.email, newPractice.password) : null;
                    if (!signupResult || signupResult.error) {
                        var msg = signupResult && signupResult.error && signupResult.error.msg
                            ? signupResult.error.msg
                            : (signupResult && signupResult.error && signupResult.error.message) || 'Could not create account. Please try again.';
                        alert('Registration failed: ' + msg);
                        return;
                    }
                    if (signupResult.needsConfirmation) {
                        alert('Account created. Please check your email to confirm, then log in.');
                        window.location.href = 'login.html';
                        return;
                    }

                    // Refresh the server blob now that we are authenticated, then add the new profile
                    if (window.SupabaseClient && window.SupabaseClient.refresh) {
                        var serverData = window.SupabaseClient.refresh();
                        if (serverData) {
                            serverData.locums = serverData.locums || [];
                            serverData.practices = serverData.practices || [];
                            newPractice.id = 'prac-' + String(serverData.practices.length + 1).padStart(3, '0');
                            serverData.practices.push(newPractice);
                            saveMockData(serverData);
                        } else {
                            data.practices.push(newPractice);
                            saveMockData(data);
                        }
                    } else {
                        data.practices.push(newPractice);
                        saveMockData(data);
                    }

                    // Populate the session with profile details
                    var rawSession = localStorage.getItem('gprn_session');
                    if (rawSession) {
                        try {
                            var sessObj = JSON.parse(rawSession);
                            sessObj.id = newPractice.id;
                            sessObj.role = 'practice';
                            sessObj.name = newPractice.practiceName;
                            sessObj.firstName = (newPractice.contactName || '').split(' ')[0] || newPractice.practiceName;
                            localStorage.setItem('gprn_session', JSON.stringify(sessObj));
                        } catch(e) {}
                    }
                    var session = JSON.parse(localStorage.getItem('gprn_session') || 'null');
                    if (session) {
                        // Show verification email modal
                        var userEmail = newPractice.email;
                        var overlay = document.createElement('div');
                        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;';
                        var modal = document.createElement('div');
                        modal.style.cssText = 'background:#fff;border-radius:12px;padding:2.5rem;max-width:440px;width:90%;text-align:center;font-family:Inter,sans-serif;';
                        modal.innerHTML = '<div style="width:56px;height:56px;border-radius:50%;background:rgba(91, 77, 255,0.1);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#5B4DFF" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div><h3 style="font-size:1.3rem;font-weight:700;margin-bottom:0.5rem;color:#081425;">Welcome to GPRN!</h3><p style="color:#64748b;font-size:0.95rem;line-height:1.6;margin-bottom:1.5rem;">A verification email has been sent to <strong>' + userEmail + '</strong>. Please check your inbox to verify your account.</p><button id="modalContinueBtn" style="background:#5B4DFF;color:#fff;border:none;border-radius:8px;padding:0.75rem 1.5rem;font-size:1rem;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;">Continue to Dashboard</button>';
                        overlay.appendChild(modal);
                        document.body.appendChild(overlay);
                        document.getElementById('modalContinueBtn').addEventListener('click', function() {
                            window.location.href = 'practice-dashboard.html';
                        });
                    }
                }
            });

            btnBack.addEventListener('click', function() {
                if (currentStep > 1) {
                    currentStep--;
                    showStep(currentStep);
                }
            });

            showStep(1);
        })();

        function togglePw(inputId, btn) {
            var input = document.getElementById(inputId);
            var isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            btn.innerHTML = isPassword
                ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
                : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        }

        // Password strength indicator
        (function() {
            var pwInput = document.getElementById('password');
            var strengthEl = document.getElementById('passwordStrength');
            if (pwInput && strengthEl) {
                pwInput.addEventListener('input', function() {
                    var val = this.value;
                    var hasUpper = /[A-Z]/.test(val);
                    var hasLower = /[a-z]/.test(val);
                    var hasNum = /[0-9]/.test(val);
                    var hasMix = (hasUpper && hasLower) || (hasLower && hasNum) || (hasUpper && hasNum);
                    if (val.length === 0) {
                        strengthEl.textContent = '';
                    } else if (val.length < 6) {
                        strengthEl.textContent = 'Weak';
                        strengthEl.style.color = '#ef4444';
                    } else if (val.length < 8 || !hasMix) {
                        strengthEl.textContent = 'Fair';
                        strengthEl.style.color = '#f59e0b';
                    } else {
                        strengthEl.textContent = 'Good';
                        strengthEl.style.color = '#10b981';
                    }
                });
            }
        })();
    </script>
</body>
</html>
