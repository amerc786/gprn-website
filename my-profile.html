<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>My Profile - GPRN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="app-layout">
    <script src="mock-data.js"></script>
    <script src="app.js"></script>
    <script src="components.js"></script>
    <script>
        if (!initPage('locum')) throw new Error('Auth required');

        const session = Auth.getSession();
        const pageContent = initAppLayout('locum', 'profile', 'My Profile');
        const user = Auth.getCurrentUser();
        const fullName = `${user.title} ${user.firstName} ${user.lastName}`;

        // Get ratings data
        const avgRating = FeedbackManager.getAverageRating(session.id);
        const reviews = FeedbackManager.getForUser(session.id);

        function renderDocRow(label, doc) {
            const expiry = doc.expiry ? getDocumentExpiryStatus(doc.expiry) : null;
            return `
                <div style="display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--gray-100);">
                    <div>
                        <p style="font-size: 0.9rem; font-weight: 600; color: var(--dark-700);">${label}</p>
                        ${doc.uploaded
                            ? `<p style="font-size: 0.82rem; color: var(--success); margin-top: 2px;">${getIcon('check')} Uploaded: ${doc.name}</p>`
                            : `<p style="font-size: 0.82rem; color: var(--warning); margin-top: 2px;">Not uploaded</p>`
                        }
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        ${expiry ? `<span class="badge ${expiry.badge}">${expiry.label}</span>` : ''}
                        ${doc.uploaded
                            ? `<button class="btn btn-small btn-secondary" onclick="Toast.show('Download simulated: ${doc.name}', 'info')">${getIcon('download')} Download</button>`
                            : `<span class="badge badge-warning">Missing</span>`
                        }
                    </div>
                </div>
            `;
        }

        pageContent.innerHTML = `
            <div style="background: rgba(14,165,233,0.08); border: 1px solid rgba(14,165,233,0.2); border-radius: var(--radius); padding: 14px 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; font-size: 0.88rem; color: var(--secondary);">
                ${getIcon('eye')}
                <span>This is a preview of your profile as practice managers will see it. <a href="my-settings.html" style="color: var(--primary); font-weight: 600; text-decoration: underline;">Edit in Settings</a></span>
            </div>

            <!-- Document Expiry Warnings -->
            ${(() => {
                const warnings = [];
                Object.entries(user.documents).forEach(([key, doc]) => {
                    if (doc.expiry) {
                        const status = getDocumentExpiryStatus(doc.expiry);
                        const labels = { indemnity: 'Indemnity Certificate', performerListStatus: 'Performer List Status', dbs: 'DBS Check', cv: 'CV / Resume' };
                        if (status.status === 'expired') {
                            warnings.push({ label: labels[key], status: status });
                        } else if (status.status === 'expiring') {
                            warnings.push({ label: labels[key], status: status });
                        }
                    }
                });
                if (warnings.length === 0) return '';
                return `
                    <div style="background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.2); border-radius: var(--radius); padding: 14px 20px; margin-bottom: 24px;">
                        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                            <strong style="font-size: 0.88rem; color: var(--danger);">Document Expiry Warnings</strong>
                        </div>
                        ${warnings.map(w => `
                            <div style="display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 0.85rem; color: var(--dark-600);">
                                <span class="badge ${w.status.badge}">${w.status.label}</span>
                                <span>${w.label}</span>
                            </div>
                        `).join('')}
                    </div>`;
            })()}

            <!-- Profile Header -->
            <div class="content-card" style="margin-bottom: 24px;">
                <div class="content-card-body" style="display: flex; align-items: center; gap: 20px; flex-wrap: wrap;">
                    <div style="width: 64px; height: 64px; border-radius: 50%; background: var(--gradient); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.3rem; flex-shrink: 0;">
                        ${getInitials(fullName)}
                    </div>
                    <div style="flex: 1;">
                        <h2 style="font-size: 1.3rem; font-weight: 700; margin-bottom: 4px;">${fullName}</h2>
                        <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                            <span class="badge badge-primary">General Practitioner</span>
                            <span style="font-size: 0.85rem; color: var(--dark-600); display: flex; align-items: center; gap: 4px;">${getIcon('mail')} ${user.email}</span>
                            <span style="font-size: 0.85rem; color: var(--dark-600);">GMC: ${user.gmcNumber}</span>
                        </div>
                        ${avgRating ? `
                        <div style="display: flex; align-items: center; gap: 8px; margin-top: 8px;">
                            ${renderRatingStars(parseFloat(avgRating), 18)}
                            <span style="font-weight: 700; font-size: 0.95rem; color: var(--dark);">${avgRating}</span>
                            <span style="font-size: 0.82rem; color: var(--gray-400);">(${reviews.length} review${reviews.length !== 1 ? 's' : ''})</span>
                        </div>` : ''}
                    </div>
                </div>
            </div>

            <!-- About -->
            <div class="content-card">
                <div class="content-card-header"><h2>About</h2></div>
                <div class="content-card-body">
                    <p style="font-size: 0.92rem; color: var(--dark-700); line-height: 1.7;">${user.bio}</p>
                </div>
            </div>

            <!-- Professional Details -->
            <div class="content-card">
                <div class="content-card-header"><h2>Professional Details</h2></div>
                <div class="content-card-body">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                        <div>
                            <p style="font-size: 0.82rem; font-weight: 600; color: var(--dark-600); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;">Computer Systems</p>
                            <div style="display: flex; gap: 6px; flex-wrap: wrap;">
                                ${user.computerSystems.map(s => `<span class="badge badge-info">${s}</span>`).join('')}
                            </div>
                        </div>
                        <div>
                            <p style="font-size: 0.82rem; font-weight: 600; color: var(--dark-600); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;">NHS Pension</p>
                            <span class="badge ${user.nhsPension ? 'badge-success' : 'badge-neutral'}">${user.nhsPension ? 'Opted In' : 'Not Opted In'}</span>
                        </div>
                        <div>
                            <p style="font-size: 0.82rem; font-weight: 600; color: var(--dark-600); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;">Signing Scripts</p>
                            <span style="font-size: 0.9rem; color: var(--dark-700);">${user.signingScripts}</span>
                        </div>
                        <div>
                            <p style="font-size: 0.82rem; font-weight: 600; color: var(--dark-600); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;">ID Response Time</p>
                            <span style="font-size: 0.9rem; color: var(--dark-700);">${user.responseTime}</span>
                        </div>
                        <div style="grid-column: 1 / -1;">
                            <p style="font-size: 0.82rem; font-weight: 600; color: var(--dark-600); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;">Booking Reliability</p>
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div style="flex: 1; max-width: 300px; height: 10px; background: var(--gray-200); border-radius: 100px; overflow: hidden;">
                                    <div style="width: ${user.bookingReliability}%; height: 100%; background: ${user.bookingReliability >= 95 ? 'var(--success)' : user.bookingReliability >= 80 ? 'var(--warning)' : 'var(--danger)'}; border-radius: 100px;"></div>
                                </div>
                                <span style="font-weight: 700; font-size: 0.95rem; color: var(--dark);">${user.bookingReliability}%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Documents with Expiry -->
            <div class="content-card">
                <div class="content-card-header"><h2>Documents</h2></div>
                <div class="content-card-body" style="padding: 0;">
                    ${renderDocRow('Indemnity Certificate', user.documents.indemnity)}
                    ${renderDocRow('Performer List Status', user.documents.performerListStatus)}
                    ${renderDocRow('DBS Enhanced Check', user.documents.dbs)}
                    ${renderDocRow('Curriculum Vitae (CV)', user.documents.cv)}
                </div>
            </div>

            <!-- Ratings & Reviews -->
            <div class="content-card">
                <div class="content-card-header"><h2>Ratings & Reviews</h2></div>
                <div class="content-card-body">
                    ${avgRating ? `
                    <div class="rating-summary" style="margin-bottom: 20px;">
                        <span class="rating-number">${avgRating}</span>
                        ${renderRatingStars(parseFloat(avgRating), 20)}
                        <span class="rating-count">${reviews.length} review${reviews.length !== 1 ? 's' : ''}</span>
                    </div>` : ''}

                    ${reviews.length === 0
                        ? '<p style="font-size: 0.88rem; color: var(--dark-600);">No reviews received yet. Reviews will appear here after you complete shifts.</p>'
                        : reviews.slice(0, 10).map(r => {
                            const reviewerName = MessageManager.getUserName(r.fromId);
                            const avgScore = (Object.values(r.ratings).reduce((a, b) => a + b, 0) / Object.values(r.ratings).length).toFixed(1);
                            return `
                            <div style="padding: 16px 0; border-bottom: 1px solid var(--gray-100);">
                                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
                                    <div style="display: flex; align-items: center; gap: 8px;">
                                        <strong style="font-size: 0.88rem; color: var(--dark);">${reviewerName}</strong>
                                        ${renderRatingStars(parseFloat(avgScore))}
                                    </div>
                                    <span class="review-date">${DateUtils.format(r.timestamp, 'medium')}</span>
                                </div>
                                <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px;">
                                    ${Object.entries(r.ratings).map(([cat, val]) => `
                                        <span style="font-size: 0.78rem; color: var(--dark-600);">${cat}: <strong>${val}/5</strong></span>
                                    `).join('')}
                                </div>
                                ${r.comment ? `<p class="review-comment">${r.comment}</p>` : ''}
                            </div>`;
                        }).join('')
                    }
                </div>
            </div>
        `;
    </script>
</body>
</html>
