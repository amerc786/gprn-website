<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Locum Network - GPRN</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Syne + Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Existing app styles (modals, toasts, forms, badges) -->
    <link rel="stylesheet" href="styles.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Syne"', 'sans-serif'],
                    },
                    colors: {
                        navy: {
                            DEFAULT: '#0B0F19',
                            50: '#141C2F',
                        },
                        brand: {
                            green: '#059669',
                            mint: '#ECFDF5',
                            dark: '#022C22',
                        },
                        surface: '#F8F9FA'
                    },
                    boxShadow: {
                        'card': '0 4px 20px rgba(0, 0, 0, 0.03)',
                        'card-hover': '0 10px 40px rgba(0, 0, 0, 0.08)',
                        'subtle': '0 1px 2px rgba(0,0,0,0.02)',
                    }
                }
            }
        }
    </script>

    <style>
        body.pm-dashboard { font-family: 'Plus Jakarta Sans', sans-serif; }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        .custom-scroll:hover::-webkit-scrollbar-thumb { background: #CBD5E1; }

        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-item {
            animation: fade-in-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .sidebar-active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 10%;
            height: 80%;
            width: 4px;
            background-color: #0B0F19;
            border-radius: 0 4px 4px 0;
        }

        .chip-active {
            background-color: #0B0F19 !important;
            color: #ffffff !important;
            border-color: #0B0F19 !important;
        }
    </style>
</head>
<body class="pm-dashboard bg-surface text-slate-800 h-screen w-screen overflow-hidden flex selection:bg-brand-green selection:text-white">

    <script src="mock-data.js"></script>
    <script src="app.js"></script>
    <script src="supabase-client.js"></script>
    <script src="components.js"></script>
    <script>
        if (!initPage('practice')) throw new Error('Auth required');
        Booking.expireOffers();
    </script>

    <!-- MOBILE BACKDROP -->
    <div id="sidebarBackdrop" class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden" onclick="document.getElementById('pmSidebar').classList.add('-translate-x-full');this.classList.add('hidden');"></div>

    <!-- SIDEBAR -->
    <aside id="pmSidebar" class="fixed inset-y-0 left-0 z-50 w-[280px] bg-white border-r border-slate-200 flex flex-col -translate-x-full lg:translate-x-0 lg:relative lg:w-[260px] lg:z-20 lg:shrink-0 transition-transform duration-300 ease-in-out">
        <div class="h-20 px-6 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-[8px] select-none">
                <div class="w-[38px] h-[38px] bg-[#101524] rounded-[12px] flex items-center justify-center shadow-sm">
                    <span class="text-white font-black text-[24px] leading-none tracking-tight pt-[2px]">G</span>
                </div>
                <div class="flex items-baseline pt-1">
                    <span class="logo-prn text-[#101524] font-black text-[32px] leading-[0.8] tracking-[-0.05em]">PRN</span>
                    <div class="w-[9px] h-[9px] bg-[#0F8B5A] ml-[4px] mb-[3px]"></div>
                </div>
            </a>
            <button class="lg:hidden w-8 h-8 flex items-center justify-center text-slate-400 hover:text-slate-600" onclick="document.getElementById('pmSidebar').classList.add('-translate-x-full');document.getElementById('sidebarBackdrop').classList.add('hidden');">
                <i class="ph ph-x text-xl"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto custom-scroll py-6 px-4 flex flex-col gap-8">
            <nav class="flex flex-col gap-1.5">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.15em] px-4 mb-2">Platform</p>

                <a href="practice-dashboard.html" class="flex items-center gap-3 px-4 py-2.5 text-slate-500 hover:text-navy hover:bg-slate-50 rounded-xl text-[14px] font-semibold transition-colors group">
                    <i class="ph ph-squares-four text-lg group-hover:text-navy transition-colors"></i> Dashboard
                </a>
                <a href="post-shift.html" class="flex items-center gap-3 px-4 py-2.5 text-slate-500 hover:text-navy hover:bg-slate-50 rounded-xl text-[14px] font-semibold transition-colors group">
                    <i class="ph ph-calendar-plus text-lg group-hover:text-navy transition-colors"></i> Create Session
                </a>
                <a href="view-requested-shifts.html" class="flex items-center gap-3 px-4 py-2.5 text-slate-500 hover:text-navy hover:bg-slate-50 rounded-xl text-[14px] font-semibold transition-colors group">
                    <i class="ph ph-clipboard-text text-lg group-hover:text-navy transition-colors"></i> Manage Shifts
                </a>
                <a href="find-locums.html" class="sidebar-active relative flex items-center gap-3 px-4 py-2.5 bg-slate-50 text-navy rounded-xl text-[14px] font-bold transition-all">
                    <i class="ph-fill ph-users text-lg"></i> Locum Network
                </a>
                <a href="billing.html" class="flex items-center gap-3 px-4 py-2.5 text-slate-500 hover:text-navy hover:bg-slate-50 rounded-xl text-[14px] font-semibold transition-colors group">
                    <i class="ph ph-receipt text-lg group-hover:text-navy transition-colors"></i> Compliance & Billing
                </a>
                <a href="messages.html" id="sidebarMessagesLink" class="flex items-center justify-between px-4 py-2.5 text-slate-500 hover:text-navy hover:bg-slate-50 rounded-xl text-[14px] font-semibold transition-colors group">
                    <div class="flex items-center gap-3">
                        <i class="ph ph-chat-circle-dots text-lg group-hover:text-navy transition-colors"></i> Messages
                    </div>
                    <span id="sidebarUnreadBadge" class="hidden text-[10px] font-bold bg-rose-500 text-white px-2 py-0.5 rounded-full"></span>
                </a>
            </nav>

            <nav class="flex flex-col gap-1.5 mt-auto">
                <a href="practice-settings.html" class="flex items-center gap-3 px-4 py-2.5 text-slate-500 hover:text-navy hover:bg-slate-50 rounded-xl text-[14px] font-semibold transition-colors group">
                    <i class="ph ph-gear text-lg"></i> Practice Settings
                </a>
                <button onclick="Auth.logout()" class="flex items-center gap-3 px-4 py-2.5 text-slate-500 hover:text-red-600 hover:bg-red-50 rounded-xl text-[14px] font-semibold transition-colors group cursor-pointer text-left">
                    <i class="ph ph-sign-out text-lg"></i> Log Out
                </button>
            </nav>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 flex flex-col relative w-full h-full">
        <header class="h-16 lg:h-20 px-4 lg:px-10 flex items-center justify-between shrink-0 z-10 sticky top-0 bg-surface/80 backdrop-blur-md">
            <div class="flex items-center gap-3 flex-1 min-w-0">
                <button class="lg:hidden w-10 h-10 flex items-center justify-center text-slate-600 hover:text-navy rounded-xl hover:bg-slate-100 transition-colors shrink-0" onclick="document.getElementById('pmSidebar').classList.remove('-translate-x-full');document.getElementById('sidebarBackdrop').classList.remove('hidden');">
                    <i class="ph ph-list text-2xl"></i>
                </button>
                <a href="index.html" class="lg:hidden flex items-center gap-[6px] select-none shrink-0">
                    <div class="w-[32px] h-[32px] bg-[#101524] rounded-[10px] flex items-center justify-center">
                        <span class="text-white font-black text-[18px] leading-none tracking-tight pt-[2px]">G</span>
                    </div>
                    <div class="flex items-baseline pt-0.5">
                        <span class="text-[#101524] font-black text-[24px] leading-[0.8] tracking-[-0.05em]">PRN</span>
                        <div class="w-[7px] h-[7px] bg-[#0F8B5A] ml-[3px] mb-[2px]"></div>
                    </div>
                </a>
                <div class="relative w-full max-w-96 group hidden sm:block">
                    <i class="ph ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg group-focus-within:text-navy transition-colors"></i>
                    <input type="text" id="headerSearch" placeholder="Search locums by name..." class="w-full bg-white border border-slate-200 rounded-full py-2.5 pl-11 pr-4 text-[14px] font-medium text-navy placeholder-slate-400 focus:outline-none focus:border-slate-300 focus:ring-4 focus:ring-slate-100 transition-all shadow-subtle">
                </div>
            </div>

            <div class="flex items-center gap-3 lg:gap-5 shrink-0">
                <div class="relative" id="profileDropdownWrap">
                    <button onclick="document.getElementById('profileDropMenu').classList.toggle('hidden')" class="bg-navy rounded-full p-1 pl-1.5 pr-4 flex items-center gap-2.5 hover:bg-slate-800 transition-colors shadow-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-navy group">
                        <div class="bg-brand-green text-white w-7 h-7 rounded-full flex items-center justify-center text-[11px] font-bold tracking-wider" id="headerAvatar">--</div>
                        <span class="text-white text-[13px] font-semibold pr-1" id="headerName">User</span>
                        <i class="ph-bold ph-caret-down text-slate-400 text-[10px] group-hover:text-white transition-colors"></i>
                    </button>
                    <div id="profileDropMenu" class="hidden absolute right-0 top-full mt-2 w-56 bg-white rounded-xl border border-slate-200 shadow-lg py-2 z-50" style="font-family:'Plus Jakarta Sans',sans-serif;">
                        <div class="px-4 py-3 border-b border-slate-100">
                            <div class="text-[13px] font-bold text-navy" id="dropdownDisplayName">User</div>
                            <div class="text-[11px] text-slate-400">Signed in</div>
                        </div>
                        <a href="practice-settings.html" class="flex items-center gap-3 px-4 py-2.5 text-[13px] font-semibold text-slate-600 hover:bg-slate-50 hover:text-navy transition-colors">
                            <i class="ph ph-gear text-base"></i> Settings
                        </a>
                        <button onclick="toggleDarkMode()" class="w-full flex items-center justify-between px-4 py-2.5 text-[13px] font-semibold text-slate-600 hover:bg-slate-50 hover:text-navy transition-colors cursor-pointer">
                            <span class="flex items-center gap-3"><i class="ph ph-moon text-base"></i> Dark Mode</span>
                            <div id="darkModeToggle" class="w-9 h-5 rounded-full bg-slate-300 relative transition-colors">
                                <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow transition-all"></div>
                            </div>
                        </button>
                        <div class="border-t border-slate-100 mt-1 pt-1">
                            <button onclick="Auth.logout()" class="w-full flex items-center gap-3 px-4 py-2.5 text-[13px] font-semibold text-red-500 hover:bg-red-50 transition-colors cursor-pointer text-left">
                                <i class="ph ph-sign-out text-base"></i> Log Out
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto custom-scroll px-4 lg:px-10 pb-20 pt-4">
            <div class="max-w-[1400px] mx-auto w-full relative flex flex-col gap-8" id="pageRoot">
                <!-- Populated by script below -->
            </div>
        </div>
    </main>

    <script>
        // ===== DATA =====
        const session = Auth.getSession();
        const data = getMockData();
        const pageRoot = document.getElementById('pageRoot');

        // Header profile pill
        document.getElementById('headerAvatar').textContent = getInitials((session.firstName || '') + ' ' + (session.lastName || session.name || ''));
        document.getElementById('headerName').textContent = session.firstName || (session.name || 'User').split(' ')[0];
        const _dn = document.getElementById('dropdownDisplayName');
        if (_dn) _dn.textContent = session.firstName || (session.name || 'User').split(' ')[0];

        // Unread messages badge
        if (typeof MessageManager !== 'undefined') {
            const unreadMsgCount = MessageManager.getUnreadCount(session.id);
            if (unreadMsgCount > 0) {
                const badge = document.getElementById('sidebarUnreadBadge');
                badge.textContent = unreadMsgCount;
                badge.classList.remove('hidden');
            }
        }

        // ===== STATE =====
        let sortBy = 'reliability';
        let openDropdown = null;
        let showPreferredOnly = false;

        const urlParams = new URLSearchParams(window.location.search);
        let selectedNeedId = urlParams.get('needId') || '';
        let nameSearch = urlParams.get('q') || '';
        let hbFilter = '';
        let csFilter = '';

        function getHealthBoards() {
            return [...new Set(data.locums.flatMap(l => l.healthBoards))].sort();
        }
        function getComputerSystems() {
            return [...new Set(data.locums.flatMap(l => l.computerSystems))].sort();
        }
        function getOpenSessionNeeds() {
            const d = getMockData();
            if (!d.sessionNeeds) return [];
            return d.sessionNeeds.filter(n => n.practiceId === session.id && n.status === 'open')
                .sort((a, b) => new Date(a.date) - new Date(b.date));
        }

        // ===== ACTIONS =====
        function toggleDropdown(locumId, event) {
            event.stopPropagation();
            openDropdown = openDropdown === locumId ? null : locumId;
            renderLocumsGrid();
        }

        function barLocum(locumId, locumName) {
            openDropdown = null;
            Modal.show({
                title: 'Block Locum',
                body: `
                    <p style="font-size: 0.92rem; color: var(--dark-600); margin-bottom: 16px;">
                        Are you sure you want to block <strong>${locumName}</strong>? They will no longer appear in your search results.
                    </p>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label">Reason for blocking</label>
                        <textarea id="barReason" class="form-input" rows="3" placeholder="Enter reason..." style="resize: vertical;"></textarea>
                    </div>
                `,
                footer: `
                    <button class="btn btn-ghost" data-modal-close>Cancel</button>
                    <button class="btn btn-coral" onclick="confirmBar('${locumId}')">Block Locum</button>
                `
            });
        }

        function confirmBar(locumId) {
            const reason = document.getElementById('barReason') ? document.getElementById('barReason').value.trim() : '';
            BarredList.bar(session.id, locumId, reason || 'No reason provided');
            Modal.close();
            Toast.show('Locum has been blocked from future offers.', 'warning');
            render();
        }

        function unbarLocum(locumId) {
            openDropdown = null;
            BarredList.unbar(session.id, locumId);
            Toast.show('Locum has been unblocked.', 'success');
            render();
        }

        function markPreferred(locumId) {
            openDropdown = null;
            BarredList.addPreferred(session.id, locumId);
            Toast.show('Locum marked as preferred.', 'success');
            render();
        }

        function removePreferred(locumId) {
            openDropdown = null;
            BarredList.removePreferred(session.id, locumId);
            Toast.show('Locum removed from preferred list.', 'info');
            render();
        }

        document.addEventListener('click', function() {
            if (openDropdown) { openDropdown = null; renderLocumsGrid(); }
        });

        function renderLocumsGrid() {
            const grid = document.getElementById('locumsGrid');
            if (grid) grid.innerHTML = renderLocums();
        }

        function togglePreferred() {
            showPreferredOnly = !showPreferredOnly;
            render();
        }

        function setSort(val) {
            sortBy = val;
            render();
        }

        function clearFilter(which) {
            if (which === 'cs') csFilter = '';
            if (which === 'hb') hbFilter = '';
            if (which === 'need') selectedNeedId = '';
            render();
        }

        // ===== RENDER LOCUM CARDS =====
        function renderLocums() {
            const currentData = getMockData();
            let selectedNeed = null;
            if (selectedNeedId && currentData.sessionNeeds) {
                selectedNeed = currentData.sessionNeeds.find(n => n.id === selectedNeedId);
            }

            let locums = [...currentData.locums];

            // Filter out blocked
            locums = locums.filter(l => !BarredList.isBarred(session.id, l.id));

            if (nameSearch) {
                const q = nameSearch.toLowerCase();
                locums = locums.filter(l =>
                    `${l.firstName} ${l.lastName}`.toLowerCase().includes(q) ||
                    `${l.title} ${l.firstName} ${l.lastName}`.toLowerCase().includes(q)
                );
            }
            if (hbFilter) locums = locums.filter(l => l.healthBoards.includes(hbFilter));
            if (csFilter) locums = locums.filter(l => l.computerSystems.includes(csFilter));
            if (showPreferredOnly) locums = locums.filter(l => BarredList.isPreferred(session.id, l.id));

            // Enrich with availability if session need selected
            if (selectedNeed) {
                locums.forEach(l => {
                    l._avail = Availability.isAvailable(l.id, selectedNeed.date, selectedNeed.sessionType);
                    l._booked = Booking.isDoubleBooked(l.id, selectedNeed.date, null, selectedNeed.sessionType);
                    l._existingOffer = currentData.offers.find(o =>
                        o.sessionNeedId === selectedNeedId && o.locumId === l.id &&
                        !['declined', 'withdrawn', 'expired', 'cancelled'].includes(o.status)
                    );
                    l._canInvite = l._avail && !l._booked && !l._existingOffer;
                });
            }

            // Sort
            locums.sort((a, b) => {
                const prefA = BarredList.isPreferred(session.id, a.id) ? 1 : 0;
                const prefB = BarredList.isPreferred(session.id, b.id) ? 1 : 0;
                if (prefB !== prefA) return prefB - prefA;

                if (selectedNeed) {
                    const availA = a._canInvite ? 1 : 0;
                    const availB = b._canInvite ? 1 : 0;
                    if (availB !== availA) return availB - availA;
                }

                switch (sortBy) {
                    case 'reliability': return b.bookingReliability - a.bookingReliability;
                    case 'name': return a.lastName.localeCompare(b.lastName);
                    case 'experience': return b.totalShifts - a.totalShifts;
                    case 'rating':
                        return (FeedbackManager.getAverageRating(b.id) || 0) - (FeedbackManager.getAverageRating(a.id) || 0);
                    case 'rate':
                        const rateA = a.rates ? (a.rates.fullDay || a.rates.am || 0) : 0;
                        const rateB = b.rates ? (b.rates.fullDay || b.rates.am || 0) : 0;
                        return rateA - rateB;
                    default: return 0;
                }
            });

            const totalCount = currentData.locums.length;
            const shownCount = locums.length;

            // Update result count
            const countEl = document.getElementById('flResultCount');
            if (countEl) {
                countEl.textContent = shownCount === totalCount
                    ? `${shownCount} locums`
                    : `${shownCount} of ${totalCount} locums`;
            }

            if (locums.length === 0) {
                const msg = showPreferredOnly
                    ? 'No preferred locums found. Mark locums as preferred from their profile or the actions menu.'
                    : nameSearch || hbFilter || csFilter
                        ? 'No locums match your current filters. Try broadening your search.'
                        : 'No locums available.';
                return `
                    <div class="col-span-full bg-white border border-slate-200 rounded-2xl shadow-subtle p-12 flex flex-col items-center justify-center text-center">
                        <div class="w-16 h-16 rounded-full bg-slate-50 flex items-center justify-center mb-4">
                            <i class="ph ph-users text-3xl text-slate-400"></i>
                        </div>
                        <p class="text-[18px] font-extrabold text-navy mb-1">No locums found</p>
                        <p class="text-[14px] text-slate-500 max-w-md">${msg}</p>
                    </div>`;
            }

            return locums.map(loc => {
                const isPreferred = BarredList.isPreferred(session.id, loc.id);
                const avgRating = FeedbackManager.getAverageRating(loc.id);
                const locName = `${loc.title} ${loc.firstName} ${loc.lastName}`;
                const isOpen = openDropdown === loc.id;

                const reliabilityColor = loc.bookingReliability >= 95 ? 'text-emerald-600' : (loc.bookingReliability >= 85 ? 'text-amber-600' : 'text-rose-600');

                // Rate display
                let rateHtml = '';
                const rates = loc.rates || {};
                if (selectedNeed) {
                    const rate = selectedNeed.sessionType === 'AM' ? rates.am : selectedNeed.sessionType === 'PM' ? rates.pm : rates.fullDay;
                    if (rate) rateHtml = `<div class="text-right"><div class="text-[15px] font-extrabold text-navy">${formatCurrency(rate)}</div><div class="text-[10px] uppercase tracking-wider text-slate-400 font-bold">${selectedNeed.sessionType}</div></div>`;
                } else {
                    const rate = rates.fullDay || rates.am || null;
                    const label = rates.fullDay ? 'Full day' : rates.am ? 'AM' : '';
                    if (rate) rateHtml = `<div class="text-right"><div class="text-[15px] font-extrabold text-navy">${formatCurrency(rate)}</div><div class="text-[10px] uppercase tracking-wider text-slate-400 font-bold">${label}</div></div>`;
                }

                // Availability badge
                let availHtml = '';
                if (selectedNeed) {
                    if (loc._canInvite) {
                        availHtml = `<span class="inline-flex items-center gap-1 bg-emerald-50 text-emerald-700 text-[11px] font-bold px-2.5 py-1 rounded-full"><i class="ph ph-check-circle"></i> Available</span>`;
                    } else if (loc._existingOffer) {
                        availHtml = `<span class="inline-flex items-center gap-1 bg-blue-50 text-blue-700 text-[11px] font-bold px-2.5 py-1 rounded-full"><i class="ph ph-paper-plane-tilt"></i> Offer sent</span>`;
                    } else if (loc._booked) {
                        availHtml = `<span class="inline-flex items-center gap-1 bg-amber-50 text-amber-700 text-[11px] font-bold px-2.5 py-1 rounded-full">Booked</span>`;
                    } else {
                        availHtml = `<span class="inline-flex items-center gap-1 bg-slate-100 text-slate-500 text-[11px] font-bold px-2.5 py-1 rounded-full" title="This GP has not set their availability for this date">Not indicated</span>`;
                    }
                }

                // Primary action
                let primaryBtn = '';
                if (selectedNeed && loc._existingOffer) {
                    primaryBtn = `<button class="bg-slate-100 text-slate-400 px-4 py-2 rounded-full text-[13px] font-bold cursor-not-allowed" disabled><i class="ph ph-check"></i> Sent</button>`;
                } else {
                    primaryBtn = `<button onclick="sendOfferToLocum('${loc.id}', '${locName.replace(/'/g, "\\'")}')" class="bg-navy text-white px-4 py-2 rounded-full text-[13px] font-bold hover:bg-slate-800 transition-colors">Send Offer</button>`;
                }

                // Star rating
                const starRatingHtml = avgRating
                    ? `<div class="flex items-center gap-1"><i class="ph-fill ph-star text-amber-400 text-[13px]"></i><span class="text-[12px] font-bold text-navy">${avgRating}</span></div>`
                    : `<div class="flex items-center gap-1"><i class="ph ph-star text-slate-300 text-[13px]"></i><span class="text-[12px] font-bold text-slate-400">New</span></div>`;

                return `
                <div class="bg-white rounded-2xl border border-slate-200 shadow-subtle hover:shadow-card transition-shadow p-5 flex flex-col gap-4 animate-item">
                    <!-- Top: Avatar + Name + Actions menu -->
                    <div class="flex items-start gap-3">
                        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-navy to-slate-700 text-white flex items-center justify-center font-extrabold text-[14px] shrink-0">
                            ${getInitials(loc.firstName + ' ' + loc.lastName)}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 flex-wrap">
                                <p class="text-[15px] font-extrabold text-navy truncate">${locName}</p>
                                ${isPreferred ? '<i class="ph-fill ph-star text-emerald-500 text-[13px]" title="Preferred"></i>' : ''}
                            </div>
                            <p class="text-[12px] text-slate-500 font-medium mt-0.5">
                                <i class="ph ph-clock"></i> ${loc.responseTime || 'Responds fast'}
                            </p>
                        </div>
                        <div class="relative shrink-0">
                            <button onclick="toggleDropdown('${loc.id}', event)" class="w-8 h-8 rounded-full hover:bg-slate-100 flex items-center justify-center text-slate-400 hover:text-navy transition-colors">
                                <i class="ph-bold ph-dots-three-vertical"></i>
                            </button>
                            ${isOpen ? `
                            <div class="absolute right-0 top-full mt-1 bg-white border border-slate-200 rounded-xl shadow-card z-30 min-w-[180px] overflow-hidden">
                                ${isPreferred
                                    ? `<button onclick="removePreferred('${loc.id}')" class="block w-full text-left px-4 py-2.5 text-[13px] font-semibold text-slate-600 hover:bg-slate-50">Remove Preferred</button>`
                                    : `<button onclick="markPreferred('${loc.id}')" class="block w-full text-left px-4 py-2.5 text-[13px] font-semibold text-emerald-600 hover:bg-emerald-50">Mark as Preferred</button>`
                                }
                                <button onclick="barLocum('${loc.id}', '${locName.replace(/'/g, "\\'")}')" class="block w-full text-left px-4 py-2.5 text-[13px] font-semibold text-rose-600 hover:bg-rose-50 border-t border-slate-100">Block Locum</button>
                            </div>` : ''}
                        </div>
                    </div>

                    ${availHtml ? `<div>${availHtml}</div>` : ''}

                    <!-- Stats row -->
                    <div class="grid grid-cols-3 gap-2 py-3 border-y border-slate-100">
                        <div class="text-center">
                            <div class="text-[16px] font-extrabold ${reliabilityColor}">${loc.bookingReliability}%</div>
                            <div class="text-[10px] uppercase tracking-wider text-slate-400 font-bold">Reliability</div>
                        </div>
                        <div class="text-center border-x border-slate-100">
                            <div class="text-[16px] font-extrabold text-navy">${loc.totalShifts}</div>
                            <div class="text-[10px] uppercase tracking-wider text-slate-400 font-bold">Sessions</div>
                        </div>
                        <div class="text-center flex flex-col items-center justify-center">
                            ${starRatingHtml}
                            <div class="text-[10px] uppercase tracking-wider text-slate-400 font-bold mt-0.5">Rating</div>
                        </div>
                    </div>

                    <!-- Computer systems -->
                    <div class="flex flex-wrap gap-1.5">
                        ${loc.computerSystems.slice(0, 3).map(cs => `<span class="bg-slate-50 border border-slate-200 text-slate-600 text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wide">${cs}</span>`).join('')}
                        ${rateHtml ? `<div class="ml-auto">${rateHtml}</div>` : ''}
                    </div>

                    <!-- Actions -->
                    <div class="flex items-center gap-2 mt-auto">
                        <a href="locum-profile-view.html?id=${loc.id}" class="flex-1 text-center text-navy bg-white border border-slate-200 px-4 py-2 rounded-full text-[13px] font-bold hover:bg-slate-50 transition-colors">Profile</a>
                        <div class="flex-1 flex justify-end">${primaryBtn}</div>
                    </div>
                </div>`;
            }).join('');
        }

        // ===== OFFER MODAL =====
        function sendOfferToLocum(locumId, locumName) {
            const currentData = getMockData();
            const openNeeds = getOpenSessionNeeds();

            if (openNeeds.length === 0) {
                Modal.show({
                    title: 'No Open Sessions',
                    body: '<p style="font-size:0.92rem; color:var(--dark-600);">Create a session first before sending offers to locums.</p>',
                    footer: '<button class="btn btn-ghost" data-modal-close>Cancel</button><a href="post-shift.html" class="btn btn-primary">Create Session</a>'
                });
                return;
            }

            const locum = currentData.locums.find(l => l.id === locumId);
            const locumRates = locum ? locum.rates || {} : {};
            const preSelected = selectedNeedId || openNeeds[0].id;

            const needOptions = openNeeds.map(n => {
                const rate = n.sessionType === 'AM' ? locumRates.am : n.sessionType === 'PM' ? locumRates.pm : locumRates.fullDay;
                return `<option value="${n.id}" ${n.id === preSelected ? 'selected' : ''}>${DateUtils.format(n.date, 'medium')} - ${n.sessionType} (${n.startTime}-${n.endTime})${rate ? ' — Locum rate: ' + formatCurrency(rate) : ''}</option>`;
            }).join('');

            const preNeed = openNeeds.find(n => n.id === preSelected) || openNeeds[0];
            const defaultRate = preNeed.sessionType === 'AM' ? locumRates.am : preNeed.sessionType === 'PM' ? locumRates.pm : locumRates.fullDay;

            Modal.show({
                title: 'Send Offer to ' + locumName,
                size: 'medium',
                body: `
                    <div class="form-group">
                        <label class="form-label">Session</label>
                        <select class="form-select" id="offerNeedSelect" onchange="updateOfferRate()">
                            ${needOptions}
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Message (optional)</label>
                        <textarea class="form-input" id="offerMessage" rows="3" placeholder="Add a personal message to the locum..."></textarea>
                    </div>
                `,
                footer: '<button class="btn btn-ghost" data-modal-close>Cancel</button><button class="btn btn-primary" id="sendOfferBtn">Send Offer</button>',
                onOpen: function(overlay) {
                    overlay.dataset.locumId = locumId;
                    overlay.dataset.locumRatesAm = locumRates.am || 0;
                    overlay.dataset.locumRatesPm = locumRates.pm || 0;
                    overlay.dataset.locumRatesFullDay = locumRates.fullDay || 0;

                    overlay.querySelector('#sendOfferBtn').addEventListener('click', function() {
                        const needId = overlay.querySelector('#offerNeedSelect').value;
                        const rate = Number(overlay.querySelector('#offerRate').value);
                        const message = overlay.querySelector('#offerMessage').value.trim();

                        if (!rate || rate <= 0) {
                            Toast.show('Please enter a valid rate.', 'error');
                            return;
                        }

                        this.disabled = true;
                        this.textContent = 'Sending...';

                        const result = Booking.sendOffer(needId, locumId, rate, message);
                        if (result.success) {
                            Modal.close(overlay);
                            Toast.show('Offer sent to ' + locumName, 'success');
                            render();
                        } else {
                            this.disabled = false;
                            this.textContent = 'Send Offer';
                            Toast.show(result.message || 'Failed to send offer.', 'error');
                        }
                    });
                }
            });
        }

        window.updateOfferRate = function() {
            const overlay = document.querySelector('.modal-overlay');
            if (!overlay) return;
            const needId = document.getElementById('offerNeedSelect').value;
            const needs = getOpenSessionNeeds();
            const need = needs.find(n => n.id === needId);
            if (!need) return;
            const rate = need.sessionType === 'AM' ? Number(overlay.dataset.locumRatesAm) :
                        need.sessionType === 'PM' ? Number(overlay.dataset.locumRatesPm) :
                        Number(overlay.dataset.locumRatesFullDay);
            const rateInput = document.getElementById('offerRate');
            const rateHint = document.getElementById('offerRateHint');
            if (rate) {
                rateInput.value = rate;
                rateHint.textContent = 'Locum\'s published rate: ' + formatCurrency(rate);
            } else {
                rateInput.value = '';
                rateHint.textContent = 'No published rate available';
            }
        };

        // ===== RENDER SHELL =====
        function render() {
            const currentData = getMockData();
            const openNeeds = getOpenSessionNeeds();
            const preferredCount = currentData.locums.filter(l => BarredList.isPreferred(session.id, l.id)).length;
            const healthBoards = getHealthBoards();
            const computerSystems = getComputerSystems();

            const selectedNeed = selectedNeedId ? (currentData.sessionNeeds || []).find(n => n.id === selectedNeedId) : null;

            pageRoot.innerHTML = `
                <!-- HEADING -->
                <div class="flex flex-col gap-3 animate-item">
                    <span class="inline-flex items-center gap-2 self-start bg-white border border-slate-200 text-slate-600 text-[11px] font-bold uppercase tracking-[0.15em] px-3 py-1.5 rounded-full shadow-subtle">
                        <i class="ph-fill ph-circle text-brand-green text-[8px]"></i> Practice Manager Portal
                    </span>
                    <h1 class="text-[44px] font-extrabold text-navy tracking-tight" style="font-family: 'Plus Jakarta Sans', sans-serif; line-height: 1.2;">Locum Network</h1>
                    <p class="text-[15px] text-slate-500 font-medium max-w-2xl">Find, invite, and offer shifts to qualified locum GPs across your network. <span id="flResultCount" class="font-bold text-navy"></span></p>
                </div>

                <!-- SESSION NEED BAR -->
                ${openNeeds.length > 0 ? `
                <div class="bg-white border border-slate-200 rounded-2xl shadow-subtle p-4 flex items-center gap-3 flex-wrap animate-item">
                    <div class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center shrink-0">
                        <i class="ph ph-calendar-blank text-navy text-lg"></i>
                    </div>
                    <div class="flex-1 min-w-[240px]">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Filter by open session</label>
                        <select id="filterNeed" onchange="selectedNeedId = this.value; render();" class="w-full bg-slate-50 border border-slate-200 rounded-full px-4 py-2 text-[13px] font-semibold text-navy focus:outline-none focus:ring-2 focus:ring-navy/10">
                            <option value="">All locums (no date filter)</option>
                            ${openNeeds.map(n => `<option value="${n.id}" ${selectedNeedId === n.id ? 'selected' : ''}>${DateUtils.format(n.date, 'medium')} — ${n.sessionType} (${n.startTime}–${n.endTime})</option>`).join('')}
                        </select>
                    </div>
                    <a href="post-shift.html" class="bg-navy text-white px-4 py-2 rounded-full text-[13px] font-bold hover:bg-slate-800 transition-colors inline-flex items-center gap-1.5">
                        <i class="ph ph-plus"></i> New Session
                    </a>
                </div>` : `
                <div class="bg-white border border-slate-200 rounded-2xl shadow-subtle p-4 flex items-center gap-3 flex-wrap animate-item">
                    <div class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center shrink-0">
                        <i class="ph ph-calendar-plus text-slate-400 text-lg"></i>
                    </div>
                    <p class="text-[13px] font-semibold text-slate-500 flex-1">Create a session to filter locums by availability.</p>
                    <a href="post-shift.html" class="bg-navy text-white px-4 py-2 rounded-full text-[13px] font-bold hover:bg-slate-800 transition-colors inline-flex items-center gap-1.5">
                        <i class="ph ph-plus"></i> Create Session
                    </a>
                </div>`}

                <!-- SEARCH + FILTER BAR -->
                <div class="flex flex-col gap-4 animate-item">
                    <div class="relative">
                        <i class="ph ph-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                        <input type="text" id="searchName" value="${nameSearch.replace(/"/g, '&quot;')}" oninput="nameSearch = this.value; renderLocumsGrid();" placeholder="Search by locum name..." class="w-full bg-white border border-slate-200 rounded-full py-3 pl-12 pr-5 text-[14px] font-medium text-navy placeholder-slate-400 focus:outline-none focus:border-slate-300 focus:ring-4 focus:ring-slate-100 transition-all shadow-subtle">
                    </div>

                    <div class="flex items-center gap-2 flex-wrap">
                        <!-- Computer system chip (select) -->
                        <div class="relative">
                            <select id="filterCS" onchange="csFilter = this.value; render();" class="appearance-none ${csFilter ? 'chip-active' : ''} bg-white border border-slate-200 rounded-full pl-4 pr-9 py-1.5 text-[13px] font-bold text-slate-600 cursor-pointer hover:border-slate-300 transition-colors focus:outline-none">
                                <option value="">Computer System</option>
                                ${computerSystems.map(cs => `<option value="${cs}" ${csFilter === cs ? 'selected' : ''}>${cs}</option>`).join('')}
                            </select>
                            <i class="ph-bold ph-caret-down absolute right-3 top-1/2 -translate-y-1/2 text-[10px] pointer-events-none ${csFilter ? 'text-white' : 'text-slate-400'}"></i>
                        </div>

                        <!-- Health board chip -->
                        <div class="relative">
                            <select id="filterHB" onchange="hbFilter = this.value; render();" class="appearance-none ${hbFilter ? 'chip-active' : ''} bg-white border border-slate-200 rounded-full pl-4 pr-9 py-1.5 text-[13px] font-bold text-slate-600 cursor-pointer hover:border-slate-300 transition-colors focus:outline-none">
                                <option value="">Health Board</option>
                                ${healthBoards.map(hb => `<option value="${hb}" ${hbFilter === hb ? 'selected' : ''}>${hb}</option>`).join('')}
                            </select>
                            <i class="ph-bold ph-caret-down absolute right-3 top-1/2 -translate-y-1/2 text-[10px] pointer-events-none ${hbFilter ? 'text-white' : 'text-slate-400'}"></i>
                        </div>

                        <!-- Sort chip -->
                        <div class="relative">
                            <select id="sortBy" onchange="setSort(this.value)" class="appearance-none bg-white border border-slate-200 rounded-full pl-4 pr-9 py-1.5 text-[13px] font-bold text-slate-600 cursor-pointer hover:border-slate-300 transition-colors focus:outline-none">
                                <option value="reliability" ${sortBy === 'reliability' ? 'selected' : ''}>Sort: Reliability</option>
                                <option value="rate" ${sortBy === 'rate' ? 'selected' : ''}>Sort: Rate (low first)</option>
                                <option value="experience" ${sortBy === 'experience' ? 'selected' : ''}>Sort: Experience</option>
                                <option value="rating" ${sortBy === 'rating' ? 'selected' : ''}>Sort: Rating</option>
                                <option value="name" ${sortBy === 'name' ? 'selected' : ''}>Sort: Name</option>
                            </select>
                            <i class="ph-bold ph-caret-down absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-slate-400 pointer-events-none"></i>
                        </div>

                        ${preferredCount > 0 ? `
                        <button onclick="togglePreferred()" class="${showPreferredOnly ? 'chip-active' : ''} bg-white border border-slate-200 rounded-full px-4 py-1.5 text-[13px] font-bold text-slate-600 hover:border-slate-300 transition-colors inline-flex items-center gap-1.5">
                            <i class="ph-fill ph-star ${showPreferredOnly ? 'text-white' : 'text-emerald-500'}"></i>
                            Preferred (${preferredCount})
                        </button>` : ''}
                    </div>
                </div>

                <!-- LOCUM GRID -->
                <div id="locumsGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
                    ${renderLocums()}
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
