<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Jobs Board - GPRN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Syne"', 'sans-serif'],
                    },
                    colors: {
                        navy: { DEFAULT: '#0B0F19', 50: '#141C2F' },
                        brand: { green: '#059669', mint: '#ECFDF5', dark: '#022C22' },
                        surface: '#F8F9FA'
                    },
                    boxShadow: {
                        'card': '0 4px 20px rgba(0, 0, 0, 0.03)',
                        'card-hover': '0 10px 40px rgba(0, 0, 0, 0.08)',
                        'subtle': '0 1px 2px rgba(0,0,0,0.02)',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <script src="mock-data.js"></script>
    <script src="app.js?v=20260407b"></script>
<script src="supabase-client.js?v=20260407b"></script>
    <script src="supabase-tables.js?v=20260407b"></script>
    <script src="components.js?v=20260407b"></script>
    <script>
        if (!initPage()) throw new Error('Auth required');

        const role = Auth.getRole();
        const pageContent = initAppLayout(role, 'jobs', 'Jobs Board');
        const data = getMockData();

        function renderJobs(filterBoard) {
            const jobs = filterBoard
                ? data.jobs.filter(j => j.healthBoard === filterBoard)
                : data.jobs;

            // Group by health board
            const grouped = {};
            jobs.forEach(job => {
                if (!grouped[job.healthBoard]) grouped[job.healthBoard] = [];
                grouped[job.healthBoard].push(job);
            });

            // Get all health boards for filter
            const allBoards = [...new Set(data.jobs.map(j => j.healthBoard))].sort();

            let html = `
            <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 24px;">
                <h2 style="font-size: 1.25rem;">Permanent & Salaried Opportunities</h2>
                <div style="display: flex; align-items: center; gap: 8px;">
                    ${getIcon('filter')}
                    <select id="boardFilter" class="form-input" style="width: auto; min-width: 200px; padding: 8px 12px; font-size: 0.88rem;">
                        <option value="">All Health Boards</option>
                        ${allBoards.map(b => `<option value="${b}" ${filterBoard === b ? 'selected' : ''}>${b}</option>`).join('')}
                    </select>
                </div>
            </div>`;

            const sortedBoards = Object.keys(grouped).sort();

            if (sortedBoards.length === 0) {
                html += renderEmptyState('briefcase', 'No Jobs Found', 'No positions match the selected health board filter.', null, null);
            } else {
                sortedBoards.forEach(board => {
                    html += `<h3 style="font-size: 0.95rem; color: var(--dark-600); margin-bottom: 12px; margin-top: 20px; padding-bottom: 8px; border-bottom: 1px solid var(--gray-100);">
                        <span class="badge badge-primary" style="margin-right: 8px;">${board}</span>
                    </h3>`;

                    grouped[board].forEach(job => {
                        const isClosed = new Date(job.closingDate) < new Date();
                        const typeBadgeClass = job.type === 'Partnership' ? 'badge-coral' :
                                               job.type === 'Permanent' ? 'badge-success' :
                                               job.type === 'Maternity Cover' ? 'badge-warning' : 'badge-info';
                        html += `
                        <div class="shift-card-full" style="margin-bottom: 16px;${isClosed ? ' opacity: 0.7;' : ''}">
                            <div class="shift-card-header">
                                <div>
                                    <h3 class="shift-card-title">${job.practiceName}</h3>
                                    <p class="shift-card-location">${job.healthBoard}</p>
                                </div>
                                <div class="shift-card-badges">
                                    ${isClosed ? '<span class="badge badge-danger">Closed</span>' : ''}
                                    <span class="badge ${typeBadgeClass}">${job.type}</span>
                                </div>
                            </div>
                            <h4 style="font-size: 1rem; margin: 8px 0 4px; padding: 0 4px;">${job.title}</h4>
                            <div class="shift-card-details">
                                <div class="shift-card-detail">
                                    ${getIcon('calendar')}
                                    <span>${job.sessions}</span>
                                </div>
                                <div class="shift-card-detail">
                                    ${getIcon('clock')}
                                    <span>${job.duration}</span>
                                </div>
                                <div class="shift-card-detail">
                                    ${getIcon('pound')}
                                    <span>${job.salary}</span>
                                </div>
                                <div class="shift-card-detail">
                                    ${getIcon('file-text')}
                                    <span>Closes: ${DateUtils.format(job.closingDate, 'medium')}</span>
                                </div>
                            </div>
                            <p style="font-size: 0.88rem; color: var(--dark-600); line-height: 1.6; margin-top: 12px; padding: 0 4px;">${job.description}</p>
                            <div class="shift-card-footer" style="margin-top: 12px;">
                                <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                                    <a href="mailto:${job.contactEmail}" style="font-size: 0.85rem; color: var(--primary); display: flex; align-items: center; gap: 6px;">
                                        ${getIcon('mail')}
                                        ${job.contactEmail}
                                    </a>
                                    <span style="font-size:0.8rem;color:var(--dark-600);">Contact for full job specification</span>
                                </div>
                                <button class="btn btn-primary btn-small" id="job-interest-${job.id}" ${isClosed ? 'disabled style="opacity: 0.5; pointer-events: none;"' : ''} onclick="expressInterest('${job.id}')">
                                    ${getIcon('mail')}
                                    Enquire About Role
                                </button>
                            </div>
                        </div>`;
                    });
                });
            }

            pageContent.innerHTML = html;

            // Attach filter listener
            document.getElementById('boardFilter').addEventListener('change', function() {
                renderJobs(this.value || null);
            });
        }

        function expressInterest(jobId) {
            var currentData = getMockData();
            var session = Auth.getSession();
            var job = currentData.jobs.find(function(j) { return j.id === jobId; });
            if (!job) { Toast.show('Job not found.', 'error'); return; }

            if (!currentData.jobApplications) currentData.jobApplications = [];
            var existing = currentData.jobApplications.find(function(a) { return a.jobId === jobId && a.userId === session.id; });
            if (existing) {
                Toast.show('You have already expressed interest in this position.', 'info');
                return;
            }

            Modal.show({
                title: 'Enquire About Role - ' + job.practiceName,
                size: 'medium',
                body: '<div style="margin-bottom:16px;">'
                    + '<p style="font-size:0.9rem;color:var(--dark-600);margin-bottom:12px;"><strong>' + job.title + '</strong> at ' + job.practiceName + '</p>'
                    + '<p style="font-size:0.85rem;color:var(--dark-600);margin-bottom:4px;">' + job.sessions + ' &bull; ' + job.salary + '</p>'
                    + '</div>'
                    + '<div class="form-group">'
                    + '<label class="form-label">Your Message</label>'
                    + '<textarea class="form-input" id="jobCoverMsg" rows="5" placeholder="Introduce yourself and explain your interest in this position..."></textarea>'
                    + '</div>',
                footer: '<button class="btn btn-ghost" data-modal-close>Cancel</button>'
                    + '<button class="btn btn-primary" id="submitInterestBtn">Send Interest</button>',
                onOpen: function(overlay) {
                    overlay.querySelector('#submitInterestBtn').addEventListener('click', function() {
                        var coverMsg = overlay.querySelector('#jobCoverMsg').value.trim();
                        if (!coverMsg) { Toast.show('Please include a message introducing yourself.', 'warning'); return; }

                        var freshData = getMockData();
                        if (!freshData.jobApplications) freshData.jobApplications = [];
                        freshData.jobApplications.push({
                            id: 'jobapp-' + Date.now(),
                            jobId: jobId,
                            userId: session.id,
                            userName: session.name,
                            coverMessage: coverMsg,
                            date: new Date().toISOString(),
                            status: 'sent'
                        });

                        // Create notification for the practice
                        if (!freshData.notifications) freshData.notifications = [];
                        freshData.notifications.push({
                            userId: job.practiceId || job.contactEmail,
                            type: 'job_interest',
                            title: 'New Job Interest',
                            message: session.name + ' has expressed interest in the "' + job.title + '" position.',
                            date: new Date().toISOString(),
                            read: false
                        });

                        // Log email to practice contact
                        EmailManager.send(freshData, job.practiceId || session.id, 'Job Interest: ' + job.title,
                            session.name + ' has expressed interest in the "' + job.title + '" position at ' + job.practiceName + '. Cover message: ' + coverMsg,
                            'job_interest');

                        saveMockData(freshData);
                        Modal.close(overlay);
                        Toast.show('Your interest has been sent to ' + job.practiceName + '!', 'success');

                        var btn = document.getElementById('job-interest-' + jobId);
                        if (btn) {
                            btn.textContent = 'Interest Sent';
                            btn.disabled = true;
                            btn.style.opacity = '0.7';
                        }
                    });
                }
            });
        }

        renderJobs(null);

        // Mark already-applied jobs
        (function() {
            var currentData = getMockData();
            var session = Auth.getSession();
            if (currentData.jobApplications) {
                currentData.jobApplications.forEach(function(app) {
                    if (app.userId === session.id) {
                        var btn = document.getElementById('job-interest-' + app.jobId);
                        if (btn) {
                            btn.textContent = 'Interest Sent';
                            btn.disabled = true;
                            btn.style.opacity = '0.7';
                        }
                    }
                });
            }
        })();
    </script>
</body>
</html>
